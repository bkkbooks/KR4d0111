body:
  text: 潏水集巻十一宋李復撰七言古詩秋夜曲客出古劍示座中玉刻麒麟煙縷直生色屏風龜甲碧青娥無聲滿空白兎影西流轉斜隙仙人蓮花殷葉開當心吐光照愁魄縵纓短後易水客氣動燕山驕子泣挽下天河倚渇傾崑崙流㫁無五色銅匣新開北斗髙電光驚飛走空壁鯨魚鬭死海水紅欃槍西出屯雲黑酒酣揮舞七星寒金精圯下留素䇿出城今日何日我心傷出門下馬走東岡東岡路髙人迹斷獨立矯首望八荒長空澹澹地莽莽停雲黯淡山淒蒼回薄浩刼何渺茫㝠黙銷沉寂無光矜䧺挟詐爭强梁百年在世如風狂變化俯仰旋銷亡一丘已有萬骨殭舊骨未朽新骨藏丘壠纍纍爭相望萬事意欲一槩量齎志憤死世更長九月窮秋天欲霜悲風烈烈吹我裳哀鴻求羣鳴且翔原野具腓草木黄百川東馳但湯湯安得曦車挂扶桑髙持北斗㪺酒漿美人對坐舉瑤觴與我笑歌憂弭忘流泉引泉㳙㳙兮出重山回抱山麓兮入於蒼淵流来孔多兮自溢于林間出始一勺兮下合成川塍有稻兮壠有黍聚以時兮令以皷削高増卑兮釃渠絡縷人不愛力兮揮奮如雨川流濬兮来無窮泥五斗兮水一鍾旱暵則引兮淫潦則通自今以徃兮樂我良農禮有經兮嵗有蜡羊豕盈牢兮農舞於社椒香桂緑兮雲車滿野敬謝有功兮冝奠於泉下吾之將歸兮星律回秋告邦人兮導畎澮之常流欲泉利之專兮先耘耨之不偷無忘吾語兮若吾嵗之来逰惜花謠揺揺墻頭花淺深爭灼灼容冶不自持飄揚成輕薄只知朝為春風開不知暮為春風落人心愛春見花喜看花却嫌花結子别愁常亂空中絮年光付與東流水今朝還是見花開明日清隂滿緑苔寂寞流鶯歸去後忍看落日上髙臺别鶴曲寄李成季碧海漫漫煙霧低三山風驚别鶴飛千年華表㑹能歸不及雙烏乗夜棲烏来相喜啞啞啼寒月影移庭樹枝枝上營巢庭下食追隨應笑塵中客人生聚散羡雙烏烏若别離頭已白光隂百嵗共有幾空有相思淚如水因君試冩别鶴吟拂絃欲動悲風起湖水歎晚至西湖物意秋凄若有怨思遂作岷山中斷洮水来分入西湖浸城址一落城隂不復回餘波日轉臯蘭尾隂風凄冽寒氣早愁霧慘澹邉思起誰言秋水澹無情黙觀意亦有悲喜天軒地闢滄溟開百川東奔如激矢龜龍受職日夜趨萬折必東效臣子發源本願盈科進築防豈期因坎止日升不及浴雲龍泥潤空能養萑葦停波寂寞雖無語物情得失應如此淮隂野外乞餘食留侯圯下收墮履當年或失龍凖翁冷落功名千古耻我欲鳩工聚長鍤齊平决堤如决紙直看驚湍萬里潮免嗟窮涸千山底䕫州旱䕫人耕山灰作土散火滿山龜卜雨春日不知秋有飢下種計粒手中數七月八月旱天紅日脚散血龍似鼠汙邪甌寠髙下荒草根木皮何甘苦蠻商姦利乗人急縁江轉米貿兒女已身死重别離輕歸州州南神有靈歸人刲羊求山神驅風灑潤應香火飛㸃不到巫山村巫山縣南也伐皷不告歸神告神女江心黑氣巻江流雷車載鬼雲中語太守身作勸農官子粒今朝多貸汝春種須作三年計上滿隆原下水滸他時更勉後来人老去子孫無莽鹵兵餽行調丁團甲差民兵一路一十五萬人鳴金伐鼓别旗幟持刀帯甲如官軍兒妻牽衣父抱哭淚出流泉血滿身前去不知路逺近刻日要渡黄河津人負六斗兼蓑笠米供兩兵更自食髙卑日槩給二升六斗纔可供十日大軍夜泊須擇地地非安行有程驛更逺不過三十里或有攻圍或鏖擊十日未便行十程所負一空無可索丁夫南運軍北行相去愈逺不接跡敵聞兵侵退散隠狡筭極深不可測師老凍餓無鬭心精銳方出来戰敵古師逺行不裹糧因糧於敵吾必得不知何人畫此計徒困生靈甚非策但願身在得還家死生向前須努力征人白骨浸河水水聲嗚咽傷人耳来時一十五萬人彫没經時存者幾運糧懼恐乏軍興再符差㸃催餽軍比户追索丁口絶縣官不敢言無人盡將婦妻作男子數少更及羸老身尫殘病疾不堪役室中長女將問親暴吏入門便驅去脫爾恐為官怒嗔紐麻纒腰袍印字兩脛束布頭裹巾𠖇𠖇東西不能辨被驅不異犬豕羣到官未定已催發哭聲不出心酸辛負米出門時相語妻求見夫女見父在家孤苦恨竛竮軍前死生或同處氷雪皸瘃徧兩脚懸淚尋親望沙漠將軍帳下鼓無聲婦人在軍軍氣弱星使奔問来幾時下令倉黄皆遣歸聞歸南欲奔漢界中途又為西賊窺悽惻自歎生意促不見父夫不得哭一身去住兩茫然欲向南歸却望北唐秘書省書目石刻蓬莱髙閣凌浮雲天上圖書奎壁明榮河温洛龜龍呈魯壁汲冢科斗行森羅萬目分緯經大官供烹集羣英魯魚亥豕校讎精垂籖甲乙刻堅珉懐素無量元崇名唐興百年人文成大盜一炬甚秦坑碑落人間如碎星埋沒草莽荆棘平刋刻欲傳千萬齡毁滅今與糞壤并牧童敲擊㸔火生鏗然清圓猶磬聲玉泉寺道人東立海上山錫飛西落大江北雙屨還乗海雲起西過當陽駐山曲倚巖引錫神泉湧一道明虹出幽谷兀然孤𠖇踞盤石清夜鬼神禮白足化城自化非人謀七日煥然一何速雄樓傑閣鬱相望擁路十里長松緑鳴鐘擊鼓四百年法席巍巍傾楚蜀堂上提印雲門孫聞我足音下山麓門銜大路久慣入客館蕭蕭䕃寒竹春茶自造始開嘗色味甘新氣芬馥更窮上方縱登覽峯嶂四環森萬木投老經過得少留明發飛塵暗征轂過興徳寺用韓昌黎山石韻行雨忽過漸細微冉冉傍馬殘雲飛亂溪爭流經屢渡近水短畦菘葉肥躋欹到寺石磴滑紅葉擁門人迹稀升堂坐定聞魚鼓亦傳齋盋慰我飢久隂忽開日色薄初見竹影揺牕扉開山寳塔真相在瞻拜入爐香霏霏塔前蒼松盡手植到今百尺森相圍登覽未盡夜氣冷拂榻置枕舒寢衣明星耿耿東方白僕夫結束馬已鞿老僧送客有勤意靜境幸到何遽歸下元日朝謁回與李秉文冒雪過承天寺因題二詩於僧壁北風吹空天欲破急雪如簁塞空堕焚香初自蘂宫歸投鞭来就僧廬坐乾坤一色飛鳥絶市井無聲百賈餓貧粟未給貧民啼空屋漏穿不可過僧爐有令禁觸火袖手指直凍欲墮缾暖㣲聞蚯蚓鳴客寒對作橐駞坐叩鐘擊魚呼衆起持鉢分糜救晨餓一㕘木佛古因縁試舉丹霞有何過督運宿明堂川在夏州北督運晚宿明堂川鑿氷飲馬沙岡窟風沙正面立不得驍騎輕兵忽馳突宻雪擁渡無定河河帶血流浸人骨帳中令下星騎来半夜促行更倉猝鯀廟治水弗績鯀當殛逃入羽淵為黄能韓山東北有荒廟豕象冕服吁怪哉鄉社養牲禁畜豕恐觸神怒風雷災秦漢以來不讀禮祝尸鼎俎如優俳魂魄久與魑魅雜野妖隂怪憑草萊髙山南北二千里谽豁鑿斷龍門開昆侖長河走出海神禹功大不可偕後王書稱嗣天子永為萬世嚴祠齋為崇王像備冠舄寢廡敞侈完傾摧明飭有司正祀典春秋致祭吾自来過髙平縣古長平也蚩尤食昴乗鬼車韓國為窟秦為虵韓人畏虵渡河走殺氣吹斷邯山斜秦鼓一擊趙括死四十萬人坑黄沙白日忽落天地黑鴞銜碧火来人家至今野土盡血色古鏃漬血生銅花髑髏銜恨骨不朽千嵗開口生齒牙秦怒垂涎急飢腹孱趙輕搏嬰其毒折㦸沉槍鐡半消洗磨赤璺曽封肉寃氣不絶起凄風滿眼山川無草木晝隂夜慘少行人愁雨荒煙聞鬼哭秦兵掃蕩六國塵兵禍弗戢須焚身博浪金椎擊不死亡秦終是韓國人過澶州感事孫村黄河决北流北使年年過澶州澶州兩城戰格盡七十餘年廢不修昔嵗契丹傾國起欲投馬箠渡河水烽火夜夜照前殿殿前羣臣色如死心憂社稷輸至忠殿上只有冦相公黙使敵計墮吾計獨屈黄屋親臨戎敵驚潰奔虎北門從此願講兄弟親平時危冠盡肉食一旦倉猝方見人和逰趙韓王園剥剥啄啄初叩扄主人立門雙眼青籃輿遽下屏徒御脫帽解帶風泠泠倦思經時一日縱乍離涸轍逰滄溟靚深曲折任吾向度橋繞徑足不停芍藥晚花猶泫露櫻桃滿樹垂繁星萬竹森嚴擁幢葢蒼松夭矯呼風霆空嘆春時不得到枯香落蒂今飄零徙倚歴覽意稍滿自具野飯追渌醽却呼主人坐對酌脯醢間錯魚鰕腥共歎羈韁鮮休暇一餉聊爾消沉𡨕病餘量隘不禁醉騎馬歸舎猶未醒解衣拂榻欲假寐傳呼有客来造庭蒲城道中羣虎鎻頸鷄連羣弓刀後先路暗塵刼錢殺人棄屍去近山白晝無行人格捕死鬭血狼籍觧衣黄金猶在身傍云縱惡壊官法自来赴愬官中嗔伊川道中溪流氷盡揺日光夾岸弱栁千縷長野鳥深藏但聞語山花半開初有香今朝伊川首西路昔年潏水過南塘安得春風生兩腋從教吹到故山傍過平泉舗去家十日九有雨林間怒鳩猶逐婦村店泥深晝閉門繫馬臨河自炊黍生桑煙重不過爨麤糲如沙聊把筯推盤急起却問程黄昏更望山巔戍下鐵礓嶺望秦川晚宿九谷六月登壠如登天騰夷鐵礓須判年騰夷亦山坂名過險欲涉渭水渡快眼喜見秦州川溪塍青秧下白鷺驛亭秀木含疎煙投鞭清盥且展簟明日去酌北流泉題步生所居君今移居澗水東澗水暴漲侵近路盡取澗石成垣墻生鑿岸栁作橋柱結茅構屋十數間取次面勢分幾處看山看水督耕耨隨意自在不計步到處或坐或偃息盡有室廬庇風雨土床竹簟雖草草已足自適奉寒暑忩下瓦榼漆生光貫酒提攜老無數客来安更問誰何漉魚拾蟹共烹煮青黄錯雜出木盤野䔩山蔬四時具久厭輕動踏市塵未嘗開口論世故究竟得意此最多向老尤要知其趣一生遇事皆任真仰首髙風繼巢許和沈潜誠崔氏園九尾龜天生神物非偶然此龜不知今幾年世傳一尾直百嵗計應生在晋魏前長江不掛豫且網得来佳處逰林泉穹然蒼甲大如屋欲負三山翔羣仙竒宫偶卦天地位爻畫夐出大易先惟昔寧王重為寳閟藏欲永萬世傳今兹此寳世莫識但愛金字毛緑鮮仰視朝陽俯引氣一閉千息常綿綿黙然無言觀物化壽比彭籛猶更賢隂陽靈變固莫測時或輕舉来巢蓮督糧宿鹽州東怒風吹雪急鞭馬匪兕匪虎率曠野䕶糧將軍夜不来敦然獨宿在車下夏人驕狃敢予侮王師問罪在一舉半嵗力盡竟無功哀哀生人命如土西洨晚歸今日雨晴雲出溪踈林荒僻色愀悽杖藜出步洨水曲白沙細草浄無泥漁人截流張巨網擊水驚魚魚更迷兒童喜見魚網重得魚貫栁畢提攜林竹翛翛久不到夏笋迸籬生不齊或蓑或笠荷尺箠牛羊羣過喬木西野曠衣潤露已下回尋歸徑登故畦吾茅遥見隱暝靄到門隣舎雞亦棲村歩東阡南陌常經過臘破已覺春氣和出門仰視天宇靜暄暖自聞人語多青青短麥徧原隰耿耿殘雪明陵阿身閒心適欲追酒惜無佳客来當歌和李夷行逰西溪醉歸輕輿共登大堤路左手持螯不問數風回驚怨落紅飛把酒臨溪倚花樹杯中神物換凡骨直欲呼雲上天去茂陵劉郎老更癡夜守銅盤飲寒露雪中觀梅花破萼江梅爭初吐漢宫妙香聞百步耐寒蛺蝶何自來繞花翩翩那忍去幽芳不載蔚宗譜絶俗韻高吾最許直疑滕王百幅圖淡墨濡毫添老樹冷蘂踈枝整復斜倚杖時時暗香度惜無璧月懸中天令渠交光暎當户莫作桓伊一笛風要看氷姿嬌挾曙種桃西郊移桃園散植東風一吹髙數尺開花滿樹亂蔫綿結實壓枝雜紅碧初年採摘不知幾三年花稀實少得隂蟲食根膠自流今嵗春餘愁寂歴須知花多必易朽人間顏色安能乆寒松森嚴少媚嫵回視衆木爾何有不作羣花十日紅欲獻主人千嵗壽李花桃花爭紅色空深李花淺白開自好前日含青意澁縮今晨碎玉亂髙杪暖風借助開更多餘隂鬰芘花還少天晴不愁不爛漫後花開時先已老牧童曲牧童喜晴卧溪曲羣牛互鬭殘我竹驚起旁行不肯來聞呼却走如生鹿園夫奮詈辱其翁老翁操箠自驅逐牛奔衝狂亂壊籬補籬更剪溪邉木書飲客言御史在前執法後先生飲酒不濡口脫巾露頂兩脚赤先生飲酒不論石試問先生飲何如舉手指腹此誰測東家閉門强偪仄刻骨膠筋束形跡一生寂寞養聲光誰肯囬頭顧枯魄南隣矜誇尚馳騖平明跨馬朝天去車從導騎如雲屯謗辱丘山盈後路賜銅鑄錢終餓死深居巷内還逢虎髙天蒼蒼地茫茫與君舉首望八荒人生優㳺本無事自置氷炭毒肺腸鵬飛鷃躍何髙卑菌短椿壽何彭殤百年倐忽不再得爭奪紛紛世界仄渾沌不鑿人不死但知飲酒志願畢東方明星髙西山江水流明星却回江不斷與君常醉消白頭
