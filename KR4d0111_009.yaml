body:
  text: 潏水集卷九宋李復撰五言古詩雜詩猗蘭生幽林秀葉凝緑滋含芬靜不發默與清風期美人間婉孌遺世從雲螭袖中雙珠明照人氷玉姿羣動溺憂患閟光無同嘻寂寥歲將晚獨往歌紫芝應龍出重淵矯矯升天行奮迅彌宇宙雨施品物形收藏入無間吻合元氣冥神變不可測乃知至陽精聖人錬隂魄調御元功成乘時萬類覩廓然日月明體用符龍變潛躍惟時亨顔伏德方求舜見位已升霜葉下髙枝紛紛擁寒根驚風度虗庭槭槭愁飛翻草木雖無知養本亦足論人生感元化道貴窮性原滋口芬羶亂悅耳聲音繁衆攻日外戰目暗天地昏不問昆侖清但愛長波渾神馳正氣潰白日鬼瞰門春鳩啄晴屋露蟬吟髙枝羣物感氣動飛鳴不自知冥心觀物化浩劫密推移欲從扶桑翁雲間玩陽曦珍圖出榮河八卦開奧祕聖人重因襲已極露隱細大衍四十九周流通一氣隂陽窮必變往反無終始元化密推移消長先默契鬼神無遁情垂詔億萬世如何揚子雲求名誇譎詭藻繪太初厯設畫隨啓閉盈縮無常運踦贏謾擬議安得宇宙間别更有天地文字但艱苦白首困心志侯芭何所知枝指徒為贅陽剛形發輝隂凝體受照金魄遡火烏進退見朒朓氣引潮海壯象推介蟲小南北應坎離東西正昏曉萬物忘我難聖人出同憂女媧斷鼇足軒轅殛蚩尤禹命洪水乂稷播百穀修元德與天通珍符告帝休起皆不得已本非功業謀應龍潛深淵睢盱寒水秋乘時御風雷雨施化形流體異靈氣同默契神變求隂陽體合氣氛氲極無際卦氣交孕育旁滋六爻備聖人繫爻辭鈎賾推母子觀應以知來隨方推象類靈龜通火志黃牛革得地復應乾龍潛兊乘履虎尾周流紛參錯往來精妙義懵懵妄穿鑿執一千百廢孰能訪太極與遊兩儀外衆輻共一轂利用本在無制法應世變欲返民心愚巧智起頽波但逐末流趨鳥亂畢弋多真風日更踈一氣偶暫聚靈府含虗明至人遺世氛妙靜無將迎索珠迷罔象鼓琴有虧成渺渺千海波全潮浮漚輕杯水入滄溟浩浩通無際原心方寸間混合周天地后稷勤稼穡顔淵甘簞食行已在一時流芳播萬世至道不逺人安行近且易髙松懷正氣挺特入空碧短棘無直枝千鉤未成尺松生倚雲岡棘散傍道側道側侵行人牽衣去不得絲蔓亂附託狐貍喜偃息美惡類相感庸詎分知識秋風葉落時礙眼如矛戟斤斧不得施悵然空歎息翩翩雲間鳥翠羽光葳蕤結巢占逺林意與深靜期盲飇忽號怒萬木無停枝欹搖不容息簸蕩孤巢危遐睇昆崙岡玉樹蔚仙姿溟海皆震蕩秀立影不移空懷髙舉心感歎鼓翼遲晨炊未登盤飢腸已戚戚欲問堂上人先聞發歎息茍念一餉飢况艱終嵗食茫茫九州間幾人悲罄室吾欲呼天工驅雷駕雲龍十日一風雨五榖年常豐佩刀化為農孫哺百歲翁完助隂陽功不顧吾盤空沙虗路傍泉江通石上井泉挹淺沙黃井汲深江冷六月火雲生旱烏炎午影煩心欲清滌呼兒問修綆黃河走東溟不知幾萬里奔騰鼓風雷勢欲卷厚地百川隨呼吸渾渾失氣類正德不可亂橫絶見清濟詭士富縱橫機辨回天地觀其投説時揣摩探人意髙論未能窺茫然何所試髣佛一隙開洶湧驚濤起隂闔拒其惡陽開示其喜危冠揖時君擔簦擅國勢六印黃金多雙璧連城貴嵗晚客子來傾變心若死權利為禍根茍合非純士嗟哉憑軾生行見烹齊市晴鳩不逐婦猛虎不食子魏國將樂羊齊人疑吳起凶險甚鳥獸妻子自烹死嗚呼天壤間親無骨肉比殘毒就功名于君安可恃中山昔置相嘗取放麑翁異類猶有恩事君必致忠經界廢已久王者無尺土強力喜叨吞含血不肯吐孱弱困道傍性命輕毫縷為政須務本析薪何匪斧浚泉少汲水汲多泉水汙力穡莫揠苖揠苖苖必枯心清事自簡氣和體必舒古人有至言治民如烹魚先王急民事分吏察壠畝田荒宅無毛置法責粟布壤壤一嵗勤暴暴三年聚農政久不條幾家有禾黍當路莫張機張機不可行潛深巢髙杪魚鳥知愛生立義禁為非意欲求無刑刻核茍太至視死心亦輕善學必探本知本貴善養種木既得地柯葉日滋長紛紛綺語工汩汩良心喪多聞竟無益不如雞犬放姬旦相孺子不為召公知洛陽賈年少豈免絳灌疑論逺必為迂舉髙遂有危更無反禾風但起弔湘悲讀陶淵明詩淵明才力髙詩語最蕭散矯首捐末事濶步探幽逺初若不相屬再味意方見曠然間寂中竒趣髙蹇嵼衆辭肆滂葩姦怪露舒慘雕刻雖云工真風在平淡距今幾百年有作皆愧赧豫嘗跂清塵忽忽氣相感安得起從遊絶頂與同覽明月入我牖明月入我牖姢姢滿衣裳驚風飄疏竹凌亂舞清光靜坐不能眠稍知秋夜長却思古人書探編開縹囊一讀三四反人逺心茫茫投編出庭宇回步影徜徉長空散白露暗落點青黃肅肅晨氣動滿地自為霜山中有桂樹會上分得題得緑字山中有桂樹樛虬散巖曲髙枝動秋風霜凝不改緑美人與世逺嘯歌樂幽獨揮手弄浮雲寒光滿空谷忽忽自搔首神馳逐清躅何時山下泉一濯飛塵足和人子夜四時歌井上梧桐樹花黃落點衣夜深花裏鳥相並不相離美人朝汲水驚起却雙飛繅絲絲縷長當忩織流黃纎纎弄龍杼不作舞衣裳裁縫付邉使豈待見秋霜蕭蕭庭下柳曽學舞腰支秋風吹暮夜半落小蛾眉人生自無定空歎葉辭枝窈窕月華來對月理瑶箏將心託絃語幾弄未成聲非關霜氣澀不忍苦分明有客山中來有客山中來遺我雙雲松身雖咫尺長勢有百丈容空庭土花碧不種夭桃紅春悲香魄盡秋怨緑枝空喜見石上根移從最髙峯愛植朝暮勤待看凌霜風何時舊山雲出隨淵中龍沛然灑好雨助我栽培功翠碧翠碧曵長啼翩然上庭樹花枝搖未定驚顧却飛去豈不愛芳隂自憐好毛羽苦為艷粧求刻鏤點金素五陵遊俠兒挾彈馳長路華狨毛垂金豐豹文濯霧懷珠蚌必剖戴角犀多忤志士無懷璧懷璧出逢怒病目昔年勤細書廣博求多益謂經手一抄可勝讀數百矻矻三十年嘗廢寢與食磨墨見硯穿敗筆如丘積髙編連大軸不知幾萬億當時氣血盛未覺損目力今年四十六百病乘其隙雙瞳舊勞甚凝血聚成脈虗炎更上攻常若包芒棘逺視但䀮䀮浮空亂花黑少功跂前修鑽仰極窺測志欲繼絶學九萬希鵬翼求於形器外脫然有所得上友千古魂神遇展良覿年來老且病筋骸當少息六物已熬成昏氣須清滌物我萬物生藝藝與我本同氣氤氲隨所感形體偶然異丘嶽孰為髙塵粒孰為細忘物亦忘我優遊何所覬自省理容本求妍造次遽成醜兢兢早夜思猶或失於偶放而不知察美種雜稂莠吾居日三省參也吾所友自訟前善後隨非失於任私意短長莫可欺明者未免蔽改過心每憚責人夫何易藝苖捨已田無獲亦蹈厲自暴交際知其心莫良占辭氣聲音施施然已拒弗肯至忿戾無少容安能喻美意人懼有失言恝爾絶于世白日白日懸虗空春秋變寒暄但流地上影不照地下魂慘慘暗陋巷炎炎曜蓽門浮生蕩無根萬古悲黃昏感春新槐未成隂藤花如紫雲蒙羃出髙杪花葉不可分雙鳩接翼飛搖蕩花紛紛曦車不肯留感嘆愁夕曛三月無餘旬此日足可惜桃李不自由相期偶相失黃黃蕪菁花青青陵陂麥林間晚蝶飛翩翩竟何益前晨遊百花夭艷鬬顔色柳枝弱而細間垂亦自得今日偶再來羣枝空寂寂桐花開最晚香泛已羃羃髙榆散枯錢狼藉走荒陌聞歌情亦倦對酒意不懌非傷春遽回苐覺老相逼願訴東皇君撫轡留歸迹百年雖無多亦稍緩逼側早起羣鳩啄屋鳴亂雀翻簷噪喜呼怒爭逐往來競酣閙陽氣動飛潛得意相陵暴曉枕不能眠開門適情好酌泉供清盥短髮巾野帽中心曠無事焚香誦真誥人生襲元精含和百神抱失足落隂界久困羣邪耗漂溺孰能回浩劫沉波潦玉鏡動悲雲慈航引清棹惟豫久冥寞區區謝初少三疊舞胎仙八景駐霞翿稽首躡祖風中天延羲照登上黨郡樓羣山合沓來回抱東林缺紫翠不可解環城如玉玦龍飛晉水清天轉旄頭滅蕭蕭古戰場春耕擁殘雪正月五日遊曲江今日意何適出遊曲江湄野睛天澄穆風柔物間熙淺岸氷已盡長原麥含滋躍鱗向日光浴羽侵水嬉悠悠南山雲浮空久不移斕斑壠東雉鳴呼聲喔咿春序茲方交春物已若斯眷豫同來者酌酒衣淋漓莫學少陵翁淚點吞聲垂且效陶淵明為題斜川詩樂遊原重岡帶南山起伏波濤驚古原枕隑洲森爽東西橫隂宿忽自開秦川一半明莫動興廢悲惟喜禾黍晴過彈箏峽悠悠薄洛水東出彈箏峽昔人感秋聲舞躍中音節我來跨官馬屢渡隨曲折水寒石齒澀鳴調苦悲咽應有征人淚泠然灑清血含恨變舊音冷照關山月衮衮東入海餘情流未歇掩耳不能聽揮鞭急超越穿雲望前壘晚路山雨滑去逺猶自聞回腸危欲絶曲江唐址莽荆榛安知秦宫殿常因秋雨多時有微泉泫菰蒲春自生鳬鶩秋猶戀千古蔽一言物極理必變玄都觀龜刻露蘚暗石壇霜草黃斷瓦出耕土猶有金碧光甘泉分逺脈來自惠山長桃花久不開空餘葵麥荒清明渠清明三十里疏鑿髙下通西南引潏水北入太極宫居民昔為利舊迹今可窮時見斷石甃龍盤戲雲風登髙丘望逺海登髙望逺海冥冥濕天際百川趨東南奔騰卷厚地自從開闢來溶渟不可計浩浩無增虧周流在一氣怒風駕髙浪雪山寒贔屭飛火掣電光神怪時出戲却疑蓬萊峯只是鮫人髻會當見清淺乘月弄蘭枻去問蟠桃花結根幾千嵗江行至黃牛廟山特竒秀晚檥舟廟下留詩於壁層峯浮雲空亭亭出衆嶠芬敷如青蓮飛光亂寒照霜楓雜丹碧瀑布垂窈窕秀色紛異狀爭竒動奔峭歘失畏嶮心頗愜賞幽好舟行不暇徐粗得領其要隨風轉隈曲晚泊黃牛廟杖䇿登東岑周睇萬山奧臨岸理晚餉問客賣早稻明朝走夷陵便入襄陽道從此步平陸歸程已可料峽山遇雨侵曉登楚山山峻苦難陟半山忽隂晦舉手不可識躋攀穿雲過赫然見日出俯視雲氣中洶湧浩無極滉漾雪海翻兀硉寒氷立蛟龍見或沒鬐鬛火旆赤風雷恣訇磕萬車無轍迹神君互麾訶衆怪爭跳躑變異從何來萬態不可測峯頂日精明下方驚雨急倐爾寂無聲昏翳豁開釋返照光景新巖岫翠欲滴瀑泉縞帶垂稻塍清流溢髙路靜無泥牽挽望前驛世俗信耳目天地度以臆安知視聽外竒駭可窮索孰知滄溟寬但見蹄涔窄茲事非傳聞吾行所自覿西湖寺舊聞宣律師戒行極精苦眉毫出寶珠錫杖解鬬虎登壇三十年布薩度緇侣故物今餘何石像暴風雨周巨寺長楊夾通津修竹帶北岡尋行不知逺時聞芝术香渡溪陟翠巘松柏髙蒼蒼木杪見櫨簷塔廟居上方盤步曲折峻入門庭宇荒道人貌清羸趺坐臨朝陽手持天竺書貝葉翻金光爐殘柏子燒龕續明燈長見我默不語舉杖鳴匡牀以示清靜觀妙出轉徙鄉我從絶塞來塵侵兩鬢霜形骸久顛頓思逐歸鳥藏偶來叩禪扃敻與人世忘金箆刮病膜清氷沃煩腸鐵牛耕石田海底種扶桑超然越初地青蓮泥中芳陽華夫人祠陽華少夫人飛香度青冥輕明弄餘妍疏雲含曉星粲然啓玉齒流電交回熒立久忽飄去暮山風泠泠因何常德招逰西塔有詩遂和支提壓西城境絶天香集招邀乘逸興步駛追隨急到門病眼明曉逐秋雲入浮屠喜躋攀萬象在拱揖古洞積隂靄暗淡龕像濕登茲翻百憂履危非我習南山西出秦迤邐序等級北渭東赴海洶湧動都邑林梢見新月整歸尚依鬱興來莫重辭時節不可及觀西華摧髙山何時摧谽谺作空谷擁土起重岡斷石大如屋洑泉盡涌發散漫流新渌南淵勢最廣百畝亭澳曲龍威儼睢盱神靈不敢觸茲舊多園囿修篁帶喬木今忽掀阜亂髙下眩人目惟羡勢雄尊作鎮屹西服嚴威物所仰宜滋萬生福胡不靜歸根震蕩屢翻覆天地域中大奔馳猶未足世事百年間反衍如轉轂開闢浩劫來攬之不盈掬紛紛秖如此於豫幸乞獨歸來拂虗榻孤坐但冥默美原縣北軒淵明昔遁世北忩朝脫巾清風一披拂自謂羲皇人冥冥孤鴻姿真與浮雲親寂寞千載後遐躅空遺塵嗟豫敢言勇斗祿徒為貧形骸強包束種種秋毛新朅來渭水隂訟簡民風淳因喜縱懶僻鑿牖開星辰吏散鳥下階清談可娛賔歸去終亦賦聊此蟠窮鱗西崦人家處隂體生痾居髙地多風結廬西崦間溫凊適炎冬長楊帶疏籬緑畦分西東門前澗水流繫柳橫橋通汲淺泉更甘種沃年長豐生理左右足家有百嵗翁乃知淳朴全能完造化功何必濟渌河晏寢玄華宫晚出西郊晚日登西原徑風飄我衣蕭蕭班馬鳴野曠行人稀撫轡無與語目送新鴻飛俗塵嘆久艱故山多蕨薇同劉君俞城西寺避暑節欲春秋交寒暑爭愈悍故知隂陽氣盛極暑方變七月庚伏末困弱但流汗天地一大爐造物虐相玩早衰虛實反舉動多顛眩安得甘露漿鑿頂沃清灌招提古浮圖巋壯壓西甸烈風無時休寂隂却炎暵幾有籃輿興客來發我願共遊不暇徐到寺日未旦童兒青芒屩潔灑花雨散斌駮溪石枕凝滑水紋簟張置相對卧境間心不亂有時聞妙香忽來傳靜飯飽起摩腹行看盡長廊遍却呼竹忩僧汲泉具茗碗道在語默間淺深隨所見同將煩惱蠲盡洗清涼觀兹遊豈無益欲繼慎莫緩陳元常醉眠菴淵明喜間放自號葛天民我眠君且去人謂此語真無機物莫猜鷗鳥猶狎馴欲眠何遣客一念已生塵豈如龎德公相對忘主賔陳生性嗜酒大白舉浮身衆中時酣卧常貯滿腹春澒洞更何物知容幾輩人
