body:
  text: 潏水集卷八宋李復撰說易說送尹師閔易之道廣矣逺矣深矣微矣天地至大者也包之無外焉鬼神至幽者也窮之無隱焉隂陽交化而知性命之正原始要終而知死生之變日月風雷山澤水火草木鳥獸之象君臣父子兄弟夫婦室家婚姻之義禮樂師旅祭祀刑政莫不咸在至於寒暑晝夜之運屈伸動靜之體好惡取捨之情剛柔進退之理方以類聚品以羣分無不總萃雖造次顛沛不能踰顯諸仁藏諸用莫可測焉所謂妙於神而極於明者也太極未判兩儀未生雖未形易之象而易之妙固已存於其中矣元氣既分象數既形夫物藝藝而生世莫知其然於是伏羲因天地之數畫而示之八卦成列象在其中天地萬物亦以具備天下後世猶未能明聖人又重為六爻致其詳發之以彖繫以告諸人尚亦罔然曽不得望其封畛况門牆堂奧之深乎是猶納萬於櫝中方圓巨細朱緑𤣥黃有至寶焉有雜器焉未嘗發鑰出而閲之罔知其名罔識其形罔知其所可用徒指櫝曰有異藏兹為妄僞不亦甚歟以孔子潛心於易三絶韋編猶曰加我數年學易可以無大過况於衆人乎昔孔子之弟子有子弓者學易於商瞿子夏之易傳於田何二人者去孔子未逺必有所聞後來亦莫之傳其餘妄開户牖者多矣夏殷之世或曰連山或曰歸藏其名不同其辭亦異至周以其變動不居周流六虛上下無常不可以為典要故謂之易其當世所取用者如此故曰周易焉易取象幽故其文奇極道妙故其言隱非若書之二典禹貢洪範為世大法其言坦然明白也學者其可妄為說歟汶水尹君師閔自少究心於易揲蓍論卦著之於圖自謂知易之數孜孜焉歎未知易之道而問於豫噫豫何知哉於其歸也以自見於易者告之欲使發其櫝而求其中得所睹焉元祐六年清明日李復述銘硯滴銘挹彼注兹滿而不溢靜之徐清動之愈出筆冢銘洪荒眇綿正美神姦㗃㗃爾傳覃潛于思沛發于辭汲汲爾為祖孫族宗動變雲風盡心告終坎深甓周窆爾于丘惟風水之利兮永藏於其幽墓志銘禮賓使劉府君墓志銘劉氏其先自陶唐氏殷有劉纍學豢龍以事孔甲至漢而復大光武封靖王於中山子孫因居河朔間府君其後也世家保州保塞縣曽祖昌後唐平州刺史幽薊墾土使者祖審言汜水關令皆贈太尉考文質東上閣門使連州刺史贈左金吾衛上將軍府君諱諶字公量以父廕補右班殿直五遷東頭供奉官監開封府陽城考城縣酒稅為延州永平寨主民有與兵結黨為讎者纍相告訐連逮甚衆嵗久不能決府君遽得其情械之訟遂息用舉者試授閣門祗候岢嵐軍都巡檢使尋被㫖築乳浪寨以完藩籬不十日而集賞功遷禮賓副使康定初西戎犯邊朝廷命諸路擇士以聞天章閣待制王公㳂節制涇原舉統領軍前兵馬特進秩以重其選逾年就差充本路兵馬都監仍主前鋒出分路亟遇冦衆且十倍士卒恐欲潰府君曰今戰則不敵歸則被追不若據高解甲以疑之冦果疑為餌不敢逼偶鄰路兵㑹以解時大軍潰於定川例奪官罷環慶路經略使滕公宗諒辟差慶州東路巡檢又移北路凡三與敵戰以精甲破道斯楚之衆於党平谷設伏獲全賊於裴家堡獲戈甲牛羊萬計以功復官皇祐明堂遷皇城副使涇原帥臣夏安期辟第七將什壘屬羌結生族以叛屢招撫不能平府君曰彼以西戎昔數敗我師故敢輕我不若乘隙直誅其首惡以破衆心則事自定徑引兵往酋衆齊諾等率衆來拒麾兵掩擊獲首領一十三人餘遂哀懇願為編户子孫迄今效邊以功遷禮賓使移鄜延路兵馬都監兼知鄜州又移知威勝軍因歉發粟賑饑僚屬有以常法言者府君曰豫職在長民弗忍坐視其死必不從坐就移知岢嵐軍部使者猶懷發粟攟以他事責監太原府倉英宗登極移秦州兵馬都監不之官退居岐之鳳泉為終焉之計治平元年十月二十八日感疾卒享年六十八府君喜學多聞篤義樂施臨事知變愈劇愈閒暇尤善射遇敵奮勇為士卒先下亦喜為其用娶俞氏男三人長師旦右侍禁次師中盩厔縣令三師嚴東頭供奉官昔從太宗平江南封彭城郡王諱文裕者府君之世父也上疏乞明肅皇后歸政又鑿空通唃氏以破夏國之謀終於工部尚書諱渙復碩囉故地世號開門將軍諱滬者皆府君之母弟也保塞皇家之故鄉翼祖皇帝時在民間平州知其非常歸以息女今廟號簡穆皇后太祖創業之始倚汜水以機事而連州亦屢立功於邊陲豫嘗觀舊史見漢高祖光武龍興豐沛南陽之故人攀附騰驤以取將相世十數而不絶劉氏早為勳舊世有聞人卒不大耀豈所遇自有數歟諸孤將以元祐四年某月日舉府君之喪葬於鳳翔府盩厔縣太平鄉西原前期以承議郎王沃所狀行事來乞銘辭之不獲謹序而銘曰漢封中山肇啓土宇慶流平州夙親翼祖公出其後為時所稱幕府擇士辟書屢聞經始乳浪功成傾朝敵不及顧璽書寵褒壯略知變從容濟危解甲示暇敵心密疑世仰勳舊妙圖亦逺若有真宰雅懷不展剛不可折行趨於夷將老而躓匪以其私南山嶙峋鳳泉髙深勒銘幽宮以詔後昆劉君俞墓志銘士莫不知有學矣然求之未明得之亦莫之行非學之難也士亦有罪焉豫之䝉愞狃俗居常求不陷于罪其有資于豫友焉豫友諱公彥字君俞姓劉氏髙密諸城人也少從學于橫渠子張子刻勵修潔篤于孝友恭謹恂恂不妄言動其於學也務明辨深造而力行之常曰善無待于外也明于己而已道未能行于逺也施于家而已茍誠立于中必有形于外拳拳焉雖造次顛沛未嘗少違其器高茂而心期嗜進又不止于如此也人但見其溫醇深厚猶良玉出璞而圭角未露心率愛之有道者加以雕琢光輝不可掩將以禮天地神祇而致特達之用焉居貧欲仕續食四上卒無所就或勸其文章與時異則曰文不可以畔道也命不可以不俟也安能言不由中戾吾素學以輕悅于人哉竟不少易始豫見其顛連窮困以為天之于善人隂必相之將欲張之者必先翕之也今遂窮以死吁可哀也已元豐二年七月二十三日以疾終享年三十曽祖大理寺丞祖國子博士父未仕娶杜氏一男曰文孫一女曰安孫其年九月二十八日葬于長安縣善政鄉中臺村趙郡李復志而銘其墓曰形雖往矣志或存焉壽雖嗇矣善無憾焉其畀之其奪之莫之為而莫之致也徒動怛化之情矣皆莫可以訊焉潁州團練推官將仕郎試祕書省校書郎知河中府虞鄉縣事薛君墓志銘薛君昌平將葬其兄虞鄉君以狀乞銘於承議郎趙郡李復曰惟薛氏世顯河東其源流皆載於族姓書至本朝有隱德以子顯贈諫議大夫者虞鄉君之曽大父也為樞密直學士諫議大夫知成都府贈太尉終葬於河東縣條山之北趙行村虞鄉君之大王父也太尉有子為尚書比部員外郎通判鳳州卒葬於太尉墓之西南虞鄉君乃鳳州之長子也諱昌圖字純之幼失怙恃刻苦力學欲自奮不遂其志以季父任湖南轉運使奏補太廟齊郎調果州南充縣主簿移知相如縣又用舉者言知秦州青水縣辟監商州錢監礙親改知河中府虞鄉縣元豐元年閏月十七日以疾終於官舍享年四十有七初娶李氏贈開府儀同三司樞之女再娶康氏崇儀使旻之女四男洞溫早卒溱深業進士二女長適左班殿直馬序次適鄉士王師文虞鄉君昔在南充以才稱諸司多以劇委之郡有不職從事漕檄命之對易抵郡中未幾郡將疾遂死倅先已罪去遂攝郡事時方推行常平免役法使者旁午他郡縣以新法多得罪朝廷遣司農寺丞苗時中出本路體訪行法當否愛其裁度得中同監司列章薦知相如縣舊令初以虞鄉君多得衆譽隂嫉之常造誣謗聞罷又掊率吏民錢攜去事聞諸司將按治虞鄉君極諭俾自陳舊令雖赧勉從而猶隱沒不實虞鄉君親改其狀盡其數竟不使以贓廢其效官接人如此平生不妄言笑人視之但見其純靜簡厚於世真頽然者其飽通世務不肯一少自開露以求人知誠可任以事惜乎方强而殁姑見大略亦前人之深悲所謂齎志而殁者也昔久與公遊今將以紹聖某年某月日葬於鳳州墓之東敢以銘文纍公其無辭惟豫伯氏媾婚於薛豫固知虞鄉君之為人諫議大夫諱允恭太尉諱田比部員外郎諱伸謹取其所狀行事系之以銘銘曰有韞在櫝氣溫質堅扃鐍不發閟於九原胡嗇厥施躓以終天河流在西條山在南隱封中坎既固且安嗚呼君乎其從祖考以永歸乎惟後人之無艱朝邑縣令郭君墓志銘郭君諱幾字造微開封人熙寧六年中進士乙科初調常州宜興尉次為同州朝邑令元豐六年四月到官適嵗連歉民多流亡君方思救荒之術郡將公廨田在其邑將欲盡徵其租時豫奉檄至邑乃謂豫曰兹所謂凶年必取盈焉也恐大得罪當自求遂引疾久不報十年二月二十八日方午倉皇束帶下堂南面而揖凡三升降揖已乃坐於堂曰果然布紙操筆而止家人輩問之絶不語少頃遂卒享年三十有七郭氏京師豪右自其祖已來能擅四方之利昆弟皆以豪尚人君獨退默介潔居城南小圃日與吳沖道人處以能辟穀善飲酒吳生嘗謂之曰君能不仕宦與吾同遊海上可以出世若祿仕止得五年故君少時不以科舉為意其母切責曰爾既不治生事又不篤於進身吾守爾何待遂以辭學得官而被祿果止五年臨卒曰果然豈非證吳生之言乎曽祖左班殿直祖父皆不仕娶鄭氏一男曰貽孫將以其年十二月十七日葬於開封府祥符縣某坊某里宣德郎王柄前期以狀來丐銘為之銘曰萬類散殊皆原於一肖貌賦形分不可易以遁則利以祿則窒五年云亡胡天之嗇惟世茫茫妄徼以力自謂有能匪吾所必潘原縣主簿高君墓志銘高氏其先濮人因祖留家於華遂為華人父良夫高逺有器識丞相龎公籍極知其材數薦於朝任成都府路轉運使江淮等路發運使終於司勳郎中贈工部尚書祖本光祿卿贈尚書左僕射曽祖魯贈兵部侍郎君諱士慶字慶之少刻苦篤學博覽史傳不利於科舉以祖廕補郊社齊郎乃欲行其所知調渭州潘原縣主簿既而曰小官遇事束手不得輒動何所補哉滿即退歸更不復出沖淡夷曠不以世務經心杖屨往來親友之間以詩酒嘯歌自適樂善好義其善亦不願為人知人或詰之則曰此乃士之所當為吾每見人務華而不實絢以客氣吾客今去矣獨有主存焉故也昔在潘原康定中西戎冦邊君部糧從軍經略使韓公琦知其才欲委以事君度勢不可留遂以疾辭歸不數日大軍果敗於好水川人謂其知機嘉祐二年七月二十九日以疾終享年四十有八先娶閻氏踰年而亡繼娶屈氏敦靜柔良治內有法歸十七年主簿殁又二十八年而終實元祐二年二月二十九日也子四人端臣宣德郎知洋州西鄉縣正臣嵐州合河縣令信臣稷臣皆業進士三女適王文簡周直清屈景純諸孤將以四年十二月十三日舉君之喪以二夫人之喪合祔於華州鄭縣駟馬鄉前期求銘於豫曰端臣不幸少失所怙貧久不克葬今又罹母氏之艱欲稱有無以盡禮庶幾無憾焉然先子平昔潛德隱行雖多端臣幼不能知其詳故無以傳今幸獲登公之門惟墓銘敢有求於下風幸無辭因系而銘曰余聞馬少游欲乘下澤車款段馬使鄉里稱為善人足矣缺李居士墓志銘居士李氏諱革字行之豫次兄也世家開封祥符縣先人纍官關右遂居京兆今為京兆人居士性卓犖不羈俶儻有大志欲以功能見于世故勉就科舉凡再黜于禮部歸太息曰昔人韞櫝待價價雖善猶或祕而不能發自求于有司列坐庭下譏邏輕侮甚傷壯夫之心且今之程文猶為簪璫球珥巧逐時尚以求媚于閨闑豈吾之所欲哉自是泛觀羣書優游里閈不復以仕進為意因誦孔北海詩曰坐上客常滿尊中酒不空喜曰吾雖不能如信陵春申之流亦何愧于鄭當時陳孟公為具庖飲日與親賓㑹嘯歌自適雖寒暑無間樂于周急紓患苐以力不足為恨强直尚氣傍見非義必正之不恤其情極其事而後已謂其人理本如此能察與否其在爾也人知其傾倒無城府退亦無愠犯而必校言其失亦聳然從故月旦皆多其義士之風既感疾語人曰吾覺今甚異非湯劑砭灼所能及醫來盡謝之政和元年正月初一日終享年六十有四娶薛氏樞密直學士知成都府田之孫比部員外郎伸之女先居士六年殁男曰約曰經皆業進士孫男三人皆幼女二人一適美原屈誥一適長安王某以政和七年十二月庚申葬于長安縣華林鄉社城西原薛氏祔焉銘曰剛其直也弗悔于劌復其克也弗慊于忌裕乎其高不以跂其鬱不為躓藐矣其有以眇乎非茍以為異周夫人墓志銘紹聖二年正月十有一日故咸陽縣主簿范府君之夫人周氏以疾終其孤將以其年三月二十一日合祔於萬年縣洪固鄉李永社之兆前期貽書屬豫曰昔夫人以長女託公惟公實知夫人願公志其平生始終夫人有知將以慰其思豫不敢辭夫人京兆萬年人曽祖緒贈禮部尚書祖實兵部侍郎贈太尉考宗古司農少卿贈通議大夫元豐初豫始見夫人之母而拜之為豫言夫人方甚幼時已卓立不羣親黨有識者皆謂他日必能守古人節義之操既笄將使有家擇議甚衆聞范氏有子以好學稱於鄉里遂歸之不幸才數年而吾甥殁終喪齒尚少欲再嫁之陳義自誓堅不可奪事姑鞠幼今踰二十年刻意自厲率覆不越亦世人所難及豫聞而識之默觀夫人之起居意嚮以驗其實既久而信又竊歎之周氏關中巨室仕宦多通顯服習豐華府君家世皆以清德自持勤儉儒素夫人入門雅合風矩衆悉喜之自嫠居益事純質非歸寧未嘗踰閾姑太夫人蘇氏賢德逺大舉有儀度夫人順事孝謹鮮不當其意治子有節法誨厲教督跬步必以學行嵗時薦奠夙興不懈使令肅然太夫人捐館議去世俗喪服之禮講緝舊文度數繁悉人或憚其難行夫人劈踊哀毁饋奠俯仰情文兩盡之學禮者傳聞皆有所取焉蓋其性强明嚴正造次不妄故生五十有八年而莫有間言男輝慶州合水縣令某華隂縣主簿次女適博州堂邑縣主簿劉勃二孫男一孫女皆幼府君諱褒尚書度支員外郎制置陜西解鹽使贈銀青光祿大夫諱祥之長子豫嘗考召南采蘋與夫衛柏舟詩言大夫妻能以禮自防共姜有自誓之義聖人取之列于國風是時先王之澤被於天下雖後世流風猶未熄故遺俗或能自力夫人生無公宮之教又無女師之訓飭躬厲節默合於禮義風人有作必無愧於昔者此中外之所共知非豫之所私也銘曰夫人之行兮既順以正來相君子兮宜永終慶茀祿莫報兮天莫可訊寡居自厲兮高節益徑偏姑在堂兮嬰弱扶膝仰事俯鞠兮敢安於佚去豐趨約兮樂彼純質迪禮無尤兮終始惟一婦學之壞兮頽風久靡嘉夫人兮允修厥履後世可告兮著乎女史隱德孔昭兮銘詩其視恭人范氏墓志銘恭人范氏諱逺字寶之長安人也熙寧二年豫生十八年矣來長安居聞恭人季父棄官歸講學不倦豫常往見之豫前娶既喪恭人祖母蘇夫人識度高逺德氣深厚舉有儀矩謂恭人類己愛視特異命以妻豫時豫方筮仕家甚貧恭人年雖少質性純重服用極素約而經理內事又勤故豫得奔走盡心於外事惟嵗時薦享必求豐潔齊宿饋奠率中禮行之終身不懈平生不喜以人之得失供談笑亦惡以驕浮尚人常曰此非有益於德也撫鞠庶子尤悉意常自乳之歸豫三十八年雖婢使輩未嘗輕詈責人亦莫敢犯中外無間言沒而發篋無一物自藏其識操天資如此非僞襲而為之也政和七年八月二十九日以疾終享年五十有七初封同安縣君再封德安縣君新制封宜人又封恭人男續繢皆將仕郎女儀適河南趙深循適長安范秬修適文林郎趙伯牛惠適宣義郎張安祖容在室孫男曰嘉孫女曰德孫曽祖忠恕尚書職方員外郎祖祥尚書度支員外郎贈銀青光祿大夫考褒京兆府咸陽縣主簿贈朝散郎其年十二月初七日葬于長安縣杜城之原敘其略而銘之曰嗚呼恭人幼清服義德其類兮從豫多艱躬自厲兮匪忮匪求知所嚮兮率履匪懈以克家兮氣升魄降何遽歸兮銘告乎來亦惟略兮雜著論卦相因乾坎需艮大畜震大壯巽小畜離大有坤泰兑夬坤乾否坎此艮剝震豫巽觀離晉兑萃坎乾訟艮䝉坤師震解兑困巽渙離未濟艮乾遁坤謙兑咸坎蹇巽漸離旅震小過震坎屯兑隨離噬嗑坤復乾無妄艮頤巽益巽艮蠱兑大過震恆乾姤坤升坎井離鼎離乾同人艮賁坤明夷巽家人兑革震豐坎既濟兑乾履坤臨離睽艮損震歸妹坎節巽中孚易曰八卦成列象在其中矣因而重之爻在其中矣孔子之序卦上經自乾坤為始乃有天地然後有萬物也下經自咸恆為始有萬物而後有男女有男女而後有夫婦也序而屬之必明其義此皆聖人垂世法而為之文言也六十四卦序而屬之皆以隂從陽以夜繼晝以柔配剛以行四時非茍為之言也皆天地隂陽自然之道繫辭曰通乎晝夜而知非盡易之妙不能至也讀列子唐栁宗元喜為文韓愈盛稱之豫觀宗元之為文極刻意用力非自然乃辭勝而理不足也至於論列子之書則曰其言直而不作為兹是亦知文矣夫直而不作為者惟喻其理而明其事不矜華辭而古訓是式也昔之論列子者專取其辭子陽之粟是未可與議列子佛肸佛肸以中牟畔召孔子欲往夫佛肸何為召孔子何為欲往此孔子知其有悔過之心也然則何以知之曰佛肸既畔置鼎於庭謂其衆曰與我者與其邑不與我者烹之田卑褰衣將就烹佛肸遺屨而止之茍欲終其惡豈遽止田卑乎昔孔子亦欲從公山弗擾之召而曰召我者豈徒哉如有用我者吾其為東周乎此可以見子之意也王畿天下之廣先王之制天子所自治者千里而已千里之外皆侯國也而要荒之外又非侯國焉聖人之智非不能周治天下而不欲盡其智也力非不能并包要荒而不欲盡其力也財用之入足五式而止不欲盡其富也刑常期于無刑不欲盡其威也冕衮旗章皆有數不欲盡其貴也惟其不欲盡故天下莫不服老子曰慈故能勇儉故能廣殆謂是也後世一有欲盡者無不敗况於欲兼盡者乎函谷關禹貢黑水西河惟雍州左殽右漢南商北居庸四山所壅也地勢險固田肯賀言秦得百二賈誼言九國之君以十倍之地百萬之師仰關而攻秦秦人開關延敵九國之師逡巡不敢進秦無亡矢遺鏃之費天下已困矣此但為言偶然如此以楚漢方爭之時觀之乃實見地勢之利高祖自漢中出定三秦東嚮與楚爭挫衄敗北者屢矣而關中固自若也曽無西顧之慮項羽據梁地高祖一入彭城一至壽春東逼于彭越南懼于英布往來救敗不給此司馬遷言天道始事於東而收功於西也雖然以關中東嚮而視天下其勢如此以關中而西視隴右隴右之勢險固又甚矣如光武之機果竟不能得隗囂以唐太宗之英睿亦挫於薛舉此可見矣臠壻晉謝混謝安之孫初孝武帝為晉陵公主求壻謂王珣曰但如劉真長王子敬便足如王處仲桓元子誠可才小富貴便預人家事珣對謝混雖不及真長不減子敬帝曰如此便足㑹帝崩袁嵩欲以女妻之珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一豚以為珍膳項上一臠尤美輒以薦帝羣臣未嘗敢食于時呼為禁臠故珣以為戲今人以結親為臠壻非也此比况之戲耳析城湫水祈雨祭文維神宅坎居幽有感必通騰波奮隱灑潤飛空德施振古歌舞良農嵗今旱暵藴隆蟲蟲嘉穀將槁民嗟饉凶遣吏投誠敢瀆神聰飈輪星旌夙駕山宮臨奠弭節翔薄層穹祓災宣和布雲御風囚戮妖魃震擊豐隆霈施惠澤易饑以豐歡然良俗共戴神功
