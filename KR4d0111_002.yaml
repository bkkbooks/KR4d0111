body:
  text: 潏水集卷二宋李復撰表賀安九鼎表雲物應符兆啓昆吾之瑞琳宫考吉慶成郟鄏之安中賀竊以軒轅開祥廣發三才之象夏禹圖物畢朝九牧之金而皆嚴役隂陽之神煥成天地之寶道異升降勢隨重輕周器已空遂起楚人之問漢巫語怪漫迎汾水之祠曠歷世而莫傳俟聖時而有作恭惟皇帝陛下睿謀廣大盛德休明俯收遺逸之言髙舉泯絶之典山林四裔知永息其隂姦宗祏萬年見顯儲其神策臣謬持使節密邇畿封盛事惟新激昻兹始謝復任表叨承芝檢再直河圖隕命自天措躬無地中謝伏念臣機靈勿爽器質匪竒早誤使令永甘沈廢豈意寒微之末預沾甄敘之私見齒清時蒙還舊物十年屏迹形雕墜谷之憂一日拜恩涕發戴盆之照危心易感褫魄初歸此蓋伏遇皇帝陛下好惡無私德刑並用麗日正午物無邪隂震雷發春蟲無蟄户煥青宫之縟典光動前星削丹筆之刑書澤均圜土睿斷獨髙于往古普天盡屬乎完人叶氣旁流羣生共慶熙朝接武徒結想于清途閒廩庇身悵難圖于微效賀幸太學辟雍表玉蹕和鸞肅奉六龍之御璧流黌舍親紆萬乘之尊輿誦載傳羣情均慶中賀竊以晉武視學惟行飲酒之儀漢明臨雍但講拜老之禮豈如聖世翕變道真發祕化以開人之文敘彝倫以建民之極膠庠奕奕美輪奐於綿區絃誦洋洋揭聲明於寰海恭惟皇帝陛下道致廣大性熙光明放異路之淫辭興千年之絶學海涵地産生共慶於時升雷動風行物咸新於聖作顒嚴法駕賁煥儒宫示淵𠂻勸奬之心昭熙朝華縟之典臣適分符竹阻詣闕庭臣無任賀皇太子登寶位表臣某言伏覩去年十二月二十四日手詔皇太子即皇帝位者分茅建國昔開王者之封飛龍御天今應聖人之造德音誕布海㝢均歡中賀伏以明兩作離光繼四方之照帝出乎震德孚萬物之情席祖宗不拔之基擁社稷無疆之祉恭惟皇帝陛下溫文孝友恭儉慈仁允協昌辰遂登大寶海涵地産咸欣日月之新川泳雲飛永賴乾坤之慶臣久棲田畝常苦疴瘍望九天而馳心同百獸而率舞臣無任賀南郊表迎陽候景循三嵗之彝經尊祖事天擁萬靈之殊祉恩覃動植慶浹華夷中賀恭惟皇帝陛下德大嚴親禮隆重祭燔祡奠璧昭精意於靈承灌鬯加籩孚孝思於配侑瑞霄溢彩澄海浮光風動雞星燦祥輝於雲表日開圜土騰協氣於民區凡在萌生率同茂遂臣獲頒明詔幸覯昌辰聳踊欣歡恭伸頌禱賀元㑹表龍德御春舉外朝之盛禮天心儲祉罄率土之歡心中賀恭惟皇帝陛下肅奉瑶圖紹隆寶祚正萬物生成之始擁上靈保佑之休茂對昌辰聿修縟典臣竊司外計阻拜前墀西駕飛軺日切雲天之想東傾丹闕阻陪鴛鷺之趨臣無任賀五星循軌表聖德顯孚默動九天之鑒星躔髙應燦流五緯之祥觀象告休馳聲交抃中賀恭惟皇帝陛下政修六府道格三辰賑乏養疴時錫萬方之夀育萌撫乳世無一物之疵薰然叶氣之和感彼層霄之瑞連珠騰彩順行黃道之經披籙考占永契豐年之兆嘉驗清臺之奏光垂信史之書臣向闕傾風共仰一人之慶佩符起舞均同四海之歡臣無任賀破蕃賊表蕞然醜類已大殄於龍城肅爾王師遂再臨於鄯壘復收故境憺赫嚴威中賀竊惟氐疆昔皆禹履汙隆有異蹙闢隨生未請終軍之纓莫斷胸奴之臂天寶道喪肆猖獗以東侵熙寧真興屢憂勤而西顧未航河葦忽墜烏弓比雖暫得而未完遽自速顛而還失孝思善繼舊壤咸歸恭惟皇帝陛下默運神機妙敷聖略勝决九重之上功無一鏃之遺山川開日月之新邊徼淨烟霾之翳青海薦祉願呈天馬之歌積石窮源將見仙槎之使臣叨司外計方備戎行阻稱萬壽之觴竊抃千齡之運臣無任謝直祕閣表彤庭入對洊承三接之恩藝閣升華叨奉十行之詔循墻莫避據蒺增憂中謝竊以金馬石渠內闢藏書之府蓬萊方丈天開羣玉之山育材喜詠於陵阿垂象耀文於奎壁世髙華貫時謂要途宜求特異之才可副最優之選如臣者流離弱質朴􅈪瑣材行未免於鄉人心漫期於絶學徒緣貪食偶綴辭科困簿領之塵迷已餘半世思簡編之舊習恍若前生論文未及於窺斑奏賦無疑于覆瓿自慙荒落有玷寵靈此蓋伏遇皇帝陛下德照容光道成善貸鳶飛魚躍樂聖造於天淵雨潤雲蒸鼓和風於草木欲增華於逺使故曲示於鴻私顧臣何堪被遇若此臣敢不敬思可欲無徒事於浮文力行所知庶勉圖於逺業仰酬覆幬以盡麋捐謝賞功表猥被芝書進直龍馬超兩官而躐等叢小已以增榮拜命雖優俯躬彌厲中謝竊以奮揚湯武恢復堯封集齊五路之師進冒三峽之險移金轉餉敢言一道之貧僦力鳩工寧憚六州之寡漫歷半嵗徒憚百為事切應期罔暇資於旁助功須核實豈容飾以虛辭第恐有玷於使令敢意茍逃於誅責得從善貸已荷寬恩遽冒殊私皆非素望此蓋伏遇皇帝陛下德涵博厚明照幽微審知師旅之興無若芻糧之急纍嚴聖訓慮乏軍須謂其闕事而有誅因其成功而亦録豈謂九天之邈能矜一介之微臣敢不恪勵官規益修職業勉竭涓埃之效上酬覆幬之恩臣無任謝冀州到任表叨承恩詔洊易州符祗荷寵靈但深兢懼中謝伏念臣材惟樗散識甚鼹癡務堅義守以持身敢有利心而擇事初畢西寧之役亟當東里之衝夙夜靡皇事為粗舉賜汲黯之故綬將若深鷦御列冦之泠風遽隨退鶂屢被長民之寄第增竊食之羞此蓋伏遇皇帝陛下聖度包荒仁心博愛明容光而必照道善貸而且成兩河為州濫庇信都之益九曲到海當窮積石之源顧慙一介之微曷報兩儀之施臣無任謝䕫州到任表比嘗塵疏願終亳社之仙祠今忽拜恩俾載寧江之侯斾仰䖍嚴命俯激懦𠂻中謝伏念臣淺甚蹄涔利非囊穎每自恃其愚直故動忤於貴權敢萌怨尤分甘流落知公議之有在荷聖朝之不遺滅竈更炊雖尚梁鴻之慷慨敝衣白髮久嗟顔駟之摧頽而况控三峽之要津連五溪之絶徼初崇體勢分鈐東道之兵屯洊責規模講究新疆之邊事兹非衰朽可副選掄此蓋伏遇皇帝陛下體乾好生法坤博載察臣志不圖於妄動知臣利匪在於茍求始甚迂疏後皆久逺不雷同於輕舉使安靖而少康益堅素心仰遵明詔臣無任謝賜茶藥表寶奩緹襲瑞璽泥封恩降慶霄光生蔀屋中謝伏念臣素慙譾薄叨預使令飛挽徒勤尚闕關中之粟斡旋雖力未流地上之泉漫殫夙夜之勞蔑有涓塵之效豈期眷録逺逮寒微此蓋伏遇皇帝陛下盛德兼容深仁無間示記存之必洽俾感恱以忘勞碧月紫烟起清風於兩腋丹芝玉粒動五色於西山誓竭微軀仰酬洪造臣無任謝熙河路轉運使到任表書林進直濫遊奎壁之躔邊計分疆謬領岷洮之節揆能曷稱循分難安中謝伏念臣賦性惟愚受材非敏自元豐西夏之問罪迄元符隴右之納降效官九被於終更歷嵗八逢於餘閏屢馳沙漠久應羽書備嘗險阻之艱敢意功名之㑹心安義守人歎數竒已蹭蹬於半生甘低徊於末路忽承嚴召入對清光動玉色以周詢霽天威而清問握蘭鳴佩初陪錦帳之班攬轡登車遽被繡衣之選惟河湟之襟帶乃秦蜀之藩維開擴雖新輯寧匪易用無素備利乏長源將論經久之逺圖先有倉猝之急務事機紛錯聖訓丁寧再惟責重而身微第覺寵深而能薄此蓋伏遇皇帝陛下德以立武功能繼文髙居九重之深周知四海之逺方闢國以經畫特置官以講求無責備於一夫期有得於千慮而臣誤蒙寵假罔敢辭難鼙鼓尚嚴憂在冕旒之西顧雲天初逺心如葵藿之東傾誓殫犬馬之勞仰答乾坤之造臣無任謝京西轉運副使到任表朔部分符中玷兩河之邑豫疆持節東依千里之畿仰荷休光退增危懼中謝伏念臣才非濟用識昧通方轉守三州愧鉛刀之何利總輸兩路嗟駑駕之徒勤而况急應河流之防䖍崇陵寢之奉圜府修政方鼓鐵以流泉本支疏恩初營居而頒祿盡承明詔俯委懦躬自省庸虛曷稱掄選兹蓋伏遇皇帝陛下湯仁務簡舜德用中審知世患於才難罔責人周於器使榱櫨並用輪桷同施千金受封術固慙於絣絖五管賜粟功可笑於支離臣敢不勵勉初心力圖逺業誓畢期於麋殞庶上答於生成臣無任代人京兆謝上表錦書錫命賜特出於中宸符竹分邦易再臨於舊治拜恩優渥局蹐凌兢中謝伏念臣禀質蠢冥賦分竒蹇沉舟已棄但興駭浪之悲戴盆至幽忽被容光之照起於久廢付以中權問罪興師上仰承於睿算殱渠執馘俯粗震於天威乃荷寵光曲垂慰奬至於前後之奏請盡略狂愚而憫從遐瞻天上九重之深豈啻堂下千里之逺孤悰難悉聖念皆周素無强援之先容咸自淵𠂻之垂察危心易感極涕橫流此蓋伏遇皇帝陛下智燭幽微仁均覆載日月垂耀凡卑髙曲直不能隱其情天地滋生故草木昆蟲皆得遂其性致兹寒陋獲玷甄收解圁水之師屯委秦關之藩服屢懷故綬薦殿名城自省遭逢惟慙忝冒臣方力圖涓末期寬宵旰之憂遙睇雲天徒結痗勞之思臣無任啓賀韓相太原禮上啓眷寵中宸撫臨全晉涓辰開府庶類均歡伏惟判府經略太尉相公巨德邁時沉幾先物威聲震於憬俗術業映於清時樞極深嚴肅本兵而畏厲台階緝穆耀元化之丹青一德顯孚千齡合契茂桐隂而垂䕃秀棣萼以連輝偉然家世之異倫卓爾衣冠之盛事三朝舊老四海具瞻授鉞晉邦開四封而受祉擁旄參野護諸將以宣威側聞載頌之音已布維新之政兵民輯睦羌虜敉寧顯惟當世之賢隱若長城之勢某方拘賤役阻造慶班下情不任問候集賢相公啓伏以公府深嚴徒仰熒煌之座庶僚賤冗敢塵咫尺之書宣化育之至仁奉清閒之密燕天佑一德體膺百祥恭惟集賢相公元精所生大節不奪安國家而隆禮衛社稷以履忠功髙三朝望重四海周勃在漢莊厚而可慿如晦於唐斷裁而弗滯有生蒙德無物失宜載惟孤蹤久荷洪庇阻與黃閣之拜冀精素履之頤瞻望台閎下情無任禱頌依歸之至謹具狀上問鈞候賀蘇中丞啓伏審光膺殊命榮總中司聞輿論之僉諧知聖朝之遴簡恭惟御史中丞早攄逺業妙發賢科方觀擊水之鵬忽歎遡風之鶂江湖流落淡與世而相忘金石堅完第秉心而弗易鳯衰嵗久豹變時來果承簡拔之恩登踐紀綱之地獻可替否凛然正議之歸吐柔茹剛肅爾羣邪之伏某徒勞朱墨遐睇雲天空馳賀厦之誠莫遂登門之慶賀許左丞啓伏審眷倚中宸寵登左轄側聞譽命實抃輿情恭惟左丞識際髙明德涵純茂發閩山之秀氣奏第無前鼓鼇禁之英風摛辭獨出早膺睿簡寵與政機初抗論於明庭旋均勞於巨屏淡無喜慍安處險夷雖入總於中銓猶久傾於羣望爰感風雲之㑹再依日月之光色動天文燦旁輝於軫翼味調鼎實將有待於鹽梅某久逺台閎方縻塵役逖聽芝函之異阻陪龍坂之趨茂恱之誠沛集於此賀蔡右丞啓伏審榮膺顯册進轄中臺除目逺騰歡聲遐溢恭惟右丞德涵健順學造本原夙推望實之隆密奉聖神之眷日月無幾清華遍居二耀垂光焕西崑之文采五羊流化靜南海之風波出偃要藩入虛前席比寵承於龍綍爰峻陟於鑾坡雖炳蔚於帝文猶紆抑於人望果膺睿簡入贊政機隆棟凌雲已壯巖廊之勢和羮有味將調彞鼎之珍某久逺髙風謬榮末役僣馳誠於廣厦期委質於洪鈞抃臆實深抽毫奚既賀韓侍中知長安啓伏審精差穀旦大鎮雄藩視政云初嚮風竊抃恭以慶慰伏惟判府經略司徒侍中德為巨老氣禀元英輻輳智略於上前身繫安危於天下三朝忠藎萬國儀刑帝思秦雍之區疆控夏幵之要兵須節制衆賴撫寧非宰輔之自行慮宸憂之未釋竚清邊瑣歸總台司某職繫統臨地霑厦廕瞻望旌棨下情欣抃激切之至回潁州林內翰啓日新堯厯爰開四序之初時告夏正肇發三陽之始伏惟知府內翰久懷妙畫密簡淵𠂻紫禁晝閒動雅情於紅藻鑾坡夜直驚異眷於金蓮比承將命之榮暫有分符之秩顯膺華旦茂擁殊祥顧慶禮之未修辱貽音之逺賜內循簡緩仰服謙光第頌德以罙勤豈抽毫之能既回提刑賀冬啓新陽應律長景生圭進堯厯之初躔講漢庭之亞㑹恭以提刑户部髙文華國妙略映時周通枉滯之情雅有澄清之志履兹吉旦翕受純禧顧奏牘之未遑辱占辭之逺及重慙不敏但服殊私方専奉詔之趨阻奉稱觴之慶其如傾頌罔究敷宣回潁昌林待制賀冬啓氣應發潜靜以待隂陽之定卦推歸本復其見天地之心恭以知府安撫待制盛德顯孚美材卓軼顒卬法從早登延閣之華偃息藩垣寵有介圭之錫茂乘慶旦允集繁禧逺承一介之馳先枉五雲之翰愧慙禱頌百倍常情回吳常平謝到任啓寵被恩書肅持使節涓辰任事嚮聽增愈竊惟常平立法之初實出周恤哀民之意髙資有術務厚息以侵漁重沒無端致波産而困弊務權柄歸於公上俾斂散付之有司審其變通為之改作後多觀望無異兼并皆謀疏進而疏成惟欲多散而多利强為抑配暴肆催驅孰躬美政之原第習近身之計伏惟提舉朝奉處心必厚愛物無私周知善惡之由能布朝廷之美俾民無憾與時維新已欣聖德之可傳更荷柔風之逺及其如抃對茂章豫懷
