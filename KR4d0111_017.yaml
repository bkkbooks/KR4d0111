body:
  text: 書潏水集後長安李履中世以儒業稱未冠取國學解自以年少十年不試於禮部刻苦於學元豐二年始於時邦美榜登進士第公既博極羣書士大夫皆勉就制舉公謂仕途捷徑知義守分者不與焉可也遺書彭元發往復論難終不易其操及從仕干祿不以貧為身謀當是時朝廷方欲經理靈夏時宰誘公以侍從而薦於上公毅然不就對故作兵餽行有不知何人畫此計徒困生靈甚非䇿之句後涇原路乞造戰艦五百艘姚麟乞造戰車三百輛公時為熙河漕被㫖專監視奏以謂實同兒戲辨數利害力詆其非是上察知其言忠遂罷其役其為王翦將軍廟記云自昔凡有深謀逺慮老成審的者於天下事不肯輕動新進後生不思逺圗易其事其不敗者鮮矣蓋譏生事於西戎者公以通儒喜論事而每執正議不為勢利之所移奪居官行已咸取則於六經而尤邃於易至於星厯五行小說百家罔不研精求是故時輩多質疑問難當代名士如張藝叟李成季王子發先伯祖穆父皆文字詩友也豫嘗謂古之學者本志於道而後世假以為利民之資其不為利動者曽無幾何孔子曰古之學者為己今之學者為人至若履中亦可以追配古之君子矣其孫龜年龜朋出遺集四十卷豫熟讀其文想見其風采姑托其大槩而志之公諱復以字行關中關中稱名儒者必曰履中也官至中大夫集英殿修撰其行事之詳備見于史譜云乾道癸巳嵗閏正月辛丒吳越錢端禮書象祖嘗讀樂靜先生詩云結交賴有紫髯翁鶴骨嶄嶄爛修目五言長城屹千丈萬卷書樓聊一讀蓋言潏水先生也曩先祖觀文見先生之集嘗托其大槩而志之又為之說曰豫讀歐陽文忠公集古録見由漢唐以來士之有德行文章功名事業載於金石不見於傳記不可勝言後世泯絶無聞者多矣豈真無聞耶蓋繫乎幸不幸也如潏水先生其學術淵源其文章爾雅其議論醇正烏可以不傳於世昔揚子雲作太𤣥嚴尤謂桓談曰子嘗稱揚雄書豈能傳於後世乎談曰必傳顧君與談不及見也後四十餘年法言大行則信知天下自有公論傳不傳時有隱顯爾先祖帥㑹稽時欲刋先生之集期以行逺未幾奉祠歸不克就象祖今於上饒郡齊刋之從先志也淳熙癸卯十月既望郡守錢象祖書題潏水集後潏水先生道可宗清詩華藻亦云工欲知派别從何出具載邦君大集中徐衡仲
