body:
  text: 潏水集十六卷别集類二宋提要臣等謹案潏水集十六卷宋李復撰復字履中先世家開封祥符以其父官關右遂為長安人登元豐二年進士歷官熙河轉運使終於中大夫集賢殿修撰其事蹟不見於宋史洪邁容齊隨筆載其於蔡京邢恕謀用戰艦一事上疏排詆甚為切直而恨史之不能詳盡朱子語録亦曰閩人李復案復非閩人此句或傳寫之誤及識橫渠先生紹聖間為西邊使者博記能文今信州有潏水集者即其文也其間有論孟子養氣謂動必由理故仰不愧於天俯不怍於人無憂無懼其氣豈不充乎舍是則明有人非幽有鬼責自歉於中氣為之喪矣此語雖踈却得其大㫖近世諸儒之論多似過髙流於老莊而不知不若此說之為得也今觀是集如謂揚雄不知道謂井田兵制不可遽言復古皆確然中理其他持論亦皆醇正不止朱子所稱一條又久居兵間嫻習戎事故所上奏議大都侃侃建白深中時弊亦不止洪邁所稱二疏至其考證今古貫穿博洽於易象算術五行律吕之學無不剖晰精微具有本末尤非空談者所可及在宋儒之中可謂有用者矣集本四十卷乾道間嘗刻於饒郡即朱子所謂信州本也後散佚無存談宋文者多不能舉其名氏今從永樂大典裒輯編綴釐為一十六卷著之於録既以發潜德之光且以補史傳之闕略焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
