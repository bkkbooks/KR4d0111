body:
  text: 潏水集卷一宋李復撰奏疏論治道臣聞聖人御天下也必以道而道者南面之術也其所謂道者豈但漠然而無所事哉其用至微其功至周皆隱於綱紀法度禮樂德政之間使四海安然而無事至千萬世而無弊天下由之不知其所以然而然也古之致治者惟堯能之孔子稱之曰煥乎其有文章乃綱紀法度禮樂德政之謂也巍乎其有成功乃天下安然無弊之效也蕩蕩乎民無能名乃不知其所以然而然也夫惟如是所謂道也後世無可稽焉前世自唐末至五季天下糜爛大壞有識者傷之至於不忍言國家之藝祖太宗潛而未躍熟稔昔者禍亂之所由起自膺天命凡立一法欲絶一蠧凡舉一政欲去一弊小大逺近皆有綱紀法度維持不以喜而妄豫不以怒而妄罰使居官者修其職安其分而不敢妄作不敢茍悅無狂易徼幸之心百姓守其業樂其生無橫擾困苦之患纍聖循之迄今一百六十年天下晏然自三代而下未有若本朝平定之久也恭惟陛下即位以來延見臣下必訪治道四方聞之皆曰今唐堯在上矣臣願陛下思祖宗修立綱紀法度維持天下之意不取目前之虗美而求經久之逺慮使上下各安其分守職業具舉朝廷清明民物繁富弊無由而起蠧無從而生天下不知其所以然豈非配天廣大之業哉治道莫盛於此臣疏逺愚憃不知治體狂妄獻説惟赦之幸甚議禮臣聞聖王治世莫重于禮事不由于禮無巨細皆不可行三代之禮至周而備今考諸載籍所傳者十無二三前世江都開元皆嘗纂綴舊文而行之當時折衷執於古者泥而不通順其時者陋而無法學禮者有所不取後世無可稽焉傳曰治定制禮國朝承平一百六十年髙出唐虞豈三代可擬一代禮典今猶未講至使好禮之士有家自為禮者荀况云禮莫大於聖王是惟聖人乃能制禮惟王者乃能行禮記曰非天子不議禮不制度不考文臣願詔有司上自郊廟社稷下至三祀一祀與夫冠昏喪葬賔軍辨其等威裁其文物不僭不逼據於古而不泥宜於今而不陋著為一代之典其士庶所當行則頒之郡縣使通知焉事有制度燦然可觀四夷百蠻嚮風取則為治世甚盛之舉豈勝幸甚取進止議樂臣聞治定制禮功成作樂此王者甚盛之舉天下熙洽人心悅豫發為和聲因其人聲之和而播之八音又形容其成功之象也三王不相沿樂豈茍為異哉治世成功各不同也記曰大樂與天地同和樂豈易知乎三代之樂亡已久矣唐貞觀中命祖孝孫張文收考定雅正粗而未備後纍經喪亂其器與書今皆不傳載籍所言雖皆以黃鍾為本上生下生隔八相生及其律管徑寸短長但糟粕耳有能遺其舊説脫然識其聲别其音者未之聞也夫黃鍾律之始也半之清聲也倍之緩聲也三分其一而損益之此相生之聲也十二變而復黃鍾之總乃旋相為宫之法也萬物動皆有聲若造樂精微之妙凡聞其聲則知是何音合何律是為正音是為變音是為清是為濁如此方為知音可以議樂矣近者陛下有詔選官定樂又博求前代之器夫前代之器各一時之用若得漢唐之器乃漢唐之樂也若得魏晉之器乃魏晉之樂也但欲求為多見則可矣遽欲用為今日本朝之樂恐未然也晉之荀勗取牛鐸為黃鍾出於獨見果合於古乎樂之作欲動天地感鬼神自漢以還未之聞也朝廷昔嘗定樂矣陛下以為未盡美善亦不能形容祖宗之功業而又本朝運膺火德獨徴音未明此固當重為考定也今聞衆議又只依往昔糟粕而制器此安足以副陛下所降之詔意夫知音者聞之於耳得之於心自不能傳之言遇其應於心方可默契徴音火南方之音也火性炎上音當象之乃欲就其下而抑之恐非也臣願詔天下廣求天性自能知音者敦遣令赴議樂所多方以試之是誠不謬共為講論庶幾其可矣若徒以舊説尺寸長短廣狹重輕而製器此工匠皆能為之矣何足以為樂乎臣愚見如此惟陛下擇之論虗名實弊臣聞古先哲王之舉事也常艱於其始而深慮於其終始雖可為終不可繼則不為蓋慮得其虗名而受其實弊天下四海雖甚大亦猶庶民之一家以一家之事推之乃天下之事爾臣嘗觀舊史見前世不能深思逺慮輕動生患者其事甚衆不敢逺引以瀆聖聰以臣今親見所謂庶民之家者論之臣居有鄰人承其父業負郭有美田十餘頃衣食富足不能力穡篤治為人所怵喜多田之豪名罄索家資又營逺山之瘠田數十頃欲人稱其田之多也逺田無所得常以負郭資之嵗久因逺而困此求虗名而受實弊也陛下承祖宗積纍之休無幽不燭無逺不察其多事輕動以求利者不能昧聖聰必久已察之矣固不待螻蟻之微獻其愚臣惓惓之誠更兾終謹之幸甚論取士臣恭覩神宗皇帝憫士弊於俗學之久慨然作新造之以經術發明聖人之遺言使講求義理之所歸庶知乎修身行已上以事君內以事親涖官接物弗畔於道而今之學者曽不思此平日惟是編類義題傳集海語又大小經題目有數公試私課久已重疊印行傳寫其義甚多無不誦念公然剽竊以應有司之試終身之學止於如此甚者至於所專之經句讀不知音切不識或誤中選入仕平生所學皆無可用非惟鄉閭無一善可稱雖有甚不齒者亦更不問朝廷建學立師設館給食而偷惰茍且若是安能副上教養之意哉欲責其移孝資忠臨民應務之效必不能也古者鄉舉里選非但取其浮文必皆考其素行臣欲乞立法取士以博學行義為先試言為次抑亦絶其干託奔競之私察其器識材術之異庶幾所養可取所取可用聖朝有得士之實取進止乞置𣙜場臣竊見回紇于闐盧甘等國人嘗賫蕃貨以中國交易為利來稱入貢出熙河路朝廷察知其情故限之以年依到本路先後之次發遣赴闕而來者不已守待發遣有留滯在本路十餘年者其所賫蕃貨散入諸路多是禁物民間私相交易逺商物貨厚利盡歸於牙儈臣纍次詳問所賫物貨上者有至十餘萬緡下者亦不減五七萬且逺人懷久客之情平民陷冒禁之法利贏無極盡歸於牙儈往來無已每遇發遣徒擾州縣今湟州新復正要措置使商賈奔輳不惟通其有無誠亦厚其根本之勢臣今欲乞於湟州依雄州火山軍等處例置立𣙜場於湟州别置蕃市以居來者更不發遣赴闕使利歸於公貨通於下亦可少補經費取進止乞置弓箭手堡臣竊見極邊弓箭手就土山削成峻壁盤開細徑鑿穴以居謂之崖巉凡一巉所聚少者百餘家多至三四百家其情非不樂居城邑就堡鄣意務便於耕牧又密邇敵境相與保險以防抄掠之患然本欲防患賊寇若至患不可逃蓋各潛於穴不能相救賊前厄其門尋氣窗灌浸熏燎束手就禍嚮者元祐間夏賊寇犯涇原大被其毒邊民皆自知其如此顧戀生業無以為計臣欲乞下逐路經略司委官相度就弓箭手耕牧近便處團併指揮建置堡子分擘地步先為土堋漸次修完使之就居備列戰格開掘壕塹修立門橋一堡之內正丁家丁不減二三千人於其暇時教以戰守之法逐指揮人員將校統領分定城上地分每季輪那城寨官前去點檢地分巡檢常切往來照管遇有探報無起遣之擾雖有攻圍必以死守逺近聲勢相接互相應援近年新邊城寨相去近者四五十里緩急卒不相應此壘若成血脈方通人旅行役不及城寨可就安泊不待官兵戍守而藩籬密完誠一舉而兩利取進止乞罷造戰車臣準樞密院劄子奉聖旨令本司製造戰車三百輛專令臣催促製造應副本路出入攻戰使用臣嘗覽載籍古者師行固嘗用車詩云公車千乘公徒三萬又曰元戎十乘以先啓行及周制自步百為畝積而至於通十為成成出革車一乘其他班班亦可見古之用兵與今不同古者兵不妄動征戰有禮不為詭遇皆有法度多在平原易野故車可以行敵人不敢輕犯此以車為利也今之用兵盡在極邊戎狄乘勢而來雖鷙鳥飛翥不如是之迅捷下寨駐軍各以保險為利得其機便或有負敗各逃散不相顧其往車不及期居而保險車不能登歸則敵多襲逐爭先奔趨不暇回顧車安能收非若古昔於中國為用臣在兵馬間親冒矢石前後十餘次觀之屢矣有至糧糗衣服器械不能為用者又况於車乎聞此議出於許彥圭彥圭因姚麟之子師閔而得見麟遂獻説於麟懇告求以此為進身之謀麟遂憐而上其説朝廷以麟邊人必熟於邊事意遂然之不知彥圭劇為輕妄麟立私恩不思誤朝廷之事是亦容易昔唐之房琯嘗用車戰大敗於陳濤斜十萬義軍無有脫者當時止在畿邑平地且如此况今欲用於峻坂溝谷之間乎又戰車比常車濶六七寸運不合轍牽拽不行今配買木植物料差顧工匠大為費擾既成艱於牽拽昨東來者牽拽不行致兵夫典賣衣物自賃牛具終日方進五七里遂致兵夫逃亡戰車棄於道路大為諸路之患其糜費不知其幾千萬矣茍望一官之進上罔朝廷下害百姓此而不誅何以懲後臣今乞便行罷造如别路已有造者乞不牽拽前來免致徒費人力如朝廷未以臣言為然乞賜博訪謹具奏聞伏候敕旨乞罷造船臣準尚書省劄子涇原路經略安撫使邢恕奏乞下熙河路轉運司打造三百料及五百料船五百隻將造成船於黃河順流放下至會州西小河內藏放奉聖旨専委臣監督催促打造限一年了當臣竊知邢恕欲用此船載兵順流而下去取興州契勘本路見有船匠一人須乞於荆湖南北江淮兩浙剗刷和顧又釘線物料並非本路所出昨造蘭州浮橋皆自别路應副非惟工匠物料全無臣觀邢恕奏請不止於道聽塗説亦實是兒戲且造船五百隻若目今工匠物料並備亦須數年其聲勢夏國必已詳知自蘭州駕放至會州約三百里北岸是敵境豈可容易會州之西小河醎水其濶不及一丈深止於一二尺豈能藏船黃河過會州入韋精山石峽險窄自上垂流直下髙數十尺船豈可過若只是筏木經此亦須撲散然間有浮者船既破散一沉無有却浮過此峻流至西安州之東大河分為六七道散流謂之南山逆流數十里方再合逆流水淺灘磧不勝舟載設若可行自會州之東便是生界兩岸皆是敵境一船所載不過五馬二十人五百船共該馬二千五百匹一萬人兼糧糗草料器械衣物盡在舟中縱使在河不為敵人所取雖到興州又何能為又不知幾月得至此聲若出必為夏國侮笑豈止謂秦無人矣臣今未敢便依指揮擘畫乞差刷工匠應副物料伏乞再下邢恕令詳具如何措置的有萬全之策朝廷詳酌實見可行再降聖旨造亦未晚臣愚見恐虗費錢物終誤大事不敢緘默須至奏聞伏候敕旨守坐臺鋪議臣昨見沿邊守坐烽臺口鋪最是重難自來本地方城寨分擘守坐之人不限戍兵蕃兵一例輪差東來戍兵不能辛苦多是不著臺鋪蕃兵又難以盡依官軍驅使地方官雖時或點檢終不整齊若有緩急竊恐誤事欲乞沿邊烽臺只差土兵與側近弓箭手其口鋪如土兵弓箭手人數不足方許兼差蕃兵亦不得只差蕃兵如此則烽燧巡防不致誤事伏候聖旨乞於阿密鄂特置烽臺臣近巡歷自蘭州京玉關至通湟寨入湟州路經巴咱爾宗其路極深峻窄險滑濶不及二尺陡臨宗河般販斛斗客旅畏其難行頭畜腳乘盡由宗河北路過往北路是夏國生界三處有賊馬來路又近夏國幹珠爾城溝谷屈曲賊馬隱伏不測出入抄掠前後被患已十餘次緣客旅往來通湟寨京玉關四十餘里中途倉皇南北奔趨不及遂被殺虜今京玉關東北約二十里有舊阿密鄂特城地基正在兩城中路地勢甚髙接連生界欲乞下本路經略司就彼修築烽臺比尋常增展寬大可以停泊五十人開掘壕塹築立羊馬墻安置門橋備設守禦之具差人守坐照管賊馬出入若有抄掠客旅可以奔投若賊馬數多舉烽火京玉通湟頃刻便到蘭湟二州兵馬相接而至不須更築城寨足可隄備伏乞詳酌施行小貼子今烽臺守坐并軍員只是六人若修置如法有矢石守禦之具非一二百人未敢輕犯又應接甚近夏國安肯以六人易一二百人之命須合修築今併畫圖進呈崇寧三年某月日狀乞與孫路贈官及例外推恩狀右臣某按路治平初以進士擢第歷官中外四十餘年逺職守義昔通判河州承景思立敗衄之後綏輯蕃漢人情懷附後通判蘭州夏賊攻圍抗賊堅守終能保完城壘紹聖間為環慶經略使進築橫山興平寨闢土廣屯皆據要害又招納到強酋李阿雅卜詢考敵情皆得要領元符初移帥熙河築會州等城直通涇原前後措置實而不華不敢虗飾以為身利又能愛惜民力臣近以朝廷講究邊事如路鮮有及者曽具論奏今被詔旨赴闕奏事路雖已得病以久懷邊事本末乃欲力疾造朝一陳所藴期有補於朝廷西洛士夫皆深歎仰不幸瞑目齎志歸於泉下平生清白自持家貧子幼衆共傷惻伏望朝廷優推贈典例外官一子或孫特給賻恤候將來舉葬令所在州縣量行應副庶使天下知朝廷不忘有功以為來者之勸謹録奏聞伏候敕旨相度河北西山水利害申尚書省狀右某準河東路轉運司牒坐準尚書省劄子檢會相度河北河事張商英奏河北西山諸水今為水患衆河之水出自河東乞令差都轉運司官前來河北同共相度某準本司牒差委前去今按行檢視得河東自大河之東諸水會為三川自寧化軍過入太原并汾石晉絳皆會於汾汾河南流直出河中府界之北遂入黃河欣代之間及平定軍北山之水皆會於滹沱河滹沱河東流出於真定府南趙州之北澤潞遼州威勝軍之水皆會於漳河東出相州界滹沱與漳皆入黃河今河北近西山之水非止滹沱與漳亦有他水西入於大河大河翻沙滚流沙漲時每淤塞水口水遂漫流逐處地分不肯開淤塞之處並恐渲刷侵損堤堰此事其來已久河東地居山上河北地居山下地勢髙低不可以丈尺計其水東走甚於建瓴若不放入大河令歸何處豈可截回而西萬無是理雖源出於此流必歸彼自禹之開導至於今日不可改也某今已親到河北詳説與相度河事張商英等更無别理謹具狀申尚書省乞開黃河中灘臣某蒙恩差知鄭州於今月初四日到任首見差發人夫急於星火知大河漲溢原武等掃危急緊要修疊固護臣久知原武一帶堤掃比諸處不同為鄭北盡是積水陂湖相連直接國門又地勢髙於京師若有決溢勢迅東下臣遂親至河上體度水勢次第今見大河於原武東二里以來中心有灘一道長三里餘濶一百餘步其灘已老問人云已十餘年沙土堅壯河漲為灘所激奔射南岸水勢甚緊枝梧費力臣現多方措置兩月稍見次第然今年補貼雖得稍定來年遇漲還作上軫宸慮下勞百姓臣今乞下都水監將中灘於心中東西開透令引放河身於河漕中心通流雖有暴水不偏著岸更無危急兼東西只是長三里有餘用工不多可絶後患今并畫到圖子隨狀進呈伏候敕旨河東鹽法議某準河東路轉運司牒準尚書省劄子令某賫本路鹽法文字赴都堂稟議竊惟河東永利兩監及馬城池鹽利害甚不難見其往昔措置不須詳説據目今只有三説一者官自賣一者只令客販一者官賣及客販兼行某熟曽講究若只官賣如昔年盡是抑配又有般運強差腳乘之擾若只令客販客旅不來算請招誘不行無可稱提兼慮侵奪若二者兼行互相爭侵客販難久某曽總計三處鹽課一嵗所得僅一十萬貫其中官本三萬餘貫又鐺户中鹽入官額及八分免放户下助軍糧草七分更不支移一嵗免放亦不下五六千石即所得鹽息粗及三萬貫而嵗賣及額息止如此而亦常不及額張官置吏祿廪幾何又追呼催督公吏騷擾捕捉私販禁勘連逮略無虗日此不足以當一郡酒稅之入而為河東二十餘州之患其得甚微其弊甚大又安足議况馬城池鹽尤更不堪無人算買今已七年支啖駝畜餘皆棄去乃昔日將解鹽冒進欺罔得賞本路晉絳慈隰已是解鹽地分乞將本路盡行解鹽給降解鹽文鈔三十萬􅀢付本司依陜西例分擘與沿邊州軍許客人用見錢請買或入中斛斗算請般販解鹽前來聽其自便將兩監及馬城池鹹地盡令開耕嚴禁私煎立定日限令巡尉躬親遍行點檢如私販於他處販獲並連私煎及巡捕透漏皆坐罪庶稍寬一方之刑禁一路上下皆食好鹽自來陜西鹽鈔立限七年今本路鹽鈔乞以十年為限以事初客知寬限易為招誘兼其間雨多之嵗種鹽數少支遣有闕限寬可以等候本路近北州軍比之解州東池往陜西沿邊地里猶近委是可行伏乞詳酌施行
