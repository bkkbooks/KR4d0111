body:
  text: 潏水集巻十五宋李復撰七言律詩賦杜子美劉夢得遺事壁間石刻圗經在瀼外祠堂繪像真秋去書懐傳北客歸時遺曲祀蠻神十年口語投荒謫千里兵戈下峡身嗟我南来心跡似臨風把酒寄情親杜在䕫有秋日書懐寄鄭審秘監李之芳尚書詩百韻劉有别䕫詩云惟有九歌詞數首歸時留與賽蠻神王榖節推畫草蟲花竹求詩細羽争飛翠蔓長忩間留影㸃綃光寕知臂朽専蜩翼但見心精妙楮芒詩學蟲魚增舊譜藥圗草木騐仙方請君放筆開髙臆縱意雲龍五色章王氏園置燭觀梅堂前梅樹花初徧露坐㸔花對夕風苦恨夜收春色去故移燈入素光中亂争短髪愁邉白清映衰顔酒後紅醉眼却来尋不見只疑林月碎玲瓏依韻和秦倅陳無逸觀梅渭水氷消意始回肌膚玉雪本仙材江南氣暖常先見隴坻山寒不易開二月莫傷春色晚一枝豈待嶺邉来風光切莫輕流轉未放悲雲畵角哀觀梅轥藉霜威欲斷肌傲霜挺挺發南枝微風披拂香来去皎月勾添光陸離已入鸞臺弄粧手猶存谷口出塵姿苦無踈影横斜句深愧林逋處士詩陳再有詩誚梅開晚戯酬漠漠飛香散不收無言對客似含羞雖非雪裏孤根暖却免黄時細雨愁争意競先多淺俗髙情持重自風流一株又見垂垂發肯學江邉取次休和林次中五鬛松僊人五色鼎中丹丹養松根葉不添雲散細風梳碧縷龍離逺嶠奮蒼髯雨衣鐵澀封霜甲露㸃珠明滴翠纎採醸春醪能愈疾欲求方法檢書籖詠槐當年夹路綠參差曾擁金輿拂羽旗得地偶逃斤斧幸聞風非與雪霜期猶殘臘火燔空腹時有驚雷起蠧枝想見妖靈占上象龜山獵罷舊都移古槐踈惨倚頽牆病葉先秋已半黄封植不知何歲月彫零今困㡬風霜老根傍出人供爨蠧腹多穿馬繫韁嘆惜他年承愛賞清陰曾借暑天涼和進櫻桃上宣諭近臣洛中今年進櫻桃甚大當日分賜四月櫻桃始爛紅拜章馳驛歲常同留都舊事修邦貢薦廟清朝廣孝風翠籠摘從西後苑彩奩進入大明宫近臣曾見天顔喜清曉分頒到省中和人汰竹與世論交獨厭數此君多冗豈無煩欲期虚静延清影莫懶芟除去惡根漸見逺山開晻靄更無繁鳥亂黄昏直須放手留閒地别待春雷見子孫和人筍詩葛陂龍去已千年毎見遺孫出是間未遇嚴霜懐節乆因生平地立身難長崖氣潤雲藏角暗谷叢深霧養斑春晚向空重籜盡却驚髙意不能攀和周湜雪雲表争飛鏤玉花衝烟照水弄光華徧粧庭樹能多巧亂入風簾不奈斜漠漠楊花迷客徑紛紛蝴蝶滿人家寒簷向晚凝清滴乳洞春硝長馬牙六合天人競散花坐驚門地亦清華川原霽後龍鱗出島嶼平時鳥篆斜秀發園林春萬里寒生樓觀月千家待㸔陽律還暄早破潤乗凌見翠牙暮飈作氣動長林渇意經時恨未深亂學飛花穿竹户散揺清影落池心生憎拂面輕難改更覺衝風薄未任狡但從開㡬穴韓盧㑹逐曉蹤尋毰毸亂舞出烟林落乆臨階試淺深平盡髙低寛眼界放開虚白見天心狂傾月窟愁将竭厚壓坤輿恐未任潤澤功成本無迹便回春意欲同尋和朱給事上元早雪玉花清曉作餘寒雲暗重城晻靄間初逐細風飛寂寂旋随小雨潤斑斑萬家燈火方行樂九陌輪蹄肯放閒向晚霽開斜照在門前栁色未藏山和孫俣朝奉立春閏餘随臘報迎春便覺勾芒令有神流轉光陰頻著物峥嶸歲序苦驚人花装寳蠟餘枝弱菜㸃彫盤小綠勻從此試聴枝上鳥漸傳芳信語言新梁元彬招池上府㑹辭之以詩東郊日日喚春催得意晴天浩蕩来病客強因寒食起新花不為老人開塵埃邉叟抛書卧鼔吹山翁倒載回欲問湖光㡬時淨試容扶杖獨徘徊和郭户部中秋月重雲宿靄風收盡千丈銀毫吐海涯露氣洗開青玉闕龍宫浮出白蓮華寒驚棲鵲翻庭樹陰引靈珠耀浦沙我是襆巾修月手玉皇應許上仙槎潞守歐陽叔弼召登鼎軒暑飲崇軒寫物體模分爽拔風擕顥氣升王粲消憂思眺聴本初持飲滌煩蒸金烏不轉銅壺箭碧盌時分玉井氷毎見喜公如玉雪更因執熱服吾膺再和叔弼暑飲古製雖存事一新竒峰時作火雲升慿風髙棟能虚爽欲雨炎天故鬱蒸適意浮沉多野果熱中咀嚼喜清氷别裁偽體親風雅若比陰鏗豈敢膺答晦叔求飲墨客髙吟動碧雲蕢桴輕笑鼔雷閽千尋自分遺樗散百和何堪借棗昏按劍夜光驚暗擲揮絃流水喜新論乆聞逸興須酣發願㸔長虹出淥尊和江晦叔喜雨千里人懐閔旱心輕将歲事叩天閽驟傾江海繁聲合盡滌山川沴氣昏官責時豐聊共喜歸休興動欲誰論更思田父相邀樂歩屧春風倒社尊和朱公掞給事喜雨喜雨髙吟夜不眠飄飄秀句選青錢已推覆斗占穰歲誰事操豚祝下田滿澤新秧初放溜連雲髙樹欲生煙未知美價堪多少洗盡人間苦暍天中秋客至不赴郡㑹次范君武韻經歲相期盡賞心虚堂有客阻趨塵登樓君似庾老子挟䇿我為臧丈人清據胡床興不淺来尋竒字夜相親莫言糟粕無佳味未許桓公媿斵輪和李獻甫守歲枯鰕乾栗排野盤擁爐酌酒兒女筵却愁詰朝秖明日便數今宵為去年瞻星惟恐斗柄落續膏更願燈花燃小癡老怯坐自笑無補漫廢通夕眠次韻鮮于之武逰南谷字彦桓山光娱客古城東雲散春陰望處空畏影戯魚依藻綠避人飛鳥動巗紅林間野坐分溪石岸曲晴行喜水風舊事共髙文字飲新逰盡寄語言中芸叟召杜城晚飯遂宿於東軒欲同逰五臺寺有詩因和其韻第五橋東潏水濱山紅澷澷綠紛紛溪邉童子風雩舞林外先生植杖耘髙論但談雙樹法勝逰将歩五峰雲東軒夜乆清無寐山雨初從葉上聞次馬承議韻浮雲飄忽竟多姿蒼狗須㬰化白衣對客莫思捫蝨語乗風且共跨鯨歸巖巖清壁三千仭鬱鬱寒松四十圍君㸔時光易流轉新霜髙葉又朝稀依韻答俞承議南北相望已十年白頭相見喜留連風埃異國君多感朱墨勞心我自憐事可寸心能有㡬生無百歲澷憂千一聞新賦思歸去韋杜溪邉訪舊田次韻李忱承議所恵詩字天輔人生飄蕩若浮雲邂逅乗風忽聚羣嗟我淹留今倦宦喜君傾倒細論文揚舲覺海宗提印授鉞詩壇勇冠軍荒學澷勞無所得鼻端聊假一揮斤和胡漕鬬茶分藥萬里飛香入晉山髙真秘籙露談端春雷發地巗驚綠夜鶴飛壇鼎轉丹仙桂清風生兩腋玉壺五色抱神丸虚談論罷無塵事林外姢娟月半殘和成季芸閣磨鉛勘舊經昔聞同舍此同升九楹置榻從頽偃百尺浮空逺濕蒸玉鱠堆盤魚勝雪綠荷傾飲酒凝氷家風牢落承推奨深愧龍門昔有膺依韻和南子強雲路天門白日開豈無松桂出蒿莱於斯未信誠可矣如或知爾何以哉鏗然舍瑟有異撰豈必讀書無取裁業廣惟勤今汝畫覆簣不止須崔嵬和劉丈招與康集同逰韋杜潏水橋邉縱客車去天尺五訪尋初按圗韋杜風烟在遺址隋唐錦繡餘雨後晚花寒寂歴霜前老樹半彫踈松間有酒来招我逺約相依造隠廬時李支使隠居在杜曲以詩見招和尹宗閔書記四月二日候客溪上潞守李獻甫具飯有詩溪園經歲不曾開逸興何妨候客回春色堂堂辭我去暑風咄咄逼人来追凉故繞池邉樹分坐時侵石上苔皂盖歸城魚鳥樂更延虚静獨徘徊酬汾守鄭大夫鄭公賦政鬢如絲符竹新分晉水湄招客逺郊常置驛論文古訓舊箋詩漢庭行曳尚書履涇谷曾刊隠士碑今日湖亭共逰汎追懐子美昔同時李之芳與杜子美同於鄭審秘監湖亭汎舟暑中即事掛壁清羸金粟像映牕性相净名經門前野水流繞舍雨後綠槐陰滿庭凉簟醒心須稍健好風吹鬢欲重青此間真境誰宜到更有珍茶一種靈静坐一室蕭然不受塵簾垂踈竹映深門擁衾調氣煩呼吸據案翻書費討論南郭子綦初喪我毗耶摩詰已忘言盡傳息慮何須息竅鑿無傷混沌存和劉君俞逰華嚴寺謁文禪師華嚴法界出諸天帝網重重絶世縁昔有髙僧開寳刹今留飛閣聳瓊田身逰色相無窮境心悟虚空不住禪碧眼胡人香一炷分来今欲對師燃靈山勝致古今同下種開花一線通峴首道安酬鑿齒江西馬祖對龎翁㘣珠逈耀千淵黒滴乳微傾六斛空我有宿縁香火念閒来相與論幡風暑退病起沐罷倦卧得芸叟詩招為草堂紫閣之逰酬以来韻八月秋髙肺病蘇深居吾亦愛吾廬晚風剡剡初衣裌白髪蕭蕭不滿梳困著藜床眠北牖逺飛蝶夢訪清都覺来聞有雲山興親寫新詩欲起予酬晉倅徐發承議黙黙窮年逐衆行杯坳浮芥竟何成交逰似夢逢還去世事如塵掃更生未訪故溪舟一葉空嗟短髪雪千莖病衰易感傷揺落一夜西風枕上驚天輔歸休再用前韻并其弟恪子勉所和詩見寄再酬之西北秋風動碧雲經年忽忽慘離羣去辭北闕投新綬歸老東山綴舊文詩遇恵連須長價書從阿買可張軍平生勝理思懸解糟粕徒觀愧運斤同君俞自牛頭寺至興教院又㑹文師杜曲樊川舊化城東西相峙兩牛鳴巖前寳塔藏遺燼殿裏長燈續舊明萬法分流皆有相一心息妄自無生叢林是處經行徧㑹向東山記姓名贈楷長老靈源獨耀脱根塵豈論空身與色身若論有無寕見法須知開悟不因人病瘖得味難形語走餓還家忽忘貧薪火相交多少險煩師與衆指迷津天竺僧金總持金輪風火轉無涯震旦觀光渡海沙八萬言詮歸貝葉三千世界聚蓮花有縁禽鳥来波第随喜天人盡木义今古少林風月在閉門常御白牛車蔡元度話其子能言前世事江晦叔有詩次韻應感随縁各有因一源真寂自無塵須知此物非他物能悟前身是後身叔子探環喬木在房公發石舊書新區中誰是王文度證印曾逢竺上人徃来積習㡬生身石上精魂世共聞北澗水通南澗水南山雲繞北山雲光含衆色珠常静影入千溪月不分試向道人談實相神竒腐臭但紛紛次韻錢穆父内翰題劉掾詩集朱絃曾聞三歎曲青松自長千歲枝意来是有我輩語佳處只應能者知舊心洗盡萬斛水新愁誰争半額眉清興飄飄仙奕奕欲逰天外戯雲螭依韻酬張公燮城下清溪照病容溪邉開席豆籩豐故應舉酒殷勤處欲慰踈花索莫中短髪蕭蕭羞帽側強顔咄咄學書空青山行卜他年樂深結茅廬訪徳公次韻李信叔不見吟翁近十年驛亭相遇兩欣然旋臨野岸烹河鯉賸向鄰家送酒錢對雨張燈留夜榻傍籬繫栁泊歸船此生自斷君休問早晚須芸杜曲田和徐發承議懐歸駸駸長路倦羸驂搔首飛塵苦戰酣猿過故山驚曉帳苔生舊釣暗秋潭土風膏潤田耕熟物意清幽井汲甘一别㡬年勞客夢㑹擕藜杖破晴嵐和胡吏部醇夫妙語飄飄慰旅窮自憐飢味得甘豐朱絃恨廢髙山乆明月驚投按劔中垂翅為逢勍敵勇傾嚢但媿鄙夫空相從知便忘形跡一鶚先曾玷至公依韻酧蔡陽叔赴永倅留别朱紱翩翩别乗行候人楚語喜秋晴君山木落洞庭濶帝子魂歸湘水清曾嘆選官稱一字舊聞世譽重三明餟醨若訪垂綸客葦岸夷猶鼔枻聲次韻吕元鈞給事嘉川驛来詩相逢莫厭重留連邂逅浮雲只偶然前日一樽窮樂事今朝千里感流年塵侵遺跡留漳水風入髙吟動蜀鞭錦鯉徃来出江浦應傳秀句滿嘉川送客至西湖湖亭獨徃客初歸春去春来盡不知新竹出梢纔放籜斷蒲經雨别生枝山寒藏雪添雲濕風送飛鷗過水遲却笑偷閒得忙事自尋鄰叟問鈎絲吴安老罷制舉赴安吉任南北飛鴻迹影孤青衫相見十年餘中銓簡士歸繩墨小邑沉才謹簿書㳺刄屠龍傳世學飛章薦鶚待公車太平藻繪須文彩今日何人誦子虚送衛奕之西河任藹藹長空春已歸東風猶在綠楊枝故人錯莫送行處流水蒼茫無住時汾上先生能理曲河濱退老喜論詩聞君此去追髙躅應忘青衫簿領卑送孫甥名永字祖修痩馬駸駸渡洛行東風莫著褐衣輕為嫌愁夢能催老故懶題封去問程千仭㑹㳺懸水急五漿須信客心驚明朝我向壺闗路待約歸纓共濯清送張景純我居杜陵君淮東平生南北馬牛風雲山一日邂逅見草木千里臭味同今朝歸心逐社燕他日付書随春鴻不堪立馬向日暮索莫酒散秋堂空送趙侗承議致仕歸聊為五斗陶元亮却愛三龍邴㬅容蕙帳曉空驚怨鶴客衣夜薄感寒蛩江邉朝露半紅葉天際晚晴多碧峰漠漠長空何處盡雙鳬飛去曉雲重送董億朝奉北㳺汗澷遺𤣥珠烟愁霧泣啼芙蕖興来便脱上方屐歸去重修繁露書一夢百年依幻宅五湖千里御風輿家山芋栗應常熟坐㸔朝三戯衆狙送陽孝章户曹前生問學仰前修親髪星星祿始謀千里束書来北闕一朝懐牒走南州荷衣未改斑衣戯斗米聊寛負米求想見江神能世態開㠶風滿送歸舟
