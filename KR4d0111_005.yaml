body:
  text: 潏水集卷五宋李復撰書牘答曹鑑秀才書辱示諭六律六吕隂陽配偶此説舊志甚詳亦衆人之説多矣一律一吕亦各有五音此自然之理也京房受學於焦延夀以其法衍之為六十律又增之為三百六十以合卦之三百六十爻分而直日以一律一爻以御一日用之以推寒暑隂陽天地風雨氣象休咎及於人事各有驗者此非始於錢演之創意為之也律以當月者為宫宫君也為月之主猶律之本月卦稱辟也音之正者不過乎五其變不可勝窮矣古樂不傳但自戰國以來樂尚哀思能令人悲昔者師涓鼓清商平公曰最悲師曠曰不如清徴嵇康云導其音節則以悲哀為主美其感化則以垂涕為貴皆亡亂之音也答曹鉞秀才書承問數因律有此非也物生而有象象滋而有數易言天數五地數五又曰參天兩地而倚數則數出天地之自然也蓋有物則有形有形則有數也太極元氣函三為一元氣之中亦有數也前世有作以律管主其數黃鍾律長九寸徑九分實以秬黍引黍之數而伸之則為度積而計其所容則為量纍其重輕以為權若此律之數正則律吕五音皆得其正是黃鍾之律雖律度量衡之取準其數乃用天地自然之數也隋唐以前律管雖法於古而不盡合於古故玉尺玉斗銅尺玉律隨時各異又有以馬尾禾薸蠶絲定其分秒者紛然殽亂終不可慿今若能識其秬黍之中粒以定律則權衡度量皆得其正數樂之五音亦正矣周禮璧羡以起度乃數寄於器使天下稽之而不敢變也非因璧乃有數也舊律管容黍多寡不一乃是不識正秬黍而妄為之説晉之荀勗欲以漢之玉尺定樂又欲以正藥劑之分兩若以正樂便是漢樂若以正藥則升斗分兩乃張南陽所用之多寡也又答曹鉞秀才厯法承問厯法古之人皆舉大數周天三百六十五度四分度之一日行遲月行疾每月二十九日過半日與月相會而晦朔成焉或三百五十四日或三百五十五日或三百五十六日而成歲以天度計之日每日所行一歲所餘積三年而為閏計十有九年而七閏古之厯法十有九年而為一章其閏餘盡也以十一月朔旦冬至為厯之始故為厯之元也至十九年閏餘盡又得朔旦冬至故十九年為一章也積章而為蔀積蔀而成紀此乃厯之綱也厯法終千古一律但有損益爾唐自高祖至憲宗厯凡十變其間謂之精者李淳風與一行二人此專主大衍之數也又答曹鉞秀才承諭厯法有差此昔人所患不知幾千百年矣近年尤甚若皇祐三年十二月二十五日壬寅也以崇天厯法自下弦後庚子日至壬寅日巳時行青道離積分計二十八度二十二分一十二秒躔尾宿七度九十分六秒其年十二月二十七日立春次年正月朔戊申日在危宿六度雖用四象程考月離及用古法以盈分反減其於合朔尚逺又以開元大衍厯法推步月離更不考四象自交度日為始日有屈伸分以升降驗其九道所躔尾宿青道九度亦不合朔以此推之五星之遲留伏逆與夫二十四氣豈得無差昔年聞朝廷嘗詔衛朴考定衛既已無目而廢天下之視其法如何兹非一語可盡承問唐堯用高陽氏之厯以四星正四時之中或以昏或以明二十八舍惟考此四星驗之蓋此四星四方之中星皆屬於日於今驗之分至前後不無差也今厯中之語雜用天竺梵語若以日為密月為草木為嗢末斯水為滴金為頡那火為雲漢土為雞緩是也古法冬至日在斗自漢武帝行太初厯以承秦後改用夏正當時以為甚密不四十年推步不合至靈帝時會稽東部尉劉洪究之始悟四分於天度疏闊皆斗分太多洪改作乾象歷以冬至日在斗二十二度後鄭玄受其法以謂窮幽極逺後不數十年而又差至魏景初年推步日有在女初度者日行盈縮遲速積之年久所差遂多故十閏之後厯多改也某又上又答曹鉞秀才某辱書承春寒動止佳福知討論不輟甚喜所諭黃鍾生於此日漢人之言也班固取之成書初漢武時議厯者作太初厯分一日為八十一分以為三統之本黃鍾律管長九寸徑九分以九相乘八十一分以配於日故曰元始黃鍾初九自乘一籥之數得日法乃附會之説也大衍之數五十其用四十有九一者數之總也四十九者數之用也凡言數必先求一得一則數自然生不得其一則無由見數既得一而用數一乃在於所用數之中矣非惟大衍之數求一而九章之法亦然今揲蓍取四十九莖兩手圍而未分雖四十九莖聚而為一也分其一於兩手然後有數矣此一在四十九矣承問厯法之必差此自然之理也天行不息日月運轉不已皆動物也物動不一雖行度有大量可約至於纍日為月纍月為歲盈縮進退不得不有毫釐之差始於毫釐尚未甚見積之既久弦望晦朔遂差則厯法安可不革而正之此所以貴乎治厯明時也杜元凱言日行一度月行十三度十七分之七有竒當集此之遲速以考晦朔以校閏月閏月無中氣而斗柄斜指於兩辰之間此亦大略也其委曲子細不能盡自漢以來言厯法以驗春秋者多有不合亦有當時史官之失亦一厯不能盡也五星行度凡推步以本其始厯法既差後人又於中間别為之法曲求其趣尚有不合須臾以仰觀瞻其行度為正日月行度皆易見五星則有伏見雖然七政推移蓋由二十四氣之運氣若有沴則星步安得不差則其失度之甚者遂有變異變異若出必有類應在天成象在地成形象見於上則形應於下皆由其氣而然也日運十二辰為一百刻以分晝夜冬至日在斗夏至日在井今之厯冬至前後各一十八日晝四十刻夜六十刻於夏至前後各十八日晝六十刻夜四十刻過此各漸有進退考之大較而然也昔之造厯者亦有言夏至晝六十五刻夜三十五刻冬至晝四十五刻夜五十五刻皆非也妄説也若百刻增於十二辰以四正子午卯酉增其餘分亦有不合其春秋平均亦不必在二分之日試更驗之某啓周人建都以偏於東西南北有寒暑風隂之異而求於陽城以為天地之中而測景焉説者以謂地形西北高東南下極星在北斗亦在北如此則陽城非天地之中也極星乃天之中也天之中即地之中陽城前人有謂取朝貢道里之均此或近之測影立表八尺冬至景長一丈三尺夏至景長一尺五寸伏地而望表端以日去表逺近揆之可以約其日去地之里數但不曾親至陽城驗之又不知捨陽城他處測之其景如何算表景與日之相去乃九章勾股法閲之可見承示步七政之法必求中星此厯之綱紀也氣在朔望則正而易推昔人言顓帝作厯其時正月朔旦立春五星會於營室冰凍始泮蟄蟲將發天日作時地日作樂人日作昌鳥獸萬物莫不應之故顓帝之厯得氣之正歷高辛唐虞弗之改也至湯作殷厯十一月朔旦冬至為厯元首下至周魯及漢皆參用之故漢太初元年歲在攝提十一月朔旦甲子日夜半甲子時冬至以為太初厯首冬至乃十一月中氣也中氣在朔必承十月閏之後前閏則中氣在朔此以十九年為一會也傳曰履端于始初氣也舉正於中中氣也歸餘於終乃積而為閏也韋昭之徒不知十一月朔旦冬至日在斗斗為建星日月所會故厯以此起首乃謂得氣之正甚非也辱問孔子必欲行夏之時謂商用地正周用天正夏用人正三代損益用之以周之文弊故於禮樂則從先進時必行夏此近時科舉之説也夏時乃天運之正也堯舜璿璣玉衡以齊七政東作西成南訛朔易以四星正四序之中亦當時之厯也夏后用之不敢革蓋無可得而革也後世世喪其道七政之運與隂陽之氣有差歷代推測故有不同不可一定而議以至日月交食不在朔望當蝕而不蝕不當蝕而蝕此厯之失若月於晦朔當隱而見過朔當見而不見乃行有緩急也五行之精上為五星不失其色而應其四時者為吉五星同色謂與其所比之色同也凡青比參左肩赤比心大星黃比參右肩白比狼星黑比奎大星若五星同為一色則色有害其氣者矣歲星在天歲隂在地司馬談天官書曰歲隂在攝提格歲星在星紀歲隂在單閼歲星在玄枵然後知厯法歲星當與歲隂合謂若歲隂在寅歲星當在亥以往年厯推之是如此自嘉祐丁酉年驗之多差近年尤甚歲星常先月餘近年以來常先一百二十餘日厯家未有人究其行速之由試為究之辱問分野十二辰之所主舊史甚詳如漢史言高祖入關五星聚於東井以應秦分此甚著矣又如分野雖主於秦其星却主於晉分井鬼與柳皆有度數分主上黨雁門太原定襄代郡若昴又主天衢又為胡星又為旄頭星他皆類此不可專以一事言也晉志所説亦如此風角之術亦略聞之非獨於軍陳凡一郡一邑一家一人之事皆用之管輅至人家或去或留或索酒食乃用此術又答曹秀才某啓久不聞問傾遡良勤辱書審體中佳適頃叔弼到郡已久困於局事相見不數書目尚未曾問張氏所藏散亡略盡時有所疑無可檢證深所患也五行若甲己木丙辛火乙庚金戊癸土丁壬水此揚雄聲生於日之説也以五隂並隨於陽夫皆專之也乃厯家言歲德所在陽德自處隂德隨陽之意厯家本歲隂而為言也五音便是五行非生於日也若甲己土乙庚金丙辛水丁壬木戊癸火乃醫術所用五運氣也若甲子火丙子水戊子土庚子金壬子木乃淮南劉安書律吕之論以甲子為仲吕之徵丙子為夾鍾之羽戊子為黃鍾之宫庚子為無射之商壬子為夷則之角也揚雄淮南不知自何而言醫之五運本於素問與玄珠五行之氣兆於太極之初十干行於天地之中涵生萬物此性命之理莫之敢違也五運其氣相生循環而無窮不可輕議更請思之或别有説無惜示諭方遽不暇子細五行之變遇事物皆有洪範初開其端也論月食承書論月食甚詳此不須求異説日月之行各有度數所行之道其由自可推然月者陽體內藏衆隂外附者也其象是坎卦坎卦陽在中而隂在外是為水也水乃受光非發光者水之有光待日與火照之方出月之有光待日照之方出禮所謂遡於日者是也半照為弦全照為望望為日光所照反奪日光者當日之衝有大如日者厯家謂之暗虛暗虛當月則月光必滅故為月食張衡亦曰當日之衝光常不合是謂暗虛在星則星微遇月則月食若日奪月光遇望必須食然亦有不食者由其所行之道異也所行之道若交則犯故日月互相食也交在朔前則日食在望則月食大率一百七十三日有餘而道始一交非交不相侵犯故朔望不常食也道不正交故有斜食半食上食下食雖然此乃大略也其餘不能逃其數矣孟子謂茍求其故是也答人論文書易曰觀乎天文以察時變觀乎人文以化成天下夫所謂人文者禮樂法度之謂也上古之法至堯而成故孔子曰煥乎其有文章周之德至文王而純故傳稱曰經緯天地曰文此聖人之文也後世有一善可取亦有謂之文者孔文子公叔文子之類是也此皆以其行事謂之文也昔之君子欲明其道喻其理以垂訓於天下後世亦有言焉以為言之不文不可以傳故修辭而達之此言之為文也非謂事其無用之辭也以載籍考之若書之典謨訓誥誓命皆治身治人治天下之法此書之文也國風雅頌歌美怨刺皆當時風化政德可以示訓此詩之文也廣大幽微逺近善惡開天地之藴極性命之理以前民用以濟民行此易之文也言約而理微褒善而貶惡以明周公之制以為將來之法此春秋之文也禮之中庸言至誠為善率性之謂道君子篤恭而天下平此中庸之文也今觀春秋則不知有易觀書則不知有詩豈相蹈襲剽竊以為已有哉其言之小天下莫能破言之大天下莫能載後世尊之以為經而無不稽焉此其為文炳如日星而光耀無窮也自漢之司馬相如揚雄而下至於唐世稱能文者多矣皆端其精思作為辭語雖其辭浩博閎肆溫麗雄健清新靖深變態百出率多務相漁獵自謂闊步一時皆何所補哉亦小技而已豈君子之文歟茍能發道之奧明理之隱古人之所未言前經之所不載著之為書推之當世而可行傳之後世而有取雖片言之善無不貴之矣夫文猶器也必欲濟於用茍可適於用加以刻鏤之藻繪之以致美焉無所不可不濟於用雖以金玉飾之何所取焉答人問政書近世言治者以為不行三代之政不可以言治此言雖善以當今論之未可以遽言也故切於事者謂其不適時變浮闊而無補皆取尤於世矣何謂其言之善夫三代夏商之政不傳惟周之政於書傳可見其槩而立政盡皆有本一夫一婦受田百畝勞來勸相督察皆有法歲或不登則舉荒政以賙之此養民之政有本也兵車皆寓之於農講閲有時出則以公卿大夫將之此兵政有本也上自天子之都下至鄉邑皆有學孰學序庠遍於天下教以德行道藝月吉考其實次第升而官之此取士有本也所以其政美其治久故曰善言也何謂不可以遽言夫井田之法壞已久矣今天下之田皆私田民自養也民之私田可盡奪而為王田以周制分授之乎此養民之政無本也兵農判已久矣今可以盡散官軍不為之養乎可以盡籍農民為之兵乎能使內之公卿大夫出而為將履行陳冒矢石乎此皆決不能是兵政無本也今自京師至於郡邑固有學矣所學皆無用之浮言取之不考其素委二三人之私見惟論其一日之長此養士之法無本也此三者皆事之大者其弊不能革雖欲革之並無其術故曰未可遽言也然則如之何其可也亦曰觀時之宜酌今之政損益以致其美意法雖未盡變猶庶幾矣夫非常之原黎民懼焉當徐而措置之良農力穡以望歲其本在於布種布種必俟時非其時則種無苗而歲荒矣立政之本亦若是也與侯謨秀才某啓辱手書承雪晴文履清適杜詩謂之詩史以班班可見當時事至於詩之敘事亦若史傳矣知欲注其所用事實得暇為之甚善但大作册闊作界行四邊多留空紙以寫杜詩凡有見其所出隨即注之此須日誦其詩而不忘乃可為若欲解釋其意須以禮義為本蓋子美深於經術其言多止於禮義至於陶冶性靈留連光景之作亦非若尋常之所謂詩人者元微之作墓志甚稱尚竟不能發其氣象意趣蓋子美詩自魏晉以來一人而已東方生言文史三冬足用能不倦尤佳也又承問杜詩所用事實杜讀書多不曾盡見其所讀之書則不能盡注今藏書之家甚少有藏者不肯借人嘗於一二家得其書目亦少有異書雖昔人常見之書今已謂之僻書其間又用方言如岸溉土銼乃黔蜀人語須是博問多讀兹非日近可了某昔年亦嘗注之事實稍備為人借去不還世謂借之與還皆癡正爾也若有所疑可見諭又承問子美與退之詩及雜文子美長於詩雜文似其詩退之好為文詩似其文退之詩非詩人之詩乃文人之詩也詩豈一端而已哉子美波瀾浩蕩處處可到詞氣高古渾然不見斤鑿此不待言而衆所知也若以一聨一句觀子美未可與議白鳥事戴禮云丹鳥羞白鳥丹鳥謂螢也白鳥謂蚊也朝宗人共挹盜賊爾誰尊子美詩意多如此知止於禮義也在蜀豈不欲歸見時事未敢歸後至衡南方欲歸有別湖南親友詩可見也回王子發舍人某再拜不瞻旌棨已踰旬矣下情傾向即辰不審尊候動止何如唐沈香亭雖唐人詩及小説曾見有言者舊史不載敬宗時有海外蠻商李蘇沙進沈香亭子材拾遺李漢疏云以沈香立亭不異於瑶臺瓊室不知曾立否不能詳見今人以興慶池東小亭為舊迹容更訪問與王漕欽臣某頓首再拜運使駕部動止萬福某久不欵教益下情不勝瞻仰向者從行至舊隋城蒙諭討尋故事隋氏舊城草創無所紀録今有唐鄧世隆所撰東都記世隆貞觀十三年為著作佐郎所撰乃隋東都事今納上鳳池草藳僖宗時宰相鄭畋集在田槩處曾見之可令取也不宣某頓首再拜回運使郭户部茂詢某蒙批問上元觀燈起於何時某見舊史西漢正月望日祀太一從昏達旦又西域記摩竭陀國正月望日觀佛放光僧俗燃燈供佛又見陳後主元夕燈山詩云分桂常疑月映柳乍依星唐睿宗先天二年胡僧婆陀請正月望後開門燃百千燈睿宗登延喜門觀樂凡四日至開元十六年又令開門燃燈三日天寶三年降詔正月十四五六日三夜開門燃燈今後永為定式某批上回蔣夔教授某啓承教貺伏審起居清福所示石經乃唐本耳字畫不甚佳唐寶歷年間鄭覃為工部侍郎患經籍訛謬博士沿習難於改正奏召宿儒興學校定六經準漢故事勒石經於太學以正其闕覃後為右僕射兼國子祭酒奏起居郎周墀水部員外崔球監察御史張次宗禮部員外溫業等校定九經旋令上石後進石經一百六十卷蔡雍石經當在洛中覃乃宰相珣瑜之子此舊史載之甚詳可閲之墨本上還惟檢入不宣某再拜回嚴司理某辱簡喜聞纍日動止安佳承觀古印二紐祭尊非姓名乃古之鄉官也昔于説苑載鄉官又有祭正亦猶祭酒也某家舊亦有文曰成隂祭尊大小形製與此印政同陽邑侯後漢明帝曾封馮魴今此文曰陽邑侯印不知是馮魴之印否形製刻畫甚古與某家所收關內侯印相似昔年在同州見太守孫亞夫出一金印刻曰三水王印其印差小字畫亦與此略同某家中尚有十餘印請來觀所示二紐謹納去請檢入某上與喬叔彥通判某嘗見張丞相士遜知邵武縣日編集閩中異事云泉州東至大海一百三十里自海岸乘舟無狂風巨浪二日至高華嶼嶼上之民作鮝臘鱗鮺者千計又二日至􅔢鼊嶼􅔢鼊形如玳瑁又一日至流求國其國別置館於海隅以待中華之客每秋天無雲海波澄靜登高極望有三數點如覆釡問耆老云是海北諸夷國不傳其名流求國隋史書之不詳今近相傳所説如此去泉州不甚逺必有海商往來可尋之訪其國事與其風俗禮樂山川草木禽獸耕織器用等事并其旁之國亦可詳究之或得之望録示閩有八州南乃甌越北乃禹貢揚州之地山川竒秀靈迹異事彼所傳者必多使軺按部歷覽可見因風望詳書以付北翼深所望將以補地志之闕也某又啓又某上啓去歲辱書惠嘗遞中附謝不知浮沈方切馳仰再蒙華翰伏審體中佳粹某來畿右行將二年公私無補但奔走無定甌閩絶居東南叔彥持節已久未報除代思卜晤語何日可約惟冀善加調護不宣又某蒙惠古田玉版紙瑩滑可愛不勝感荷武夷山聞之久矣昔於張公燮處見畫圖事實不甚詳備與傳聞者粗得其一二聞南唐時曾命監察御史張紹撰會仙觀記所載可考今此碑存否往昔郡人曾有所遇聞雲中贊彭令昭歌人間可哀之曲此曲聞今尚傳煩叔彥令用紙畫此山但設粗色貼出事迹詳之及求彭令昭文曲只付邸吏令傳至此幸甚某又上與都秀才某啓辱書貺伏審涉春履用清粹甚慰甚慰及蒙惠金石凌感荷感荷所喻補養之法極有理趣某見古法以甘辛發散為陽酸苦涌泄為隂鹹味涌泄為隂淡味滲泄為陽或散或收或堅或愞或燥或濡此古人以飲食滋味為治法人若盡知此而日用之乃養生之要術也素問曰若裏首以濕大筋軟短小筋弛長首之中濕而筋病何以不同五行一也何以火獨有君相自昔不曾有説至如論芤脈者或云如彈弓窠或云捻蔥葉今人病而得芤脈者多虛而有熱作失血之疾而切脈者亦罕論其脈之狀不知曾見别有説否尋常見得此脈者多是虛藏冷榮中有熱也向在京師與杜壬論人或無事過服熱藥必有耳疾以熱性炎上氣壅所致吕漕服磁石丸為效其應不出人意固知道不逺人矣向嘗説殷孽孔公孽皆是乳床陵川亦有欲略借觀恐異時要用庶知其真也真禹餘糧求少許或聞七月欲來上黨顒俟顒俟未間切祈加愛不宣回劉夔章某啓前日辱惠訪未及往謝又蒙長箋益負愧怍之甚蒙諭欲某為先德文集作序及書志石近得錢穆父內翰及韓師德大卿書皆以書志石見屬某字畫拙惡方欲作書辭於二公今重承敦諭勉以從命文集作序某久廢筆硯非某所能亦非某所敢當幸惟孚諒局事倥偬不獲裁啓修謝悚仄悚仄不宣某再拜又某再啓洊辱簡貺伏審孝履支持感慰感慰作序鄙誠已曾奉聞前人為人作序或門生故吏心所懷感稱道德業或朋友姻舊揄揚其美或求重言取信於人或求能文者為之稱與此皆作序之端也某於先德素昧平昔職輕位下又不間於文何能取信恐識者以某為妄人是敢固辭幸惟見察志石請令置來此中得暇當為書之亦只作韓師德書也不宣某再拜
