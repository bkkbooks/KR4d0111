body:
  text: 潏水集卷四宋李復撰書牘與運判朱勃正言書某再拜違去聲光半月不勝瞻仰即日不審尊候何似某到太原留三日畢憲議役法竟無果决恐錢運留滯徑且北行根究得臨汾洪洞趙城三邑未到岢嵐已牒本軍差官南去催促今日領牒命河外三州并保德軍令用三分見錢七分鈔糴買此事某未敢便依稟行報四處緣本路糴買自某初到䝉差措置只令用鈔以本路自近裏般運見錢鐵錢腳重須只般一色銅錢嘗以三嵗計之本路諸色所入銅錢無幾不准近裏支用不足又般運腳費數多支與客人亦决不肯顧腳却般回並須流入二敵無復更還雖嚴刑不能止也昨胡吏部創支一色見錢胡漕鼎來此雖不知本末有意希望欲得速成糴買見錢客人亦患不能般回只是於專㪷等處行用今獻說者乃與糴官專㪷為地此事灼然望少待之蓋繫一路久逺利害如將來舉事糴買軍儲未就某乞獨坐受責候到新秦别上狀初秋伏冀為國自重回舒之翰承議書某再拜睽逖之久瞻嚮徒勤忽領榮翰伏審旅食京師動止佳福慰戢沛集鹽事前曾略具其槩拜聞此事於官中所繫甚輕於一路細民所繫甚重永利兩鹽并一路嵗額所入才十餘萬緡其中官本四分馬城池出賣不行已四年餘自陳子堅變法後來州縣追捕刑獄連逮禁繫無虛日根究過致及巡邏人死於獄中者嵗近百人馬城池鹽是陳子堅與欣守燕復將解鹽封進欺罔求賞將本池苦鹽抑配人戶出賣本司已奏乞罷燕復及乞禁抑配立法范謝二漕各執偏見不敢變前日已奏之議此若一向官賣須有抑配若只令客販客或不來無可督責昨日聞報朝廷以此事暫使本路幸且枉駕乘謝在此共議二人皆已求去若遂其請後來者愈不知本末春寒惟冀保重與運使張少卿書某再拜運使少卿違德踰旬不勝瞻仰即日伏惟動止萬福某自汾入石相度應副石州嵗計自來支移限以地里故汾州東諸縣祇逺一二十里皆不到石州石州以此納數甚少又以對岸延州諸寨糴價大段太高牽引客人多過河西今石窟驛去石州一驛東至汾州甚近汾東諸縣皆以彼送納本處自有監驛兼煙火自可照管但舊倉甚小須當添修汾石皆産木植令兩縣同修不日可畢候二稅納足或團廂軍般運或今番就請即石州便足却將石州糴本分與葭蘆及克胡此最甚便非惟今日亦久逺可行今并圖子拜呈不知大斾何日比按欲就太原拜見餘乞以時自重不宣某再拜答張尉書承示新詩仰服留心不倦人之為文與詩最見精神若品格已定辭氣卑凡不能更有損益此甚不佳也猶肆筵犒設大排二十四味件件皆有而無可下筯去處若雖未成就其中自有佳語是猶雛鶴䙰褷戛然一鳴知其為雲霄外物又意有數十言不能盡只用故事三兩字可總而盡之此又貴乎博聞也若塵言常能盡去而立意造語務求高古清新此又非尋常所到也兹豈一端而已哉嘗曰讀其言知其人幸無求小成也某上答李成季書河源圖昨據降酋所說畫之亦恐未然唐貞觀年命李靖等攻吐谷渾侯君集與江夏王道宗趣南路登漢哭山過烏海北望積石山觀河源之所出後長慶二年劉全鼎往西蕃會盟往來渡黃河上流在洪濟西南二千餘里其水極淺狹春可涉其南三百餘里有三山形如鏊河源在其間水甚清泠經歷水會多成大河色遂赤舊史所載如此今降酋只青唐河南人恐未是的某又啓答彭元發書某啓辱書纍幅極荷勤至非見愛之厚何以及此人之仕宦皆欲速進皆欲得美官入仕之徑以進士為優其賢良方正直諫等科比之進士又高中其科者人尤貴之其進必速美官刻日可至歆羡者多願為者衆也然而知義守分稍自愛者未嘗往求而與選焉某幼時所學聲律偶儷之文耳年十六嵗就太學取解是時試詩誤中以故不赴禮部試遂不復以科舉為意但當博考前言往行篤於為善而已矣後十餘年迫於生計學今日程文一試而忝預名第斗祿足以自養益堅向日讀書為善之志此外妄求非惟不敢輕萌亦自然無毫髮意蓋賢科之目其體甚高安敢自當而又有著令須從官共薦進論被召乃試此豈某所能為䝉諭不勝愧怍某啓上又某又承諭天下事未有不求而得欲某以書干當路顯者某屢默觀投書於高位有置而不觀者有觀而不終者有粗觀而明讀者有讀而不識句讀者某每不罪其受書之人罪其獻者不自重而妄動也元發試取所謂賢科者程文與今之進士程文考之相去幾何皆浮詞耳其所獻書為之大言露才揚已觀之可愧其進卷與程文何異洎中其科得美官曾有何補乃紿朝廷之一術耳某向氣力不彊别無可以營糊口遂從科舉誤爾中第今思裹飯俯首列坐庭下辱莫甚焉而使又為之誠不能也若某可以耕於寬閒之野釣於寂寞之濱而足為生豈祿仕云哉某又啓答耀州諸進士書某昨得郡符召詣郡議事既至適會二使者在郡中使者與太守誤以某治邑為能欲與華原史令對易庶令兼教官職事某聞之日得與諸君講學不勝幸甚然徐思之史令非次對易異日調官有礙此外不敢默然無言也故託以他事辭之今尚未報前日承州符先令兼教授除攝於外舊無此例已辭不獲今辱長箋委細見喻仰服意好益愧不敢某昔遊場屋程文偶中有司之意此特一時之幸耳非所謂學也諸君切於祿仕須學時文其力行深造不可不勉某非晚以役法會議須再到郡中餘可面究未閒冀愛重某再拜又答耀州諸進士書某辱問科舉程文之體今之印行為有司考之在高等者其文乃程文之體也雖然此豈有定體先須講求義理的當中心渙然乃可作文義理若非雖洪筆麗藻亦非矣又為文須去塵言用事實貴整齊意分明此其大略也諸君於此想盡善矣勉應佳問某再啓答趙子彊書某啓辱書承涉冬講學不倦履尚多福甚慰甚慰所寄新文纍篇足見用心但論一人之事須知其人才識本末及其行事乃可為說若唐高祖雖是創業之君比之漢高祖光武殆逺初為汾陽宫監裴寂訹而誘之遂納其宫人既納太宗之謀紿而聚烏合之衆至霍邑阻雨乃欲退歸將至蒲津先遣建成元吉劉文靜據永豐倉守潼關又太宗自龍門縣渡河入韓城來渭北徇衆方能中間渡河既受隋禪以宋金剛尚有晉絳乃欲棄河東以河為界京邑自周秦以來在雍岐吐蕃犯邊乃欲遷於山南受建成元吉之譖而疑太宗以此數事觀之其人可見矣凡作論若只以一事言之皆不盡古之聖帝眀王治身治家治國三綱五常人倫之道而已唐之父子君臣夫婦兄弟之道皆廢禮義上下無所措其享國至於二百八十餘年亦幸矣禮義立則女謁宦官藩鎮安得至於禍敗歟某啓又答趙子彊書某承諭揚子雲近世學者謂之聖人此論甚未當若惟寂惟寞自投閣爰清爰靜作符命皆舊史之妄班固去雄未逺其傳與贊皆謂之妄今去雄千年緣何而别為之辭史若不可信雄又言未有如漢公之懿此又何如有道則仕劇秦美新合於理義否按雄家牒雄以天鳯五年卒葬於安陵坂上當時所厚如沛郡桓君山平陵茹子禮弟子巨鹿侯芭共為治喪侯芭作墳號曰立冢已湮滅不可見某又上又回趙子彊書辱書王子年拾遺等事子年名嘉乃苻堅姚萇時人隱於東陽谷鑿穴而居弟子受業者百餘人皆穴處季龍兵亂棄其徒衆遷於倒獸山今在華州渭南縣一名互象山後不知所終其書多荒怪不可考乃莊周所謂齊諧者也伯樂傳記所見事其說不一王褒聖主賢臣頌云及至駕齧膝驂乘旦王良執靶韓哀附輿張晏注云王良郵無恤字伯樂顔師古參驗左氏傳及國語孟子郵無恤郵良劉無止王良總一人也楚辭驥躊蹰於敝輦遇孫陽而得代王逸云孫陽伯樂姓名也或云伯樂秦穆公時人考其年代不相當張湛云良字伯樂亦非也此皆前人所言如此未得考證不知更曾於他書見否某上又答趙子彊書孔子未嘗著書於詩書但有去取春秋因魯史而修之易道隱祕略發明之亦未盡露也孟子與衆人講論答問當時集録而成書亦非自著也孔子之所自得者不可得而知故子貢言言性與天道不可得而聞孟子之所自得自嘗言之矣曰盡心知性存心養性又曰我知言我善養吾浩然之氣又曰君子深造之以道欲其自得之也聖人之自得難以輕語諸人豈若尋常之好作詞語者君子之於言也達其理而已故孔子曰豫欲無言孟子亦曰豫豈好辨哉豫不得已也是皆非尚辭也若揚雄之於道自無所得也作法言其問者非所疑也其答者非所不知也作太𤣥以太初厯之法分四時二十四氣二十八舍之度太陽所行之數文之以言擬乎易特好名而為之也使雄若知道法言與太𤣥皆不作矣夫聖人之道至於神極矣揚雄之法言曰神在所潛潛天而天潛地而地天地神明之所不測心之潛也猶將測之况於人乎况於事倫乎此雄以思索為神其意乃謂太𤣥也觀太𤣥於易果有得乎易曰神者妙萬物而為言也孟子曰聖而不可知之之謂神至於聖而又進矣然後可以知神雄果進於聖乎艱言苦思贅為此書豈非好名者乎遽中草略奉啓言無詮次幸照察某再啓答辛祖禹書承諭軌策此乃天地隂陽自然之數不可以臆說乾陽也天也坤隂也地也隂陽之數乃天地之數也故曰軌從策起策以軌受庖犧始畫八卦後以八卦自相乘得六十四卦又以六爻相乘得三百八十四爻隂陽分之各得一百九十二而氣數不在焉氣數自有損益也陽主進倍其氣而益之隂主退倍其氣而減之陽爻除氣數二十四外餘一百六十八以策數而得七七為少陽以氣數倍為四十八益之得二百一十六以策數而得九九為老陽老陽者動而觀其變也陽進故七而之九九為老故變也隂爻以策數而得八為少隂倍氣數四十八而減之得一百四十四得六而為老隂六為老故變也隂退故八而之六也凡求爻之策隂陽各四因之陽九以四因之得三十六少陽七以四因之得二十八隂六以四因之得二十四少隂八以四因之得三十二動靜之理得然後可以求擬議成變化也方有河外之報遽中不暇盡其餘承問卦爻策數此當各考其卦爻之隂陽自可見矣凡卦老隂爻有幾以二十四乘之老隂之策數也少隂有幾以三十二乘之得少隂策數以老隂加少隂即得隂爻之策數也卦老陽爻有幾以三十六乘之得老陽之策數少陽爻有幾以二十八乘之得少陽策數以少陽加老陽即得陽爻之策數也隂陽合之得其卦之策數也若卦之軌數即考其陽爻有幾以老陽三十六少陽二十八共六十四乘其數所得而倍之得陽爻軌也考其卦隂爻有幾以老隂二十四少隂三十二共五十六乘其數所得倍之得隂爻軌也以陽軌加隂軌所共得之數乃卦數之軌也承問隂陽之策總數各從卦爻隂陽所得之數而乘之自可見矣謂如陽爻一百九十二九乘四因得六千九百一十二六乘四因得四千六百八故通卦驗曰隂陽總一萬一千五百二十也若軌總數則置陽爻一百九十二六十四乘得一萬二千二百八十八倍之得二萬四千五百七十六置隂爻一百九十二五十六乘得一萬七百五十二倍之得二萬一千五百故曰隂陽衍而四萬六千八十也自八卦成列引而伸之數在其中矣此乃軌之大數也若欲遂知其來物則當視其時而進數滿而去得其所餘之數考其所在自可見矣辱見諭此乃古人所用以為占者也如左氏所載京房焦贛管輅郭璞輩皆用之不專以軌策之數以求隂陽老少兼通别卦世應人又以年月氣候日時而定也謂如世屬陽卦而世得隂爻則為老隂世屬隂卦而世得陽爻則為老陽世屬隂卦而得隂爻則為少隂世屬陽卦而得陽爻則為少陽又如陽月隂爻隂月陽爻皆謂之老當其月者皆謂之少如隂居陽爻陽居隂爻亦皆謂之老凡此老少不待策之九六而變也各當其位皆謂之少矣以月之隂陽日之隂陽時之隂陽卦與爻之隂陽參而考之兼之以氣候而用之此並自有法答辛祖德書辱問卦爻御時曰八卦相乘為六十四爻三百八十有四以坎離震兌以御時以三百六十爻以御日也坎居北方子位陽之始十一月卦也冬至陽始生故坎始於冬至震居東方卯位陽之出二月也故震始於春分離居南方午位隂之始五月也故離始於夏至兌居西方酉位隂之成八月也故兌始於秋分餘每一卦統二日間以減沒則七日而成卦蓋減沒者數之餘卦所不居也舊說以此法出於焦贛贛以授京房非也乃焦贛專用之法耳易之復卦曰七日來復此聖人之言也冬至日中孚初爻用事後七日復卦用事則爻以御日其來尚矣豈特漢之焦贛乎太極元氣函三為一故三爻而成卦萬物皆函三數皆自然之數也卦雖各有體其氣互相交通八卦二十四爻隂陽各一十二其氣旁通此爻之取象出於此也易曰鞏用黃牛之革此坤之氣也又曰龍戰于野其血𤣥黃此乾之氣也問中孚曰乘木舟虛也渙曰乘木有功也益曰利涉大川木道乃行何也曰此皆巽在上也巽木也風也順也中孚巽上而兌下兌為澤木在澤上乘風而順舟濟之象也中孚六三六四皆隂爻中虛有刳木之象故曰乘木舟虛也渙巽上而坎下木居水而風順之故曰乘木有功也益巽上而震下震雖主動非若浮於水故曰利涉大川木道乃行繫辭曰刳木為舟剡木為楫舟楫之利以濟不通蓋取諸渙象以此也易曰制器者尚乎象夫斷木為棋刓革為鞠亦皆有法况聖人之制器乎故曰知器械舟車禮由己也問制器者必取其象若日中為市致天下之民聚天下之貨交易而退各得其所此非制器也而取於噬嗑何象也曰正取於象也噬嗑離上而震下離南方之卦在上日中也市為虛離之象也震東方之卦萬物所由出也震為足為動離者萬物相見之卦也物出而相見所謂致天下之民聚天下之貨也頤中有物得其噬是謂各得其所也雖然神農所取如此易之大象則曰雷電噬嗑先王以明罰敇法所取象又如此易豈一端而已哉問暌曰二女同居而其志不同革曰二女同居而其志不相得何也曰暌離上而兌下二女同居也離火炎上而自居其上澤水趨下而已居其下水火異趣故其志不同也革兌上而離下亦二女同居也水本趨下而居於上火本炎上而居於下水欲趨而下火欲動而上水火相遇而爭故曰不相得也答曹鑒秀才書承問卦先後之序此儒者論之序卦詳矣蓋序卦之說皆人事也聖人為世立法當只以人事言若其異說奧祕卦與繫辭未嘗顯言茍得聞其說亦於經中可見其端昔有鄭明微江南人數見於京師嘗談其一二詰之甚祕熟察之乃用此以修鍊御氣者又曰今八卦之位乃周人所置之位卦豈一定其位而不易哉移易其位方可窮萬世知萬物所以謂之易也易之為用大矣神矣豈一端已哉卦以隂陽相配其理未易說至於歷之二十四氣七十二候皆以隂陽是猶一晝則有一夜也萬物藝藝皆出於隂陽豈有能外隂陽者歟問負且乘致寇至解之六三也乘九二負九四不應上六以招吝之謂也而繫辭曰負者小人之事乘者君子之器以小人乘君子之器致寇至又公用射隼于高墉之上出而有獲者解之上六也墉非隼之所止也六三處下卦之上高墉也履不當位猶隼失所止也上六居動之極除六三之邪佞而無不利故有獲也而繫辭曰弓矢者器也射之者人也君子藏器於身待時而動是以動而不括出而有獲此繫辭與二爻之義不同何也曰此所謂左右逢其原也若繪事後素曰禮後乎孔子謂可與言詩亦謂能推廣其意孔子嘗曰六言六蔽又曰學則不固若蔽固則滯而有所廢繫辭推廣卦爻之義周流無不可此故曰仁者見之謂之仁智者見之謂之智也昔鄭公子曼滿求為卿王子伯廖曰無德而貪其在易豐之象也夫豐明盛之時上六以隂居隂幽暗之甚故有豐其蔀之象伯廖引以罪曼滿之貪斯時亦能推易之意又况聖人之於易乎夫非止於易也於他經中斷章取義亦多矣如左傳孝經多引詩句證其事者是也問復則不妄曰歸根曰靜靜曰復命此復也復命曰常知常曰明不知常妄作凶此不妄也問乾卦其爻何以皆九坤卦何以皆六曰易曰參天兩地而倚數一三五皆天數也二四皆地數也一三五乃九乾天也故倚天之數所謂參天也二四乃六坤地也故倚地之數所謂兩地也易之數皆以四營之九而四營之故乾之策三十六六爻二百一十有六六而四營之故坤之策二十有四六爻一百四十有四隂陽之策合而為三百六十以當朞之日也六十四卦共三百八十四爻陽爻一百九十二每爻三十六共六千九百一十二隂爻一百九十二每爻二十四計四千六百八隂陽合而為萬有一千五百二十此所謂萬物之數也又以陽爻一百九十二每爻九數計一千七百二十八隂爻一百九十二每爻六數計一千一百五十二隂陽合而為二千八百八十以四營之亦一萬一千五百二十此又是一法也問伏羲始畫八卦文王演之止於六十四卦何也曰八卦非伏羲自創意畫之乃太極生兩儀兩儀生四象四象生之伏羲隨四象所生而畫之耳既生八卦無所不具故曰八卦成列而象在其中矣以八卦互相重之八八相因所以止於六十四卦也非文王自出己意而演之也考之繫辭垂裳而天下治取諸乾坤舟楫之利取諸渙服牛乘馬取諸隨臼杵之利取諸小過弧矢之利取諸暌宮室取諸大壯葬以棺槨取諸大過重門擊柝取諸豫書契取諸夬此盡在文王之前六十四卦知非始於文王也孔子言作易者知憂患其文王與紂之事蓋文王之於易專取其濟憂患之道非謂重卦也今若曰如乾之初一變而為姤二變而為遁三變而為否四變而為觀五變而為剝六變而為晉七變而為大有八變歸為乾此乃易消息歸遊之說若六爻自下變而上復自上變而下不止於八變亦不止於六十四卦又下三爻始則每爻一變終則三爻共為一變亦無是理且文王未演以前止有八卦卦各止三爻安得有六爻而成八變乎今且以乾卦一卦言之以乾重之乃純乾以坎重之為需以艮重之為大畜以震重之為大壯以巽重之乃小畜以離重之為大有以坤重之為泰以兌重之為夬此所謂因而重之引而伸之也餘皆類此所謂觸類而長之也故繫辭曰八卦相錯也問乾卦曰聖人之德業也於舜見之矣問臨至八月有凶曰臨與遁對謂之八月者此以周言也問彖何以言材曰彖者總論一卦之義也一卦之義在一爻任一卦之事故曰材也若比卦之九五豫卦之九四之類皆一陽爻為衆隂之主也若同人之六二大有之六五之類皆一隂爻為衆陽之主也若一爻不能盡則二體以明之若噬嗑曰雷電合而章豐卦曰明以動之類是也然則隂可以主乎曰隂雖賤也寡者衆之所宗也天下之動貞夫一者也易曰三人行則損一人一人行則得其友言致一也故曰觀乎彖辭思過半矣問繫辭言制宮室蓋取諸大壯之象大壯之象乃曰君子非禮勿履何也曰大壯震上而乾下震木也上棟之象乾為圜為闢户下宇之象也夫物壯則老是惟不大不大則已既大而壯物莫與之以禮制行物莫勝也乃能全其壯也本卦言其制行繫辭言制器故曰易有聖人之道四焉問易之衆爻何其多變也曰六爻相雜惟其時物也剛柔雜居而以情變也是故愛惡之相攻而吉凶生逺近之相取而悔吝生情僞相感而利害生凡爻之情近而不相得則凶或害之逺非其應而應之不安其分也皆悔且吝此所以多變也或問師出以律何也曰律者紀律紀律乃軍政也出師其政不立無有不敗茍或幸勝不可以為常後必取敗也今之說者乃曰吹律以聽軍聲此出於國語武王伐紂及司馬效勝負之說也夫審音以卜吉凶則有之矣遂以軍師制事立法皆有軌則猶樂之有律是謂律法若軍政無法何以行師其餘皆不可以為治問易之乾坤爻辭曰乾陽也君子也欲其進也剛之極則亦有悔坤隂也小人也不可長也故其初已有堅氷之戒焉問易言智崇禮卑曰智能達乎形之上禮惟行乎形之下者且天一生水地二生火烹飪之道水在上而火在下也問易曰太極生兩儀兩儀生四象四象生八卦又曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦又曰天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之是三者皆言作卦之因也何以不同曰河圖所載乃四象八卦也仰觀俯察逺近取之乃八卦所包之象也說卦備言之矣問大衍之數太𤣥之數曰天地之數五十有五天陽也其數奇故二十有五地隂也其數偶故三十也五位相得而有合五十有五然大衍之數五十易曰天下之動貞夫一一者數之宗也自一而為七七而七因之所以其用四十有九虛其一也
