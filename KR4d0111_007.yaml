body:
  text: 潏水集卷七宋李復撰賦竹聲賦高秋氣肅夜色如水喧逐衆歸靜與孤至不知何聲紛然滿耳疑有天人來過虛庭瓊旒寶絡玉佩珠旌風散湘瑟霜感緱笙飄流蘇於簷宇眇金奏於煙雲前導既往後陪載作乍低徊而掩抑俄飄起於青冥顧命擁腫開門以視錯愕遽回驚語其異曰天空月明河轉杓橫行雲去盡時度飛星有物無形但聞其聲來自太虛下感叢筠崩摧披靡婆娑輕盈既去復還似喜如爭頃繁音之雜奏皆此物之所慿豫俯然以思渙然以釋因告之曰陰陽之相摩虛空之相蕩乃天地之一噫是惟不作作則悲號清唱幽韻和音自發於萬形之怪昔黃帝考律於嶰谷之管長房投杖於葛陂之水律應鳯鳴杖化龍戲惟今日霜雪之根乃當時龍鳯之子宜其嘯韻之高絶不合世間之凡鄙驚虛堂之岑寂蕩俗心之頑纍須臾風止聲寂葉間露滴擁腫掩關垂頭以息種藥賦藥山蕷也求必養之而後用焉春芳條兮施於灌木有隱德兮被褐而懷玉是斷是遷兮出自幽谷俾安其居兮益之以霡霂俄月日于邁兮實繁其族雨雪維霰兮何葵之衛足蒸之浮浮兮以果吾腹惟豫之疾兮惟爾之毒辭久翠堂辭并序樊川先生作堂於居之後圃列植松竹竒石以久翠名之豫歌以長言雖度荆郢沅湘之音若夫露才揚己之輕淺懷憂積怨之鬱拂則非豫之意姑窮物理以發學者之思焉其辭曰矗修城之峩峩兮連北斗之寒光眷東南之奧窔兮占雲水之佳鄉地靈勢勝兮多神異之蟠藏散清飇麗氣兮虛徐容與上薄而飄揚偉先生兮冠切雲之崔嵬而佩淋漓之干將決居於詹尹兮爰經緯於隂陽敞修門於前馗兮容結駟之煌煌屬高興於後圃兮以久翠而名堂維東䝉之客倀倀其來兮將前揖乎聲光躡屩擔簦兮進造而升堂負劍辟咡而請曰堂胡為乎嘉名先生其玩物而營營亦寓意於象兮非謂動喜氣於心靈此不敏之所未喻願破頑聵於新硎先生儼兮高視而澄神久收聽於冥默兮反照於無形忽囅然而笑曰客久潛於石壁而業其白也何心藏於密而未能轉乎物也嘉䕃錯其交紛清吹激越乎九成舒張奮迅兮蒼虬振鱗鬛於碧海森植亭峙兮翠羽羅幢節于仙庭搴春英兮粉黃脫秋實兮琳圓湛露兮的歷女蘿兮連綿聳標槩不可以屈揖兮惟有松之如此而非羣木之所可比焉春萌兮錦齊秋根兮虺伏萬本叢聚兮三軍被甲而環衛孤根特生兮幽人守志而自足聲蕭蕭兮動凄清之晚風影矯矯兮照澄溪欲化而為龍蓊壅鬱密兮繁雲凝嵉而未落崩播披靡兮怒帆揚斾舞海而翻空是乃竹之姿致而非凡草之所可擬容登崑崙之危岑探閬風之𤣥圃踴立奔攫怒戲蹲伏兮麒麟才生而頭角未具渾重質厚竅鑿洞深兮混沌不死而見夫太古潤兮寒雲之根清兮秋水之骨妍醜雜露兮石之所自有兹皆世俗之所喜非吾之所取若夫受天地之正兮居歲寒而後凋氣嚴色毅兮若冠劒大臣正議而立朝下視衆木紛紛兮隨炎凉而榮辱此特有傑然之異質兮然後知松仰而彌高理必直兮節不可渝性必正兮心合於虛含千歲之嘉實兮待威鳯之銜圖顧凡荄之冗末兮然後知竹非俗目之所娛敦大靜重物不可移兮有仁者之體堅剛沉毅勢不可回兮有義士之氣此又石所可畏在昔之有德私淑諸人兮嘗欲造次顛沛不忘於心立欲參於其前兮在輿則見倚於其衡以出入無時兮慮易喪其天君故刻於几杖盤盂兮而又書之於紳然言不足以盡意不若立象以盡意俾學者目擊而道存蓋道不間於瓦礫兮當窮理於冥冥吾於三物非茍以為玩也以學者來遊兮日三省於其身若祖龍以大夫封五松兮子猷稱竹以為君叔寶喜臨春之石兮爵之為三品之臣彼徒愛賞之至兮不知天德發乎萬物之情雖尊崇之過兮皆喪志而無聞昔韋弦有警於緩急兮冰蘗有警於貪昏皆取諸物兮庶幾去惡而趨純吾思與人為善兮列斯物於廣庭非以為頑然無知兮而視之為友生子當觸類而思兮觀六合之內動植巨細皆有妙理之存不敏起而謝曰豫將澡濯汙冠之纓振拂縕袍之塵誅茅開徑卜與三益之為鄰後招魂并引士有忠放以死宋玉作招魂豫之友明善篤行以退為進相繼大喪傷而不已昧命上訴以極其情為作後招魂其辭曰惟降命之在天兮昧厥聰而人無考紛恣淫之無度兮中悔而弗造何碩人之生兮蹇幼清而服義連奄忽以去兮羌不知夫所息天厭善善而嗇終兮則如勿相以先初既內美以外修兮反弗酬而萎絶帝告巫陽聞下有訴汝為筮之起為我輔巫陽曰輕清沉墨升降浮離魂逝魄散强下招之招曰魂兮歸來君何夢夢捨常幹而逺遊些離高堂之愛兮競馳逐而沉幽些昔擇地以蹈兮恐辱前修些何罹彼不祥誘於異類胥樂而遲留些魂兮歸來君為大空之廣漠兮而魂可以逸些淫風盩氣飄蕩無息些電光揮掣雷鼓訇剨些浮神遊軍交擊橫行些歸來歸來魂往少釋些魂兮歸來君為大地之深兮魂可以安些凝隂無陽重冰苦寒些土羵怪很搖角奮鬛奔觸來前些幽都羣鬼虐人以淫戲爭膏飲血些歸來歸來魂往必殘些魂兮歸來君無滯乎山幽些烟荒雨苦隂谷颼飀些封狐蝮蛇嘬肉齧骨衆尾多頭些怪䕫特足逐人駓駓揶揄鈎輈些窮崖絶壑躋攀駭汗捉足畏憂些魂恐徨惑失途噢咻些歸來歸來不可以久留些魂兮歸來君無滯乎水濱些長江巨海蕩沃乾坤些怪獸怒戲驚風駕浪吹濕星辰些擊波飛火瀰霧泄雨忽冬春些朱冠鐵衣持㦸操蛇敦脄巨神些萬怪血食磨牙鼓鬛雄吞喜爭些歸來歸來不可以久淫些魂兮歸來君無滯乎林薄些狐獾猩狒羣號旅駮些飢鳶銜人腸樹顚爭剝啄些鸞豕鼓脅發鏃中人衆多如雹些豺狼侁侁奮擲騰趠害不可脫些九首飛呼鬼車縻輈維筋是擢些魂孤敻敻奚往為樂些歸來歸來恐自遺賊些魂兮歸來君無滯乎曠野些驚沙揚埃千里泛灑些燐飛螢遊霜淒露下些茫茫無倚庇徜徉無窮極風搖日射些赤蟻若壺𤣥蜂如翣螫臚嘬胠些魂往不返將隨物化些歸來歸來久遠恐不得還些魂兮歸來君無滯乎異方些石爍金流雕題長吭些流沙爛人燒冰熬霜些晦明差爽顛倒夙夕沍隂固陽些氊裘被髮椎結文身聲豺喙狼些侏離詭異號呼踉蹡些氣殊類别魂往罹傷些歸麥歸來恐自貽災些魂兮歸來君厭生之多故兮將踶跂而逺行些遷異觀之淫惑兮去舊而就新些人固懷慈含愛智達識明些胡為舍君之靈龜兮倀倀而宵征些謂髑髏有樂兮蹇銷鑠而無形些以長夜之幽閴兮其擲㨁而冥行些美目芳口和氣秀骨將萎滅而凌兢些羈棲曠浪兮羌惆悵自憐而悲生些歸來歸來慎不可久留些魂兮魂兮君來歸巫陽致告君無非工祝行先僕御隨迎君輕車牡騑騑高城峩峩敞雙扉修楊夾路臨清涯朱轂羽蓋耀通逵丹樓碧閣麗朝曦故居閒靜多光輝層櫩廣覆如翬飛北堂親嚴望綵衣幽房淑女揚蛾眉岐嶷竹馬兒遊嬉階庭蘭玉紛連枝啓筵設席薦甘肥金罍玉斚爛陸離明璫鏤翠飾輕幃沉燎熏膏烟霏霏哀絃戛弄和清吹寶炬華燭焰文榱芳賓促坐停金鞿朱顔半酡君心夷魂兮魂兮君來歸亂曰谷風習習兮獻嵗發春羲和緩車兮萬物向榮氣凝質聚兮來更生飄佚悠揚兮何冥行促君御兮孰主評藏舟夜壑兮默負以奔巨冶不息兮小大紛紜雜司命兮受於成形合渾融結兮究一體之所營特短仆兮忽何膺魂知悔兮遄復臨秦篝齊縷巧絡縈前瞻中屋升東榮長呼大嘯臯維名與君祓除門戶清魂兮歸來居攸寧無極鬱陶傷豫心樂章五曲并引鄉民歲秋修祀以報神惠樂五奏皆有歌其辭鄙陋不可以格神豫因其迎神送神與夫三奠為作曲云南山深雲冥𡨕蒼松長寒楓隂紫壇椒堂白玉庭千年桂樹落子青日吉兮辰良浴蘭兮佩芳穆將愈兮神君沛荃旗而來翔青霓叩額通緑章鴻龍開門宫中香望君御兮前渚再拜兮起舞時不可兮再得聊徜徉而容與右迎神海日上天破苦霧散香釃酒巫進舞神在琵琶絃上語載鸞旗伐鼉鼓驅豐隆笑玉女小雨班班㸃飛土駕文螭兮張翠羽蘭為旌兮桂為斧神車出兮青山空留應龍兮守山宫古烟蒼蒼封寒松流水濺濺山重重促前導兮走輕雷駐清馭兮雲低回石壇漠漠風幃開鄉人奠拜神君來右降神霧光散兮曈曈蘪蕪青兮椒紅石上菖蒲生紫茸曲嶼蘋長緑影重雉鷕鷕兮鹿伎伎圓鱗金光出寒水碧鼎收香養雲子三脊白茅斷為委平壺玉酒清於空開壺芳新破曉風罍前洗爵奠當中海南沉水烟濛濛人有誠神有靈幽明通薦芳馨右祀神刻花圓楹青玉趺高堂䡾䡾雲錦舒兩階納陛先登巫近前神喜巫歌呼揚桴兮拊鼓金鳴兮竹語長絲哀怨鴈移步堂上聲歌堂下舞工祝濯柳灑庭戶神君功多人有主風清氣微散時雨上無螟蛉下無鼠川滿粳兮陸滿黍少婦窗間弄機杼鄉人相勸醉場圃敬拜神君芘吾土右樂神鼓急兮收舞影火銷兮膏燼冷鄉人出門女巫醉日下西山起隂暝荇葉光青幡長壇前旗影動回風飛電忽轉雷隆隆玉劒蓮花碧珠佩喜雲低來有酒氣浮空皓皓從歸轡千騎無聲去如水龍車獸鬼不踏塵迅霆一擊開山門神兮神兮愛吾人千年置社樂神君右送神序送衛奕致仕歸詩序衛君奕作邑於文水致其政而歸寮友同餞於太原之城南溪亭酒既行坐有詰其歸之遽者曰奕非率爾而作蓋嘗慮之審也夫欲高蹈方外遐希真逸御列冦之泠風乘王喬之飛舄手弄白日頂摩層穹此荒唐馮虛者之去也妄謀捷徑茍厭徒勞身雖寄於林泉心不離於朝市覬因傴而成敬期聞價而速沽此販賣雲壑而去者也自負絶俗之姿能通當世之務歎鸞鳯之棲於枳棘思長鯨之縱於滄溟憤然遠引戚爾興嗟此不能居易俟命而去者也輝其光而離其塵礪其鋭而趨其紛動而有括孤而無鄰衆惡所歸危機將發此懷憂不得已而去者也奕之去皆異於是少而篤學固懷干祿之心長而效官慙無應時之術惟兹晉邑地瘠民貧邇者政令日新督責日峻􅘮鹽於盬嚴索十年之宿逋伐木於山盡括十年之舊數移粟出八程之遠助軍有七倍之輸民久難堪令何寧處退惟孱瑣恐玷刑誅屢思平子之西園願上淵明之印紱從兹息影將老全生舉席雖悵其遽行有識皆稱其得計惜離羣而出餞咸臨溪而賦詩紹聖二年九月東䝉李某履中序楊氏言動家訓序小說記事亦史之遺法也史官取其大者著之於書其於小者雖或有取然散落不録者固亦多矣好事纂緝以廣異聞補遺逸滋談論證訛謬雖荒忽茫昧不可考之言與夫田老里人鄙怪之語皆雜取而觀者無尤焉歷世所以傳者甚衆而作者未已也江隂楊君集小說目之曰言動家訓謂夫吉凶得失繫於言動人之言動捨乎禮義則敗以取禍由於禮義則安以崇德然有棄禮滅義或能徼一時之幸謹禮篤義或橫罹意外之凶乘其時蹈其機豈一端而已哉若顔子其殆庶幾者也有不善未嘗不知知之未嘗復行其於言動孔子惟告之以克己復禮而足矣餘其下者非舉前人已驗之迹則於是非無所喻喻故博採歷世人之應對議論行事謀畫以類相從皆深切著明俾夫觀者知有所擇無萌徼幸之欲而起崇德之心是異乎無益之空文也然猶曰此書之傳或以為尤或以為勸則某也不得無悔第示諸子孫使有所警故曰家訓求豫發其意故題之楊君名序字元善今為承議郎劉師嚴字序為師有道其禮嚴其道嚴圓冠方領攝衣危坐望之儼然學者擎跽罄折拱手列侍禮之嚴也非法不言非善不迹揭表道途欲少違之若陷水火道之嚴也蓋人心易危外貌斯須不莊不敬則慢易之心生中不得其正邪僻由是而入矣隄缺防弛必有踰之一出焉一入焉淫辭詖行所適不得其正曲途從往而泥矣教者以成物者也茍失其道安能成乎人邪若孟子之於弟子有為餔餟來者有舍館定而後見者皆謂之罪焉雖大國之君未忘其勢猶不見焉所以伸禮也謂楊墨為禽獸以仲子為巨擘斥許子之並耕凡皆闢之所以明道也其待學者豈惟一時而已哉雖千百世亦將使若遊其門矣揚雄曰君子正而不他塗曲不由諸夏川曲不通諸海君子不由也君子之於師非必日相親接也考於百世之上讀其書聞其風亦皆得其傳焉夫德輶如毛民鮮克舉惟不以行之為難則不負孟子之所待矣劉君潁上人也名師嚴其友字之曰傳正求豫廣其說因以告之元豐六年十二月李某序跋題張元禮所藏楊契丹吳道𤣥畫楊契丹畫今人少有曾見者亦嘗訪諸好事之家皆無有契丹仕隋開皇間官至上儀同距今甚遠其傳者少也舊說其畫六法皆備甚有骨氣雄富而少精微比唐之閻立本時有不及本山東人故東州體制允屬兹人與鄭圃董展同於長安畫光明寺小塔時稱三絶鄭嘗詣求畫本楊引至朝堂指宫闕衣冠車馬曰此吾畫本也鄭深歎服杜子美詩亦嘗及之今此畫雄深頴拔信非淺近者所能為不必以前人題跋多顯者而後信也吳道𤣥畫豫觀之多矣其高下左右正背皆不差分毫非唯用意逐時不同而筆法亦異初學書於張長史賀知章不成遂工畫筆法始類薛稷後自成一家開元中將軍裴旻善舞劒道𤣥觀之揮毫大進用筆措意因是日新此畫乃朝元圖草本爾昔年於長安陳漢卿比部家亦見有吳生親畫朝元本絹甚破碎首尾不完物象亦未備具人物樓殿雲氣草木與此圖有不同處而命意筆法亦多相似其神異妙絶如此非道𤣥安能為之李某履中題題李績繪像唐太宗嘗因燕閒顧謂李績曰欲托以孤幼思之無如卿者卿往不遺於李密今豈負於朕哉績齧指出血為誓高宗將立武后衆皆以為不可後問績績曰此乃陛下家事何須問及外人立后之議遂决豫嘗過渭北九嵕山見英衛皆陪葬昭陵英公墓域高大特為立闕乃武后厚葬以報之敬業欲興復而不能不知禍本於其祖一言喪邦若此其甚乎元祐丁卯清明日李某履中題題冦安雅所藏十八學士繪像舊史文學館學士有李𤣥道李守素蔡元恭顔相時而此圖無之此圖有魏徴封德彝薛膺李百藥令狐德棻而舊皆不與恐題寫之誤也初太宗命閻立本圖其像禇亮為之贊號十八學士寫真圖藏之書府今此圖人物長才六七寸狀貌移易未必全似又唐初衣冠制度承周隋雜有胡服今此皆唐後來制度但粗記諸人姓名非一一盡得其實也然其用意行筆設色亦非尋常人所能為今不論其他但以其畫筆可取而留之可也唐初所重族姓稱山東崔盧鄭李李𤣥道李守素乃山東冠族也長安范氏有畫文㑹圖藏之甚久凡唐之詩人皆繪之但書其姓名其他皆非實第以愛其畫筆而藏之與此圖無異元和六年八月李某履中題題裴晉公繪像舊史言晉公狀貌不踰中人又小說言其微時嘗就術士來問相術者驚云不可解是必有隂德今觀繪像誠一少年羸薄書生爾然相憲宗擒吳元濟取山東平兩河威名震于憬俗問望德業侔於郭汾陽以身繫國之安危者二十年當時凡命將相必推晉公以為江右王導謝安有所不及其為賢士大夫愛重如此蓋忠義發於誠心而有才術以將之也昔漢留侯高祖言運籌帷幄之中决勝千里之外吾不如子房司馬子長以為其人計魁梧奇偉至見其圖狀貌如婦人女子魏安釐王謂馬回耿耿有丈夫之節問於子從子從曰回非不偉其體幹也其體方而心圓臣有疑焉為相三月果敗嗚呼君之置相其可以貌取哉題唐丞相蕭遇詩後唐蕭遇與其子三兒生日詩曰吾家九葉相盡繼明時出遇乃唐武德貞觀年中宰相瑀之後瑀乃南梁明帝巋之子隋煬帝蕭后之弟瑀之子嵩明皇開元十七年為相華之孫俯穆宗長慶元年為相復之孫鄴懿宗咸通元年為相又孫置咸通六年為相又華之孫咸通十三年為相置之子遇僖宗中和元年為相巋乃梁武帝之孫察之子梁南齊太祖蕭道成皆承淮隂令整為高祖整自蘭陵徙居晉陵武進縣考其上世不見積纍功德其後奕葉暴興於江東雖享祚不永子孫多難亦皆建號稱帝奄有南土以應天命流及有唐九人為相其餘登顯仕者世亦不絶逮朱梁貞明二年倣之孫頃又為相雖祚已滅而蕭氏之澤未替夫何其盛也昔晉王導命郭璞筮其世璞布卦以象言曰淮水絶王氏滅王氏非惟與東晉同興至梁天監中命康絢堰淮水以灌壽陽淮遂絶流王氏亦自此而衰嗚呼此豈人事歟亦天數也
