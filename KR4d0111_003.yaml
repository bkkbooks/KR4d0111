body:
  text: 潏水集卷三宋李復撰書牘上章丞相言邊事書復頓首再拜復愚踈無識然屢陳鄙見仰荷鈞造不惟不罪狂妄亦蒙採納感服無已諒惟髙明知其盡心於門下然爾復近見尚書省樞院劄子下經略司皆立畫一措置邊事經略司一一遵依施行復竊深思有未然者如朝廷必欲歸於上令邊臣一聽指揮則可矣然於邊情事機恐難悉盡蓋乘機應變間不容髮事有萬端而决䇿於廟堂之上定計於千里之外茍違令則廢命從令則或有不可廢命則後來之命雖嚴人敢故違從其不可則目前之敗莫救蓋傳聞與親見遙度與臨機有異廢命則肆情玩法之弊起失事則邊情遂搖雖亦行罰人亦不服今之獻䇿者甚多可取者百無一二皆謀身之計多徵引舊事如漢文帝時胸奴大入蕭關今夏賊所用之兵及首領與夫犯邊之䇿盡如漢文時胸奴事體否此皆空言而不可用也且今經略司遣統領官出塞亦姑授其大略洎出塞凡百盡在統領官矣其密邇尚且如此况又其逺者乎若只責其無敗事使在外不能窺測朝廷之意邊臣上下不敢茍簡亦不敢便安自營如此則在上者簡而有要朝廷之體益重復瞽謬不識事機惟相公裁擇復頓首再拜上户部范侍郎書某頓首再拜户部侍郎春氣暄和伏惟尊候萬福前者人還蒙賜教答上荷謙眷不勝感戴某昨承問役法今具管見布聽近降指揮役事令安撫司與漕憲同議但不無觀望故未知利害之情實向日田役稅出亦略循唐楊炎兩稅之法今之役錢乃向之差役舊稅沿納錢內有鹽鞋麻布牛皮等錢十餘色昨因方田盡隱其名並只稱雜錢今麴引别行出賣牛死納官昔時計口受鹽春中俵散至夏隨稅納錢近日穆衍奏請更不俵鹽乾令納錢又啓此無名之源非惟無名而又隨稅支移折變抑又甚矣民丁巳充保甲更要差役一户兩丁盡應官事恐亦難行若論丁口人數則有保甲正丁餘丁簿照㑹若家業等第自行免役後來非如向日的實今若重别檢校升降必須大擾終不能盡又一縣之間三等已上户有差役不及兩畨者州郡衙前不以管下縣之户口多寡等第髙下分差因此遂及下户下户與上户均承重役安能久行似此非一監司怙勢抑令州縣奉行偏見是致紛紛久未能定緣一路於天下一州一縣事體各有不同廟堂之上不能周見茍遽欲改更决有窒礙莫須熟講非立談可判也略此不及詳細幸恕察又上章丞相書某頓首再拜僕射門下相公春氣漸暄即日伏惟機政清暇台候動止萬福青唐事已白張漕一一上覆緣轄沁本婁齊勒部族董戩取其母收而嬖之轄沁隨母入董戩家董戩久病不能出入與諸首領不相見凡措置國事傳遞語言皆命轄沁與之久而轄沁擅權因董戩死果莊助而立之非誠使之立也姑立有待而篡爾果莊死無助國人隂有欲逐之意轄沁微知之每朝廷遣使至青唐大夸於其國以謂有朝廷之助自前歲以來専寵夏國僞公主從其所好修寺造塔科配國中出金國人大怨今結斡綽克乃果莊之子星摩沁戩乃董戩在日用事之人各有篡心各欲因國人怨而起事但兩酋未敢先動轄沁已不能立欲與其黨盡出歸漢近兩遣酋首嘉木燦及且依結將蕃字來要兵馬迎接前月經略司遣蕃僧往青唐及喬家族上下體訪事實昨日回方言結斡綽克星摩沁戩各聚集部族今却不敢作事已同遣兵馬往上喬家族唤溪巴烏緣溪巴烏是董戩堂弟青唐人須是貴種立作王子方肯信服今聞溪巴烏不肯來為溪巴烏長子布贊已被果莊欲立轄沁時殺之有布贊弟隆贊年十八九嵗却肯來未見起發時日今國中既别立王子即轄沁畏禍并其黨首領决然出漢不敢去投夏國為舊日纍曽與夏國讐賽此事甚的昨准朝㫖措置招納及須要收復青唐近者經略司已具畫一奏請但轄沁既來待之須優首領髙下須有等級其餘部族未給田之際或無田可給並要日支口食此甚有所費又彼人初到青唐未能主事首領心不齊一乘機取之甚易只是既取事初須得重兵鎮守聞青唐苦無糧儲道路艱澀難於般運自河州至邈川四程邈川至青唐約四程過三隘路此最可慮蓋守地必以城守城必以兵聚兵必以錢糧一日無糧城不能守也仍更慮别有緩急凡此相公皆必已熟計之矣其餘事之節目備於奏狀及張漕書中某續亦别具拜覆次不宣某頓首再拜又上章丞相書某頓首上啓某蒙賜台問前日不取幹珠爾城事機的是如何本路昨自七月初四日後來探報得夏國大段㸃集人馬又每日得涇原關報夏賊决來侵犯平夏城一帶及稱國母夏國主兩人自統領傾國人馬前來又稱前後諸處探報並同請依朝㫖出兵牽制及准尚書省樞密院劄子並坐涇原所奏令本路出兵牽制及指揮令破蕩西涼府已來一帶部族家計不得徒為文具本路經略司率總管王愍統領雷秀王贍李澄康謂及諸將人馬并將帶日近招到夏國僞御史中丞屈成及屈成親舅前去緣屈成是夏國右廂統軍星多貝中親姪貝中部族並在西涼府一帶左右其西涼人馬見攻圍平夏城故使屈成為之鄉導某當時親在軍中既統領人馬過河以大軍前去恐幹珠爾城乘虛出兵却來侵犯西關及金城關遂令康謂分帶軍兵四千餘人往幹珠爾城作攻城次第牽制賊計有王贍李澄才入蕃界見蕃騎三十餘人只要取此遊騎不肯前來王贍本邊人弓箭手之子妄作士人舉止李澄乃賊李三李定之子並無所能王愍遂留此兩人及量留步人只令在濟沙谷內盤泊與雷秀統領其餘諸將人馬過實勒頗卜朗往西北過雪山及炳靈寺又西北令雷秀分統人馬兩路入却㑹各有斬獲到彼見山上火起問之已報軍前次第右廂人馬一兩日却回來到乃收聚兵將却歸遂解涇原之圍及遣騎至報康謂令歸自來體問得幹珠爾城中守禦常有千人已上器械防城之具甚備城壁堅完非五萬人已上未可輕攻緣攻城須作畨次又須别整齊軍馬隄備外援俟城上矢石欲盡方能併力下手今量分四千餘人並不曽略施攻具豈有得城之理王愍前去四日三夜雪中往來走七八百里斬獲二千八百餘級驅略到生口八百餘人內有夏國僞公主及近上首領王贍以已不敢去恐王愍申舉又妬王愍成功妄有媒孽某體訪前後諸路出師牽制只是才出漢界一二十里盤泊却歸未有似今日實為鄰路解圍獲功如此王愍忠勇老練雷秀遇敵果敢本路諸將皆無及者此相公必素知之今蒙垂問不敢不具實拜覆伏乞詳察某頓首上啓與張橫渠書某蒙誨諭宗子之法若以差等言之則自天子下至公卿大夫士庶人其法各不同每遷之逺必須有異諸侯每一君各為一大宗而小宗又應不一五世之間其衆亦滋而同繼其祖同繼其祖則同謂之繼曽祖同繼曽祖之小宗而於大宗如何而公子之宗至於親盡則各立其宗若大宗中絶則當誰繼以春秋考之魯之考公煬公幽公魏公獻公武公孝公皆弟也不可以為宗子之法又傳云同姓從宗子之族屬其法亦不見今若為之說恐非周禮此制久廢若得其說禮可行也回歐陽學士書某蒙問煙波子往年於長安雷氏曽見圖象亦於小說中見名志和字子同張其姓也常漁於洞庭顔魯公在吳興愛其髙逸以漁歌五首贈之志和乃摘句配景自畫成幅人禽草木風雨煙雲雅盡其妙後人多模效而傳之今所示畫得非祖述否近世有傳漁父詞此音舊矣恐非始於煙波子不審於他書中曽見否與李學士昭玘書某承諭顔魯公墓碑某昔閲舊史唐德宗興元元年八月三日李希烈使閹奴與賊將辛景臻縊魯公其年五月李晟已收復京師六月幽州軍士韓旻斬朱泚於彭原興元二年改貞元貞元二年李希烈為牙將陳仙竒所鴆并誅其妻子以淮南歸順乃護送魯公喪歸葬京師其忠烈如此當時喪葬必不草草但舊史不書不知其為立碑也長安洛陽圖志昨赴官不曽帶行未得討閲向有小說言魯公葬後其家僕遇之於洛水北狀貌如平生付白金令濟其家記之不詳俟再尋閲也答李忱承議書某再拜遞中逺蒙貺伏審燕居超逸體履增勝無任感慰之深承聞恬養自得不廢著述益知賢者之樂異於衆人仰服無已辱諭修地理書此某素志願為之久矣然纍思之此非私居位下者所能集前世作者其紀類條目在天必考星辰所臨以别野在地則以禹貢所分以定區域其間郡邑山川物産風俗與夫故事遺迹舊書所載無不闕略亦多訛謬蓋有得於傳聞或田夫野老之語或好怪誕僻之言無所證據本末又多不完且如盛𢎞之荆州記晉太康記虞喜地林三輔决録鄴中記辛氏三秦記括地志寰宇記述征記水經似此等書不啻百餘家茍盡能得之廣聚其言博為採擇又詢於知者及得好事者共成之待以歲月或有可就之理蓋此等書非一人之家盡備雖知有藏者無力可得又編寫非三五人之工可了所謂非私居位下者可集也如唐鄭餘慶四蕃十道志元和郡國志秖是官司文字甚為可採某居長安已二十年關中自周秦漢晉南北分裂後魏後周隋唐已來事迹諸家所紀百不載一二嘗與親舊於前人碑刻詩賦小說間見其遺事因暇遊覽方見其實時亦得聞潜德幽隱之髙行名卿賢臣之事業明君聖王之美蹟今書史不傳徒慨然也某再拜此書若欲其山川人物風俗物産郡邑興廢諸事一一盡載及今古小說詩賦碑刻故事遺迹皆詳備須數千卷方能了此非一人之工所能集若有同志人多共成雖未一一全備猶勝已前者又有一事凡數說者且皆存之回王漕書某啓梁洋及其東西乃岐雍之南屏舊有驛路自岐雍可以直出而至昔曹孟德伐蜀先取漢中不能守而歸孔明欲圖中原亦自漢中出師蓋壤地相錯也當秦惠王時先取漢而入蜀後光武使吳漢伐公孫述魏司馬宣王使鄧艾取劉禪晉穆帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季述周太祖使尉遲迥平蕭紀隋文帝使梁睿平王謙唐憲宗命髙崇文平劉闢自秦至唐元和九次伐蜀四為水軍泝江而上秦與鄧艾尉遲迥梁睿髙崇文皆在斜谷及駱谷出師南討德宗自奉天趨興元亦從斜谷去五代後唐莊宗取王衍本朝取孟昶亦自此路入蜀今商販亦自長安之南子午谷直趨洋州自洋南至達州若兩路漕司差官㑹議於境上畫圖以閲舊迹可見但山路須有登陟往日曽為驛程今雖廢壞興工想亦不難矣惟裁度某啓上與王漕欽臣書某再拜蒙問驪山華清名宫之意此因左思賦有溫泉毖湧而自浪華清蕩邪而却老又後周王褒作溫泉碑用左思魏都賦語有華清駐老之辭唐明皇每歲多幸驪山又其初甚有清靜好道長生之意唐人必因此以命宫名故宫中之殿名之曰長生殿所養鹿號曰長生鹿後人以鹿居山乃祿山之䜟長生殿基今尚存王褒碑某少年曽見之後不復見全本候得暇記録上呈又某蒙問王褒溫泉碑今録所記者上呈原夫二儀開闢雷風以之通響五材運行水火因而並用炎上作苦既麗純陽之德潤下作鹹且協凝隂之度至於遷陵熟溪沉魚沸浪炎洲烘地火鼠含煙火井飛泉垂天逺扇焦原涌水衝浪迸集甘泉浴日跳波邁椒丘之野湯谷揚濤激水疾龍門之箭故以地伏流黃神泉愈疾銘曰挺此溫谷驪山之隂白礬上徹丹砂下沉華清駐老飛流瑩心谷神不死川德愈深其脫謬不能知也又某承問王巖碑乃耀州美原縣學碑也王巖唐美原縣令其碑書撰皆巖自為碑今尚在歐陽永叔亦取之不知在耀邑回汪衍承議書某啓昨知出往河外往回計須月餘故未敢馳問今聞還斾暑途登涉德履何如接事必盡得要領素未諳者無不駭愕知底裏則發笑而憤矣承借徐季海書墨跡新秋雨霽展玩纍日遂忘飲食能生人喜氣如此季海晚年書也季海書碑刻甚多若其父嶠之墓碑董孝子碣開河碑龍潭寺般若寺三洞弟子鰻井詩嵩山題經不空三藏碑此石刻尋常屢見粗能記者其書法不一少時學其父書筆畫方徑多露芒角晚乃收拾藏鋒歷觀前人能書者亦多如此非惟所用之筆時有不同亦别有新意顔魯公為醴泉尉時書畫纎徑清麗後為武部員外郎書千福寺碑方實茂密晚節骨力遒徑方正嚴重季海少時題千佛寺碑額作八分書筆勢圓媚可愛老而筆力雄彊肉中有骨司空表聖云如怒猊抉石渴驥奔泉信佳論也祿山作亂顔魯公與季海同在河朔舉兵相應以禦祿山晚為嶺南節度使唐史所載甚略蒙諭跋其後漫識之不宣某再拜回蔡太丞書某啓近者𨽻從取道得遂覯止殊慰夙昔景仰之勤比違方深馳向忽辱翰承已奉朝請動止清福感慰感慰蒙問趙襄子智伯事乃太原故城是也當日分晉水為二流一引而灌城今遺蹟不可究公孫杵臼程嬰墓昔年略曽究之在邯鄲縣西一十二里有趙簡子墓又其西有石子岡二人墓皆在其側趙簡子墓如硯自古傳為硯子冢石虎曽令人發之初得炭深一丈得木板次有泉水作絞車以皮囊汲之一月不絶而止今亦不見其穿鑿處杵臼與嬰實存趙氏當今宜奉廟食聞此向已有人曽言不知其時曽行否今或下絳州亦訪之恐非是須是在趙可得其實不宣某再拜答晉城令張翼書某辱問赤伏事所出昔年見琴操魯哀公十四年西狩薪者獲麟擊之傷其左足將以示孔子孔子見俯而泣抱麟而言曰爾孰為來哉反袂拭面仰視其人龍顔日角孔子奉麟之口久而吐三卷圖一曰赤伏劉季興為主二曰周滅夫子將終三曰為漢制造孝經夫子謂子夏曰新主將出如獲麟者至漢將興髙祖斬白蛇素靈夜哭曰白帝滅赤帝興自古推厯數者言五行之運以相生者繼之周以木德王天下以秦為閏不當繼周木生火漢當承周漢為火德故曰赤伏焉此出於緯書也六經謂之經經常道也經必有緯緯言其變也多言災祥世數聖人不敢以此為法恐失先王之大道也䜟者驗也言有其兆必有其驗桓談不讀䜟非不知䜟欲其君知道也䜟書不曽見於書史中略見之梵書中亦有知之曰西天有修多羅䜟言釋氏之教興廢則䜟書其來逺矣某啓上與范鉞朝請書某承借觀唐人畫邢和璞房琯及西河篆字此事某常於小說見之然與西河所書小異小說所載邢事甚衆謂是得道之士能役鬼神向觀潁陽隱書粗見其術今此畫言邢知房次律乃智永禪師後身鑿地取前世所藏之書使房廓然發悟亦甚異也畫筆法意象不甚髙古而近世畫者不能及謹令還納惟檢入回周沚法曹書承諭滕王閣記此不足稱也唐初文章沿江左餘風氣格卑弱殊無古意庾信作馬射賦云落霞與芝蓋齊飛楊柳共春旗一色後人愛而效之武德二年巢刺王建舍利塔於懷州作記云白雲與嶺松張蓋明月共巖桂分叢如此者甚多當時好尚勃狃於習俗故一時稱之凡為文須是理勝若庾肩吾與其子信徐摛與其子陵皆有辭筆江左末盛稱之此皆不足法舊史言為文之罪人故唐之後來無人作此等語回知隰州劉季孫左藏書某再拜承示佳什詞意爽拔不勝降歎樂天筆迹往年於長安蕭隨中舍處見之與此少異恐起草不甚用意然其放逸自在尤可追想其風槩方牛李相傾朝廷道路皆不敢以目而樂天出入於二黨之間在彼無惡在此無斁非賢者安能如是觀其書論其人此筆迹尤可貴也王摩詰畫竹亦嘗見於岐下僧舍此筆尤老而徑又極自然非尋常所能到得觀甚幸謹還納惟檢入承問李侯所藏王子敬帖亦常見之此乃唐人臨􅒽者極易辨一軸凡四帖分寄三人而紙用兩幅安有帖寄兩人紙用一幅乎始收者不能辨印記題跋甚祕後來但見貴人所寶故歷代傳以為真也二王書迹東晉之盛上下已皆愛重又父子皆不惜筆畫宜其傳者甚多但纍經喪亂今遂無有昔後周承聖末遣于謹襲江陵梁元帝將降乃聚古今圖書十四萬卷并大小二王書迹命後閣舍人髙善寶焚之歷代所藏盡為灰燼唐太宗好書人間所藏求之殆盡藏於內府髙宗以後或賜豫或盜竊又散落人間宗楚客中宗時為中書令奏事承恩乃乞大小二王真迹敕賜二十卷大小各十軸楚客裝作屏風王涯作相專求法書盡以金帛官職致之涯既被害人但取裝飾金玉書畫皆焚棄經五代故無孑遺今書學不競用筆之法絶而不傳雖臨􅒽之本舉世略無一二亦使人時為慨然也回盧教授書某啓兩辱惠書不勝感荷春寒伏惟優游庠序體候清和良深慰忭承稱譽過當甚非所望某管見謏聞幼少勉於記誦蓋欲博極前言往行既長究觀前人之言行或乘其時或因其人或應其當日之事至孔子之與門弟子應答及其餘來問者率是如此乃事之一端未盡其道之大槩學者當深造求得其原得其原則左右從容無不可矣此某之所學未敢自謂已至於此也子貢曰夫子之文章可得而聞也性與天道不可得而聞也此乃知子貢不妄自謂有得也子曰吾道一以貫之此聖人言道大體也曽子以所見而言曰忠恕而已此未盡孔子之言也夫道無不在也不可增也不可損也不可撓也不可澄也欲外之而不能外也欲去之而不可去也欲强親之亦非也欲强踈之亦非也人日用而不知也不求其本尋文摘句是入海算沙也心之所自得雖因聞見若脫然自悟聞見乃筌蹄矣請思之不宣某再拜又某頓首啓洊辱華翰仰服眷勤伏承履茲春和靜作佳福感慰叵量某局事少暇不得安靜勉力應接皆不得已亦須時役思慮但夙夜且為之推遣䝉諭著書此非某所能亦非某所敢議也聖人之道不傳也久矣後之為書失其本根而求其枝葉就其枝葉又為蔓辭不知言之愈多去道愈逺又務漁獵近似之語欲自成一家此皆中無所有茍求虛名也是皆君子之罪人也學者求為君子矣前人之言切於事者無如論語與孟子不能於此二書窮講其趣安知入德之路捨此而欲求新竒之言非所謂善學也今人之於善未嘗講究又未嘗分明作得一事至於沒齒不知果如何謂之善但隨人南北茫茫然醉生夢死孟子言行之而不著習矣而不察終身由之而不知其道正謂是也某此意居常不敢妄言於人恐取尤悔纍承見問故略拜聞某頓首回謝教授書承問樂昔戰國時所謂古樂已非盡是先王之樂自周衰樂工分散適秦漢齊楚古樂安得全在箜篌有小說謂師延作始於桑間濮上人傳之師涓嘗為晉文公鼓之後鄭衛分其地故以鄭衛之音為淫聲又風俗通曰漢武帝禮泰山太一后土令樂人侯調依琴作坎侯言其音坎坎應節侯者以其姓也故亦曰坎侯笛風俗通曰武帝時丘中所作也笛滌也滌除邪穢也長尺有四寸七孔後有羌笛馬融賦之笛者古之籥也後世損益而異也今之長簫乃洞簫也非簫韶之簫也霓裳開元時曲劉禹錫詩云三鄉陌上望仙山歸作霓裳羽衣曲又唐人詩曰聽松聽水作霓裳又小說明皇與術士葉靜能遊月宫歸作霓裳舞此某幼小聞其說如此答党綸教授書承示新論詞氣甚壯足以發人之意但魯肅非可以擬武侯孫權據有江東事勢已成但未僭位魯肅使之僭耳劉𤣥德無一旅之衆武侯與之開國定霸甚相逺也二人之事見於本志可檢見之武侯戮馬謖蔣琬非之後人從而議焉當時馬謖若違武侯節度能為成功武侯智計不至則武侯可議既違果致街亭之敗安得不行法令若取蔣琬之言貶武侯之大體甚未可也與嚴灝司理書某啓辱簡欣承春和體中佳粹權文公集久留甚愧鼎鏡恐非舊物製作殊無雅思唐時午日揚州江心鑄鏡供進又𤣥宗千秋節外進方鏡某家昔收得一面乃是方鏡背鼻有篆文五日字面徑八寸重五十兩與此甚異鼎銘云開耀四年此非也髙宗永隆二年改開耀開耀二年二月已改永淳矣今並還納請檢入盛露囊千秋節戚里皆進華山記云𢎞農鄧紹八月曉入華山見童子執五綵囊盛柏露飲之又荆楚風土記以五綵結眼明囊相傳赤松子以囊盛柏露飲之而長生皆八月中事為之乃祝夀之意某啓上
