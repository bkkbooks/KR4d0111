body:
  text: 潏水集巻六宋李復撰記于于齋記予官上黨退食居於容膝之室者六年滏陽崔生渙時來問學一日謂予曰先生居何其隘盍亦廣歟官何其久何未遷歟何先生居之安而自得亦有道歟坐而屢興歎焉予久而謂之曰爾所謂隘者其以尋丈計之歟爾所謂久者其以日月積之歟是未知夫廣隘久遽也今爾至於通都大邑觀人物車馬之繁夥官府宫室之壯麗囘視予居彼所謂廣且大也閱寒暑之往來同吾至者既已終更後吾至者亦已受代視吾未去所謂淹且久也兹豈足議哉予與爾適乎泱漭之野登乎崇髙之山四顧遐睇極其目力但見天垂地接混然一氣而不可辨此可謂廣且大也然而在大空中猶幺蟲棲於蚊睫焉此盧遨見訶扵鳶翁夸父死化為鄧林終莫之至也運璣衡考七政之行度稽陰陽推六氣之循環窮其象數極其軌筞見千世遐渺而不可窮可謂逺且久也然而在浩刼中猶飛星出于擊石焉此大撓之囘續甲子容成之詳究巧厯亦莫之極也吾之室與其廣者同在大空中烏足辨哉吾之六年與其速者化於浩刧中烏足校哉此吾所以居之安于于而自得也茍欲侈居而速進求之不得皇皇然有不知其身者矣其憯有甚於鏌鎁可不畏乎崔生躍然曰不肖方治講習之室願以先生今日言于于自得之意以名之幸書以賜於是書之以遺覆簣齋記士之於學非尚其志强其力終無異於衆人顔淵曰舜何人也予何人也有爲者亦若是公明儀曰文王我師也周公豈欺我哉此茍其志不立心之所期能如是之卓乎冉求自畫不能循道而進公孫丑謂道若登天而不可及欲少貶焉茍力能自强行之所趨遽欲如是而已乎始鋭而久則怠朝勤而暮則倦人之常情也舉其髙者逺者示之猶患乎不勉况姑以淺者近者誨之其所學何足筭哉莫非學也徒能言之行之不至胷中未必泮然矣是由燕人之談楚身未嘗至郢都其説未必然也聞之夫子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也太原王生源明自西河來上黨問學於予今歸將闢齋舍於其居之後圃求予爲名榜其齋予既語以尚志强力而遂欲觀其進故以孔子之言名之曰覆簣云靜齋記動靜之理一體而未嘗離靜自有動雖動而靜在其中矣穹然蒼蒼無聲無臭天之靜也而日月運行寒暑往來雲流雨施雷震風蕩能使百物興焉草木開發川奔氣騰地之動也而注之以四瀆而不泄載之以華嶽而不傾雖資物之生而無改色受物之歸而無改形能使萬類安焉逹者盡道極理處乎天地之間不必逺市朝不必絶視聽正心順行忽焉感焉應天下之故反而照之凝然寂然曠然閴然無榮辱利害之紛然而有虚白之皎然乃不偏滯於一曲也山林巖穴之深江湖魚釣之逸獨可以寓形也與接為酬日與心鬬神猶受其役焉然則智何能而及之亦曰虚其中而已矣若夫亢絶當世憤然逺引冥冥獨行夫豈知處靜之術哉姑與夫鳥獸同羣爾中山劉君公述治齋於其居榜之曰靜求予爲記因竭其兩端而告之庶幾使之不蔽七祖院呉生畫記上黨七祖院壁畫釋氏下生變相共傳爲呉生畫無遺識可考僧維縝壽九十三歳聰明不衰猶能記舊事言其師壽亦百歳乃唐末時人常扄鑰此室壁謂是呉生親筆師弟子所傳其已久矣至今爲信壁今穴鑿十無七八存者多斷缺不完詰之云有勢力者取之完則柙藏而歸壊則棄之糞壤間前人創意謂名筆可以永久不知此畫因名而毁語之嗟憫不已予嘗思人之心虛一而靜者也微妙獨立不與物俱或失其本心則物必引之矣凡喜蓄玩好乃其所引也然所好古雅人亦尚之書畫之好人之所尚者也蓋筆墨巻軸開玩不出几案間劇能發人喜意比夫錢埒牙籌特爲髙雅近世藏蓄謂之好事雖錦囊玉軸以竒古相尚其能自辯而識其趣者甚寡率彼善而我善之至於以勢力穴鑿其屋壁特取其一二而破毁其什百使人咨嗟怨懟不已謂之好事也宜若是哉予官上黨凡七寒暑暇時徃觀焉雖僅有存者亦足見其立意用筆凡科斗篆𨽻行押真草用筆之法無不有焉與顔魯公論坐位帖藳筆畫之法相同至若天人信士波旬外道神韻態度與草木雲煙各盡其妙而含蓄生氣意欲飛動囘視自唐已來諸人之蹟如騏驥一出萬古凡馬皆空矣信乎非道𤣥不能爲惜乎殘毁而不得快目焉紹聖丙子清明日記渭源諸葛武侯祠題記漢建安十六年益州牧劉璋遣法正來荆州迎先主西徃益州十九年先主克蜀三十三年先主復漢中武侯自益州來漢中後主建興三年武侯南征四郡五年將北伐上疏曰今南方已定兵甲已足當帥三軍北平中原六月出漢中營於石馬六年揚聲取郿由斜谷出及取天水南安二郡叛魏來應遂辟天水姜維爲倉曹掾七年遣䕶軍陳戒攻武都陰平遂平二郡九年出圍祁山參軍王平守南圍司馬懿來拒武侯張郃來拒王平至青封交戰遂克張郃十二年武侯以流馬運遂出斜谷至武功據五丈原分兵屯田八月武侯殞於軍中其始末未嘗至渭源也建興十六年改延興元年延興九年姜維出隴西與魏將郭淮夏侯覇戰克之十七年維又出隴西狄道狄道令李簡舉邑降十八年維又出狄道大破魏雍州刺史王經于洮西十九年維復出天水至上邽爲魏將鄧艾所破死者甚衆延興二十年改景耀元年六年魏相國晉文王命鄧艾鍾㑹五道伐蜀譙周勸後主降魏以此考之惟姜維屢至於此漢中乃髙祖始興全蜀所恃之地故武侯兩來既得漢中乃有恢復中原之意中原若定則岐隴以西自歸姜維世家天水但習西州事機不知舉事本末先後之序自負雄勇屢至西陲雖戰有克㨗不能有其地鄧艾以疲兵二萬出江由維舉十萬之師按道南歸足以擒艾破艾而還拒鍾㑹蜀之存亡未可知也乃迂道入巴使艾輕進徑至於益自艾㑹交怨而㑹圖異計乃還維之節益其本兵謂長史杜預曰姜伯約此中州名士夏侯太初諸葛公伏不如也蓋欲説以誘之㑹既自稱益州牧遂以維爲前將軍乃復敎㑹盡誅北將坑北兵而密通書後主令忍數日之辱使社稷危而復安日月幽而復明謀泄被誅計亦晩矣予觀武侯先主初就見一語而覇業遂定懸衡呉魏使二國不得偏重志雖不展天下至今仰之姜維才非亮比乃欲繼其髙躅民勞士怨致譙周有仇國之論蜀亡雖非盡繫於維亦安可以逃罪也武侯於此立祠考之舊史不見其事迹故備書之更俟多聞者博訪焉題汚池驛壁汚池宻接二殽昔秦穆公使孟明西乞術白乙丙討鄭蹇叔諫而不聽蹇叔之子與師哭而送之曰晉人禦師必于殽殽有二陵焉其南陵夏后臯之墓其北陵文王所避風雨也必死是間予收爾骨焉夫越兩國經千餘里無名以討人之國固難成功又不假道以取周晉之怒爲牛商所紿不及鄭而還因遂侵滑滑晉邑也故晉襄公命先軫舉師而要之果敗於殽秦之師徒盡喪三將盡虜而爲囚且始不從蹇叔之諫穆公之罪也聞蹇叔之言過險而不戒又專滑之役以來晉師三將之罪也穆公後雖切追咎而作誓孟明以女子而得歸後雖焚舟洗恥膏血塗地生民何尤焉昔秦人所由之途在二殽之間至魏武西討巴漢惡其險而更開北山髙道今徃來又非魏武所開南連荆山之麓地寒多雨泥垽濘滑土岡百重登陟險阻驛舍相逺行者過此無不起滯留之歎焉華隂遇雨記元豐二年夏五月予自汴歸雍時旱久極暑度崤陵過稠桑重坂隘谷烈日鑠石塵沙蔽天晝息夕行凡二十日方次潼關過關道泉店敷水見清溪横路羣木連隂心已奮喜望華嶽日光在頂層雲蕩胷仙掌亭亭似招歸隱俄急雨飛灑遥映空山森如銀竹頃濃雲如墨奔走四合雷驚霆擊怒風鼓蕩暴雨大作若傾江湖天地晦𡨕牛馬不可辨遂少待于郵置逾時雨霽雲散山川草木洗滌清潤若乾坤初闢萬物一新蓮嶽傑然出臨大路雄偉嚴竦意勢無前猶義師智將出征伐威行萬里莫不震疊而又秀氣麗色輝亂晴照美瑞器車韞孕于中發不可揜若禮樂君子文物典章焕然咸在羣峯左右駿奔拱峙信乎神靈尊于羣山巍鎮西極真天下之偉觀也矯首竚望連旬炎暍之困灑然遽失清氣習習使人慿虛欲仙予久欲訪少皥之别都尋蓐收之外館廹于問疾速歸之心未暇從容將俟異日來遊姑識一時之事于驛壁趙郡李某履中記馮翊行記馮翊漢之左輔郡後魏置同州自州之南渡洛河有白馬驛水九泉異出而同歸州因此得名今人多以詩之漆沮既同為州名並非也漆水出邠東北沮出華原北二水㑹于華原又東而合為石川河石川東過蓮勺未至州境已會于洛矣白馬水横五十里東入大河水多魚杜子美詩云泉出巨魚長比人者此也水之北三里餘有古祠榜曰漢武帝廟廟有唐時石刻云廟立于後周孝靜時予考之昔後周宇文泰敗髙歡于沙苑命軍士各種柳一株以紀戰功後世追述而立廟嵗久失傳遂為漢武自祠東北趨朝邑縣當路有聚落曰焦離店後魏民謡曰狐非狐貉非貉焦離狗子齧斷索焦離狗子乃黑闥隱語髙歡敗而東奔秦追襲過此駐軍地因此得名則祠為周武明矣自廟之北過大雲寺文王社洽水今曰郃水䣝谷今曰荼韓原少梁遂至韓城大雲寺置于唐武后時后攘唐為周有僧偽撰大雲經言聖后受命之符乃命諸州置寺度僧令天下尊誦此經今屋壁尚有唐人遺墨洽水周太姒所生之地詩曰在洽之陽在渭之涘又曰文定厥祥親迎于渭以文王名社意出于此䣝音荼盖昔屠谷也韓奕詩曰韓侯出祖出宿于屠茶字不見于古書荼與茶皆苦草字形相類疑茶荼訛舛槩易其音矣韓原秦晉交戰之地少梁所謂奕奕梁山也舊史司馬遷生于龍門葬于夏陽今遷墓在山前墓南五十里乃古夏陽縣縣臨大河昔韓信浮甖渡河擒魏王豹遺跡猶傳韓城周韓侯之國也四山深合大河中流縣居河之西壖筍蒲魚鼈尚有舊味縣北有安國嶺嶺北與丹州相接周宣王時有丹延皆戎人所居故詩美韓侯能致貔皮赤豹黄羆之獻安國嶺東西四十餘里東臨大河瀕河有禹廟在山斷河出處禹鑿龍門起于唐張仁願所築東受降城之東自北而南至此山盡兩岸石壁峭立大河盤束于山峽間千數百里至此山開岸濶豁然奔放怒氣噴風聲如萬雷廟像豕首而冕服舊傳鯀入羽淵化為黄熊又云鯀為𤣥熊熊首類豕肖像以此而廟乃稱禹甚非也然鄉人不敢以豕肉薦云必致神怒大風發屋㧞木百里被害縣西山極髙處邑人示予曰有漢武宫舊基武祠汾陰渡河而西登此山歎其髙切星辰因置宫祠以祈長年踰此山渡澂水至良輔鎮有唐魏公祠近村有魏姓遺孫也尚耕當日賜田勑書猶在昔鄭公對太宗願為良臣不願為忠臣鎮必因此得名又西至白水縣縣古彭衙地杜子美詩有夜深彭衙道月照白水山之句地僻事簡白行簡昔為邑令稱為吏隱有石刻留縣前溪上縣北有馬蘭山山前有倉頡冡山上有聖人道昔赫連勃勃自統萬兵來縁山巔七日而至長安當時人謂之聖焉元豐五年予官馮翊之屬邑夏旱秋潦被檄視稼徧走旁邑因記所歴云題恩州東寺壁魏夏觀扈之國春秋時晉地秦為東郡隋為武陽郡唐武徳初平竇建徳改置魏州後唐為郡昔畢萬封於魏曰魏大名也萬盈數也畢萬之後必大今為大名府焉春秋時亦屬晉至七國為趙地秦為鉅鹿漢為清河郡後周置貝州以貝丘為名詩云送子渉淇至於貝丘是也冀者禹貢之舊名兩河之間曰冀州地大而氣俗頑悍其盛也冀其衰衰而冀其盛故曰冀焉昔漢光武廹於王郎至信都乃其地也在唐兩河間號反側之俗蓋自天寳末安史逆亂至寳應元年王師雖平史朝義其餘黨猶守偽命迨貞元間尤務優容六十年間僭裂自若憲宗知人善任使始命髙崇文入蜀擒劉闢繼任裴晉公縳呉元濟平淮蔡定青齊兩河始尊朝廷復為王土矣崇寧四年春正月知雄州和詵奏冀州民與北人結連造妖予奉詔徃冀密究仍守其郡過魏至貝授館於郡之東佛舍因筆乘閒書其壁遊歸仁園記洛陽泉甘土沃風和氣舒自昔至今人樂居之青山出於屋上流水周於舍下竹木百蘤茂美故家遺俗多以園囿相髙歸仁園特髙於洛建安江公著晦叔率蜀人楊畏子安西河文及甫周翰維揚孫鼇抃才甫金陵黄符信叔與予徃遊焉園廣二百畝南引伊水舟行竹間又散入畦檻㑹於方塘髙檜稚松若古大夫立而聚議冠者與童子列侍在後殘花泫露若怨而啼新荷方出若斂而羞倉庚時鳴白鳥來下眺聴從容諧恱人思久而穿深徑度短橋登草堂清池浮軒竹木環舍蓊鬰幽䆳與外不相接若别造一境在逺山深林之間衆意皆適舉觴不辭客有諗予曰園何名乎歸仁予曰此唐丞相竒章公牛思黯之别墅也思黯尹釐洛師築第於洛之東城營别墅於南城歸仁里後人以舊里名之又曰昔聞牛氏多石石可聞乎予曰思黯喜竒石方當國人皆以竒石媚之出守維揚六年所得佳木竒石皆置於此石有三品太湖為上天竺為次羅浮為下三品中又分甲乙丙丁取其形勢肖類而為之名若風流幽獨野逸峭直之類皆就刻之思黯晚自循州歸終老於此其子蔚避巢冦之亂潛於長安南山祖居次子叢避崔𦙍之禍逃於山南餘者無聞園自此荒經五代洛城蕩為灰燼况牛氏之物乎曰郊坰原隰園囿固有廣且大者於都城之間兹園亦若是之廣也予曰兹園本朝嘗為參知政事丁度所有後散歸民家今中書侍郎李邦直近營之方得其半舊傳思黯清尚今觀園囿猶如此之大况於甚者乎客又謂予曰牛李分黨得罪於時舊史與小說所載不無私意公其論之予曰方李吉甫為相思黯對䇿詆訐吉甫憾之隙由此起思黯正李直臣之罪不納韓𢎞之賂衆所共稱然三秉國鈞姑務保身以私憾沮文饒維州之筞云西戎怒氣直辭不三日至咸陽橋雖百維州何用文宗從之使一城忠順之人痛戮于賊手文宗後雖悔悟又何及焉至宣宗大中三年杜悰守益州復收維州西戎未嘗犯邊誤國大事如此上黨劉從諫來朝縱去不留及其子稹叛文饒獨决筞平之在洛中聞稹敗出聲大恨兹豈大臣之用心哉文饒殿劍南遂收維州欲使生羌三千人燒十三橋擣戎腹心以洗久恥是韋臯二十年至死恨不能致者此機畫可見後擒劉稹平太原破囘鶻迎還公主使唐室紀綱復振蕃臣畏凛諸人安能及惜其才有餘而徳不足若論術業思黯殆逺矣君天下者以聴斷為明唐之憲宗專任裴晉公武宗專任李文饒皆能縳姦平僣文宗信思黯挾私之語遂失蜀之藩籬此優劣可知也衆莫不然曰今日雅遊一席之論非易得也請公志之予不暇杼思脩辭姑直録問荅之語以為記崇寧四年三月記書郢州孟亭壁孟亭昔浩然亭也世傳唐開元間襄陽孟浩然有能詩聲雪途䇿蹇與王摩詰相遇於冝春之南摩詰戱冩其寒峭苦吟之狀於兹亭亭由是得名而後人響榻摹傳摩詰所冩迄今不絶咸通四年滎陽鄭諴來刺其州語其寮屬曰春秋書公子季友叔孫湫字者貴之也凡書名者皆貶之也安有髙士之名日呼於趨走僕𨽻之口遂易之曰孟亭唐人皮日休曰先生之作遇景入詠不鉤竒抉異齷齪束人口者涵涵然有干霄之興南齊美蕭慤芙蓉露下落楊柳月中疎先生則有微雲淡河漢踈雨滴梧桐樂府美王融日霽沙嶼明風動甘泉濁先生則有氣蒸雲夢澤波動岳陽城謝朓之詩句精者有露濕寒塘草月映清淮流先生則有荷風送香氣竹露滴清聲夫若此言詩非知詩者也予觀浩然詩髙尚馴雅澄淡精緻頗有佳趣難以一一摘句比擬舊誌云襄江在襄陽縣南二里三十歩出柳子山下分兩𣲖北流為檀溪南流為襄水按方輿記涑水亦名襄水荆楚之間水駕山而上者皆呼為襄襄上也猶書所謂懐山襄陵也又水經云沔水東過襄陽縣北漢水也襄陽耆舊傳云峴首山下漢水中鯿魚極肥而味美土人採捕遂以槎斷水世謂槎頭縮項鯿為水族之上味浩然嗜鯿魚其詩有梅花殘臘月柳色半春天鳥泊隨陽鴈魚藏縮項鯿又曰試將竹竿釣果得查頭鯿此詩人多誦之故杜子美詩云復憶襄陽孟浩然清詩句句盡能傳如今耆舊無新語漫釣槎頭縮項鯿予崇寧四年秋九月將漕畿右廵按過郢訪舊亭廢已久矣諭假守錢君劭復立之明年八月再至亭已立乃以舊名題之因書㓜昔所聞及皮日休之論於亭壁原州後圃㕔壁題記原州唐都監牧使治所也唐承周隋亂離彫荒之餘武徳初修馬政鳩括殘燼僅得馬三千匹從赤岸澤徙之隴右命太僕卿張萬歳葺養焉張世纂緒始自貞觀逮於麟徳四十年間馬七十萬匹於是設四十八監置八使以董之界隴西金城天水平凉四郡之地在今秦州通逺之北㑹州之南蘭州之東原州之西東西六百餘里南北四百餘里猶為隘狹更分八監於河曲豐曠之野于時天下以一縑易一馬自昔國馬之盛未之有也張氏中廢馬政遂荒垂拱之後耗失踰半開元初惟得二十四萬匹為置四使分領諸監南使在原州西南一百八十里西使在臨洮軍西二百二十里東北二使寄理於原州又命開府霍國公毛仲為内外閑廏使總領之太僕少卿秦州都督張景順為監牧都副使就督之至開元十三年馬孳至四十三萬牛五萬羊二十八萬雖不及貞觀麟徳之盛自東漢魏晉已還皆莫可及後張景順罷乃以原州刺史為都監牧使總理四使當時謂之五使焉天寶之後又以岐邠涇寧四郡之地度其四境分置八坊其五在岐餘在三郡保樂第一甘露第二南普潤第三北普潤第四岐陽第五太平第六宜禄第七安定第八命朝散大夫都苑總監韋績統之至天寳十三年馬有三十三萬匹十四載冬禄山作亂自後牧馬之地為吐蕃侵逼内外多事不復議馬政焉前史載之不詳予以為當今冝追復其法因寓此以昔所聞者書之䕫州藥記四方土地不同風氣各異故草木之生與人之疾病多隨其土地風氣之所偏古人治療必因其偏而制法如東方多癰瘍而砭刺自東方來西方多内病而毒藥自西方來南方多攣痺而九針自南方來北方多滿病而炙滿自北方來今醫者不能通知其意妄用臆説無不有失䕫居重山之間壅蔽多熱又地氣噫泄而常雨土人多病瘴瘧頭痛脾泄略與嶺南相類他處藥材皆不至市無藥肆亦無學醫者其俗信巫而不求醫人無老㓜不問冬夏飲茱萸茶一兩盃以禦山氣予到郡憫其多病而不知治療博為詢訪欲求土產藥區處以療之凡累月聞山有採藥者命呼來得十餘人與之酒食數日熟問之其所説藥品種甚多皆在本草外云其採之各有用凡治療性味有毒無毒相得相惡皆能道之云荒山僻逺土人皆如此服食病皆良愈異乎哉真古之良醫用藥也古之醫者於藥皆就其所出之地按其節候之早晚及運氣所宜率自採之故其藥多效今醫率求藥於市市肆聽於販夫真偽尚且不辨况於其他乎時予家有乳婢患瘡周體甚苦問治以何藥有黎千挽者云此甚易次日將紫蔓有如山芋苗來云此青雲膏也但爛𢷬傅之必愈從之而驗遂厚贈之因令盡條其藥名使各歸散求欲移植後圃命工冩其枝葉花實之形繪而為圖録其治療性味畏惡相得之性詳而為經擇鄉民之可教者命學之以成一方之醫庶救其土人之疾方講此而予遽得罷予少亦留心於醫家人輩疾病未嘗呼醫率多自療然亦未嘗使人知之至䕫得此事頗合素志若講而得成豈曰小補今非惟不滿予心而郡之士民莫不憮然也謹書以告後來之能有志者震雷記元符二年九月二十一日夜鎮洮大雷自初更至四鼓方已凡一百三十餘震墻壁揺動簷瓦㪚墜人危立不敢寢惴惴然甚有覆壓之虞予與元帥胡公終夕坐於中堂黎明出視之雪深二尺胡公問予曰是何祥也予曰雷烈多發於盛夏其發也必有龍火之異今秋已去雪深如此震發暴而非常古諺云天怒不移晷天喜行千里言怒不乆其發三四而止雷風天之號令終夜不息必將大有誅殺公曰事將何如予曰比收復青唐不費一鏃恐姦酋深謀為内外連結攖城之變吾雖係其主而餘黨桀黠如星摩沁戩結斡綽克等皆在青唐城内其部族衆强又邈川馬用誠不足倚辦可遣人宻諭王贍令嚴設備自宗噶爾抽回王愍令守邈川互相應援以防不測乃以蠟封書偽髠蕃官嘉木燦伊費赫置蠟封於衲衣中遣間道令四日至青唐責報而還閠九月十一日西羌果叛攻圍青唐邈川及陷納木宗堡丹巴等城賴贍得諭已有備及愍已帶兵馬至邈川内外無結連隨遣苖履應援破賊錫喇卜宗堡十二月王贍髙永年再破竒塔特城布敦谷賊聚苗履又破南丁壘青唐邈川皆完明年三月羌酋綽爾結又挾羌雛小隆賛斷省章硤路圍隆赤特城攻犯青唐再遣將破之朝廷命王贍過河州前後斬獲一萬六千餘級於青唐之東築為京觀予初言此胡公亦未以為然已而幡然見從若少遷延必敗大事官軍八萬餘人無骨可歸嗚呼天之去人髙且逺矣詔告如此近世有謂天變出於偶爾無足懼者甚非君子畏天之意朝散郎管勾熈河路經略安撫都總管司機宜文字李復記
