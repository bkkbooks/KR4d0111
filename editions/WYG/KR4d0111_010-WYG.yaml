body:
  text: 潏水集巻十宋李復撰五言古詩首夏端居美木交柔柯薿薿衆葉光餘春歸未盡葉間有遺芳空庭午隂寂黄鳥轉新吭㣲風從何來穆然和且凉虛堂面清池文簟舒藜床憩偃神意適形骸亦相忘蕭然無雜塵始覺日稍長寒暑迭往返物生安有常百年只瞬息忍使生理傷起坐理素琴曲罷取酒嘗既飲復又酌仰㸔閑雲翔得為太古民優游見羲皇居山居山不出山日飯鮮鹽酪野菜芼山米歡若屠門嚼蒼蒼百嵗翁常如一日樂人勸出山住掉頭終弗諾子孫入市門賣薪食羮臛歸來舉糜杯持匕意自惡市門負薪飱滋味固甚薄甘脆前方丈入腹毒於藥山翁意甚長慎無厭澹泊次韻君俞三詩時在山下西陵大火流南融已頺征凉風拂庭樹槭槭起秋聲遥夜抱膝坐耿耿河漢明豈無尊中酒非君誰與傾流水㑹大壑層岑出遥林結茅窮窈窱細路下嶔崟風露浩滿野黙坐掩孤衾孤衾無與寫秋色日向深朝採南山薇暮採南山蕨零霜百草腓薇蕨行亦絶清溪有白石欲煮未可熱故人在東山幽桂安得結郊居五首牛羊歸近籬鳥雀喧前林天曠白露下皓月吐東岑呼兒掩柴門孤燈茅屋深欲寐問故裘中夜霜氣侵禾黍已登場壠菽葉亦稀天晴日氣煖稚子負薪歸婦姑具餉出飯豆菜葉肥白髮不自閑但悵筋力㣲楸花不結實花落緑蔕肥彫零先衆木葉落蔕亦稀枝直鳥不巢野藤相纒依藤蔓日更長楸覺生意㣲嵗回秋向閏九日菊未華青青東籬下强起折還家豈無樽中酒對之空嘆嗟後日開已晚棄置今如何種稻滿南澤露下稻已黄雨足暗泉滿秷穉各自長侵曉負䥥去日暮積我場從今有晨炊璨璨珠玉光出門出門復入門所向常黙黙積隂乆未開凄風起空谷孤鴻鎩翮悲黄鵠飛亦獨舊耕半荒蕪自歎力不足靜僻懶慢乆煩喧厭入耳過客吐新談意况殊不美火炎幾車薪難救一盃水但坐問鄰醅餘事莫掛齒種禾滿東坡薿薿尺許長初苦夏日暴今為秋雨傷耘耔不能施叢雜衆草荒農夫荷鋤歸無語空徊徨夾徑梧十尋隱映柴舍深日期鳳鳥至柯葉交繁隂昏鴉接翅歸不聞鳳鳥音秋風黄葉落感嘆傷我心和石蒼舒喜雨元祐丁卯春旱日透地赤三農失嵗事嗸嗸嗟艱食宸心動惻怛祠禱馳星驛張圖繪𤣥龜探穴求蒼蜴荒潭幾挈缾方壇徒舞覡神龍忽應求飛灑自前夕蕩滌六合清萬物湔蒸疫隂陽有沴氣備禦須多術聖人不罪嵗能助天地力風流仍叔詩宣王中興日東齋獨坐飛雨日蕭蕭秋風收晚暑掩關兀然坐黙與𤣥相遇坐乆忽相忘𤣥我無賔主神遊出八紘鴻䝉見氣母和人伏日太極剖元氣五行均四時代謝宻循環母子相挈維土散無定位金徳乘火馳天刑發殺機閉藏不敢施胚胎勢力弱熾赫畏炎離聖人御隂陽恐侵西極虧遇庚防畏禍用晦將待時曠然達生理燕息潛深思馬遷紀秦事徳公初置祠後世著令典賜告休百司曲學雖拘忌消長自可推嵗星東方出隠迹㳺天墀詼諧動漢帝割肉䝉酒卮負暄朝坐前廡西晚坐前廡東日當正午時置榻兩楹中予生本多羸憂患百箭攻三十已白髮嵗常苦嚴冬凝隂晝墐户擁火裘䝉茸寒氣深刺骨有如嬰利鋒晨曦忽入牖心喜舊疹空開門曝晴暖暄酣春意融温温百骸舒漸發兩頰紅乃知萬物生陽徳有全功天輪浩無際冥冥轉洪濛盧敖遊八極妄欲求初終卒然至濛谷見呵鳶肩翁陽烏出扶桑振轡馳六龍轉盼億萬里夸父走追蹤遺䇿化鄧林狂奔如捕風我今觀天運四序周無窮東西逐日車不出環堵宫上古有至人御風登璇穹手挈日月行返景回髙舂隂陽在掌握黙坐與天通固知二子愚可嘆如蠰蟲冬日日出東南隅轉側下西陸不經中天行但驚六龍速愁寒餘月隂雲重欲壓屋霰雪飛不斷凝氷介萬木怒風中夜起呼號鬼神哭皷蕩溟渤傾勢欲翻坤軸十日未肯回凍埋蛟龍縮城市百賈閉衾裯換斗粟蕭條觸事艱更覺生意促安得青帝回愛景變鄒谷氣温筋骸舒負暄一飯足豈願北鄰富甲第厭梁肉題朱老壁居無百畝田廪有三年粟舍北幾株桑晚蠶食亦足近水理蔬畦面山結茅屋夏風葦簟凉冬烟土床燠堂前蒲萄架新實初垂緑清淨語不煩事任鞅掌僕鄰里通有無泉甘草無毒誰知庚桑子今此居南麓予非市朝人受性本幽獨願就謀一㕓餘外百無欲謁隠士叚庭人生何多謀常苦飢寒侵裘完甑有炊於世澹無心築室清澗曲窈窕幽徑深閉門長松下嵗無車馬音古書束髙閣兀然遺屨簪悠悠不記年日月徒光隂兒童城市還得酒或自斟隠几望南山閒雲起孤岑秉文薦對報罷赴任有詩示予遂和廣文予所知京國十年舊出背錦囊歸人嘲飯山瘦去嵗近臣薦三接期在晝孤鴻鎩翮乆髙舉或可就惨淡辭都門顛頓不可救蕩蕩萬斛舟失在一孔漏相見嗟塌翼誰與格困獸危根逐輕流蹇步難逺驟予庭有疎松風聲響泉溜墻隂多雜花晴日漸妍秀都城帝子家碧香寄新酎期君一來過獵獵直飛袖秋晚謁秉文有詩遂用其韻庭木葉蕭蕭廣文官舍冷閉門過客稀讀書秋夜永病起絮帽額聞風挈裘領一堂東西横乍若登虛艇相對兩無言孤燈弔形影雲翼未鶱翥光隂惜俄頃雙璧君羡虞三龍吾與邴世異泣傷麟意激軾怒黽萬事非偶然屈伸難可並無逐頽波流自覺囂塵静丹臺有珠宫眺聴極疎逈君能喜清㳺登覽見殊景出承天院候客曉動人語喧門開探騎發冠盖相後先烟塵互明滅出城寒寺靜蒼松帶餘雪驅馬傍前廡投鞭坐僧榻畏風依蒲團擁裘學趺結曈曨曉日昇逶迤旆成列到官今年五踽踽幾持謁執板手有痕脱冠頂無髪將迎迹愈多應接面常熱野性素曠蕩人事苦羈紲乆願整歸駕渡汾尋舊轍躬耕望雲岑築室俯清潏泛舟潏水君俞用韓泛南溪韻作詩三首遂和出城泛南溪朝暮可往返東西韋杜間尺五天不逺舟轉皇陂曲岸帶青龍坂夷猶一篙足不待雙絙挽回臨市橋艤走就僧居飯面山髙閣重入門蒼松偃黯黯雨意來蒼蒼野色晚更欲窮上方理履慚尚蹇溪水秋更清天晴好行舟叩舷發呉歌蕩漾無時休朝戯朱坡下暮宿青嶺頭勝事或有得隨意終日留往年思此樂屢嘆來無由今我方求田意欲營東疇茲計儻能就遂免卒嵗憂身隨鷗泛泛心逐魚悠悠南舍與北鄰杖䇿步可投更祈暘雨時禾稌常有秋山虧一簣功泉廢九仞蹟精神去不回虗牝黄金擲泝舟望南麓近岸多巨石溪流曲折多波喧奔湍激野竹擁雜樹紛紛兩㕘列古松氣不羣蒼然數百尺晚花發幽叢浮雲動遥壁優游可忘年去此皆妄役侯書記二子席上乞詩遂贈植蒿不為棟豢豚不成虎本非英特姿雖長何足數男兒生堕地便要立門户謝鳳炳有毛羊豹兆於乳探根咀其芽已足知甘苦吾黨有侯生髙門映東魯翹然出二子發祥自其祖小兒肌骨明珠光照合浦大兒神宇深崇鼎氣象古學作四韻詩已無近俗語燃燈夜讀書義頗識其觕來客見盡傾喜歎立如堵積慶固有獲力穡刈麰稌人知須有成青雲張步武惜吾已老矣異日衆必覩送章發運楶鄉農不寓兵經費半非古天下雖無事禁虣必備武浚郊開王畿屹然根本固鈎陳擁帝居百萬環貔虎軍聲潮海驚牙帳屯雲聚臨難責死力温飽當有素投身占尺籍張口坐待哺梁野川瀆交掘泉不見土種沙禾穟短官租閣王府國用取東南舳艫引呉楚浩浩九十州連檣輸太庾秋風滿汴渠櫛比不可數登陛獻嵗額供億足贏數儲偫如丘山司農視新腐老㓜無餒腹誰復問暘雨天子念大計置官憂敗蠱茍非簡帝衷未肯輕付與詔書忽西下秦臺更使斧精忠感帝聰異寵褒聖語實資經濟術盡委浩劇務狼荒極海壖蜀江出荆渚提封半禹跡綜錯均周賦際天聳風威列城歸刺舉西北敵騎飛今猶急宸顧百姓瘡未平何處易星馭國事有重輕先後存淵宁本根勢有重暫輟營調度大庭訪衆議捨公孰可去惟公徳宇深完養無驚懼砉刀發新硎音中桑林舞逺畫垂後世恥為目前慮氷雪淨聰明涇渭包肺腑縱横富萬術一一廊廟具出入未盡展輿論嗟齟齬岧嶤雲間闕曉曦媚金羽雙旌過對揚當契君臣遇拜賜親天光髙議願一吐從容動凝旒必歎相見暮庻幾慰美俗丹衢翔闊步蕭條耕巖客竊食慚無補蹣跚世揶揄拳曲逃䂓矩舊學謾屠龍巧伎羞刻楮芘頼托商隂濩落容魏瓠附驥仰後塵薦鶚玷過譽宴坐接烏丸妙譚奉犀麈重借鷯枝栖不責馬曹誤摧頽已半生踴躍臨晚路今朝對行色悲風激林莽亂山雨報秋荒野隂多霧孤禽失侣鳴回飛氣如縷送吕思道東平貴公子意氣區中窄手撚金僕姑青絲飛赭白欲係單于頸封侯取鼎食四十心未展垂翅渭川側前日來坐上天庭見黄色今朝報恩書戎幕進新職崆峒古用武髙旌出鋒鏑君當諧素期洗劍秋泉碧嗟予病摧頽對别還悽惻待君載斾歸我作山中客送僧惠本山僧青芒屩厭踏城中土水風寒蕭蕭片影過沙渡晚雲迎歸錫低飛暗石路暮鐘落前峰去衝後山雨送人之鄧城哀弄發危絃苦調出促管傷别骨欲銷坐失重纊暖仙鵠顧徘徊千里襄江潬此去衮衮情江水流不斷送解敞昔惜結懽淺今嗟傷别促離懐動秋雲清霜落羣木窮山行路難嵗晚自驅轂飛魂不可闗昨夜先到蜀荅劉君俞悠悠東武雲來抱南山岑南山有寒泉雲影落泉心泉古湛不流雲靜閒不飛相與待明月千載發光輝荅嚴隠之美樹多來巢确土無報耕不問彼如何但責已所營聞昔荆有鴞荆人惡其聲自荆將遷呉鳲鳩止其行爾欲人不惡無若革爾鳴鳴聲尚猶爾荆呉無異情晉子父母邦鄉閭皆弟兄踽踽異嗜好遽云居齊城齊雖山川殊是非如晉明已私不自勝齊人安肯平子行求吾詩吾詩豈妄成贈子當發藥期子沉疴輕荅屈爽至人喜曠達所遇無形迹非樂重其放中心本純一東晉尚書令簡文用王述論事匪卓越動意皆真率以此能過人謝安亦降挹㣲物器褊淺舉趣半出匿靜坐本無事城府强扄鐍終日如寒蟲啾啾復唧唧計校不滿毫血盡死猶泣疾趨赴㝠嚚但如水就濕竟老何能為紛然衆惡集古先有至言小人長戚戚荅公孫及輾轉卧不周遥夜何漫漫娟娟竹間月照我影零亂繁蟲哀隂壁輕風泛幃幔節物自感人寤言興永歎頽坐易銷沉去甚春氷泮萬事隨俯仰飄忽浮雲散芳槿曜朱華榮好常在旦百年無期度白日嵗已晏餘生能幾何可進投憂患駕矣追歡好東方明星爛荅呉與幾二首人心如驚飈飄忽無定時黙與身為讎晝夜萬里馳兀兀形未彫茫茫神先疲所䘮甚丘山所得㣲稗稊日月不相饒矧可自傷夷志憯劇鏝鋤欲問孰能知種苖須善本本善苖必滋養生須養心心怡氣不衰學問自可求予言豈汝欺舊廬鄰通衢先疇接近郊居無風雨憂嵗免粒食勞生理亦已愉胷中胡鬰陶楹桷思丹刻乆厭處衡茅服味喜鮮甘毎羞視鋤薅徳業倦時修憑虛事華豪鄭真耕巖石張蔚隠蓬蒿内省重千鈞外物輕一毛當時笑寂寞清節後世髙原思貧非病賜也氣徒驕爾視季子金何如顔氏瓢和蘇内翰趙伯堅大卿清池詩清池有華光深夜闇不發繁星雖燦燦含光待明月熒熒孤螢飛來助明月輝明月出東屋螢向故林歸平陽民杜裕民因買薪得紫石於薪中石有黝理自然成觀音像相好端具觀察推官桑君安學寫之於素以寄予遂為之頌至心不可求虛明曠無迹應物乃現形遺影留兹石若以色見我洋海塵三尺諸像皆非相於兹何所得十一月二十二日朝辭朝辭承明殿暮下金馬門伏讀明詔意仰思聖主恩蠢彼獯鬻氏禮數乃弟昆帝初為息民繒帛代更屯嗣皇謹遵業使傳交塞垣下臣非知古有舌詎得論恭承丁寜命敢不夙夜犇辛順忠唐得道之士真身今在河州寺少年遊嵩丘登髙吾獨見西游渡隴坂脱屣古河縣削髮俗網裂絶味諸漏斷卧脅三十年凝塵滿羌簟六月大地燋爐中結氷霰牛頭實栴檀降出九重殿正就寂滅時泉竭悲禽散直從開元初到今色不變破屋閉真相野䑕嗅香篆時有碧眼人酌乳供新獻觀梅次豫章公飲潤甫家韻江梅犯晨霜噴薄弄晴景坐遣塞葅胷化作陂萬頃論交貴皓首枯澹味方永戯探茱茰水飽食雲門餠日下烟渚寒長歌敲柳癭後園雙松羣木喜春妍彫落寒霜苦昂藏兩大夫森然鬚鬛古堅姿不可回正色少媚嫵清風發好音和氣琴中語庭下牡丹春晩午景遲氣暄困妍姿乘酣意縱放霞裾半紛披晨起露風清肅肅爭自持相對黙無語含羞畏人知雨中觀池荷急雨過池荷飛洒來縱横光圓走青盤的皪寒珠明炫轉勢不定積多忽自傾浩然江湖思蓬忩聴秋聲梧桐猗猗梧桐樹前日繁花馥西風不相饒影疎不可暴坐㸔一葉落餘懐念羣木漫有千嵗憂流光如急轂種罌粟前年陽亢驕旱日赤如血萬里隨羽書揮鞭無留轍炎毒乗我虛兩嵗苦病暍遇夏火氣髙煩蒸不可活飽聞食罌粟能滌胃中熱問鄰乞嘉種欲往愧屑屑適䝉故人惠筠箧裹山葉堂下開新畦布萟自區别經春甲未坼邉冷傷晚雪清和氣忽動地面龜兆裂含滋競出土新緑如短髮常慮蒿莠生鋤薙不敢闕時雨近霑足乗凌爭秀發開花如芙渠紅白兩妍潔紛紛金蘂落稍稍青蓮結玉粒漸滿房露下期採折攻疾雖未知適願已自悦呼童問山鼎芳乳將可設梨柿垂黄尚㣲棗熟赤可剥新梨接亦成實大何磊落纍纍如碧罌器宇極恢廓懸枝細恐折植竹仰撑托露下色漸變逼霜味不酢採摘置中筵氣壓百菓弱憶昔壯少時酒酣病痟作取食不論數甘寒勝發藥今嗟老且病滋味意彫索對之未能忘欲探引復却晴簷午景暄尚或思咀嚼齒朽齧亦難把玩時自噱慈恩寺枸杞枸杞始甚微短枝如棘生今茲七十年巨榦何忻榮偶以遺樵薪遂有嘉樹名雨露養秋實錯落丹乳明細蔓如牽牛半枯猶絡縈晚葉已老硬不堪芼吾羮根大多靈異嵗乆精氣成為取入刀圭頽顛掃霜莖薙草衆草費薙鋤回首已荒翳隨處競茀冗茍生無逺意時亦吐柔蔓牽引强附離端居歎力寡門庭媿蕪穢放魚有客持巨魚造門前自陳敢致子産饋可待姜侯賔野人不知薄但媿心美芹横盤五尺餘飛光生目輪髙鬛丹砂尾長鬚黄金鱗倔强忽起立意氣如有神口頰雖噞喁哀訴何能伸嗟哉自潛泳胡遘網罟屯使居江湖間藏器養其身得時感靈變呼吸乗風雲奮迅彌宇宙洗滌萬物新胡忍事一飯遽使刀俎親無罪就死地惻然傷吾仁解之謝來客放爾歸通津不期明珠報相忘乃吾真此去戒前禍芳餌為禍因送爾吾自往世有鄭校人種菜同墻茅屋東有地十畝餘蒿蓬雜毒草壅闇惡木俱嵗久人跡絶亂穴狐虺居今晨杖藜出顧步良躊躇黙嗟咫尺間荒穢侵吾廬散米飯羣僕操具亟剪鋤攘剔先叢棘斬伐多髙樗乗濕束故急積供爨我厨耕土如蒸麫治畦將種蔬時雨近霑洽膏脉涵如酥問鄰地所宜嘉種願乞諸異有出戎夷逺或傳蜀呉根移甘或辛色剖𤣥或朱蕪菁飯之半布藝廣數區牙甲助芬味瑣細不可無霜降百物肅禦冬必此須居貧寡營辦親賔間招呼盤飧多造次麤糲鮮毳腴收藏資舉筯率野真腐儒澹薄味可久萬錢非我圖樊遲請學圃予今老為模但媿公儀休㧞葵謝園夫松明亢龍泄流津津融身自化蒼鱗困摧剥古鬛漸彫謝無地逃斧斤豈願耀深夜萬牛空回首躊躇歎廣厦晝坐東軒忽十三蝴蝶顔色鮮碧飛舞近人移時方去紀之以詩天上寳玉琴星徽㸃瑟瑟仙人手摩拂變化通靈術忽隨琴聲起委蜕如蟬質飛翔下緑雲風翅含寒碧人間清晝長遊覽喜自得見我缾中花羣遊過簾額髙戯亂疎幌低舞侵墮幘却疑午夢酣身是濠梁客栩栩出虛庭興䦨有歸色應聞調絃聲驚去歘無迹登蠶林間葉半空腹中絲欲生已老意更急食如風雨聲緯蕭外周防條枝中交縈䑕雀爾無來共願十日晴細細𤣥蟻浮蠕蠕寸蠖伸抱葉食囁囁負彩斑彬彬假息方委蜕吐棼非謀身萬生爾甚㣲趨死成其仁浴蠶柳暖柔可結川晴流放光繫柳浴晴川簇簇古渡傍春陽涵餘潤斕斑色青蒼衣被天壌周卵化初㣲芒原蠶蠶馬巨細殊異物同精氣物生不兩大此衰彼所致周人禮有禁蠶為馬之祟織女天上明多蠶今為利咏蟬委蜕疎竹根舒翼髙梧枝攀縁擇隂翳意求物弗知清曉喜零露晴晝弄凉颸長吟不能休自喜方得時轉丸能升髙藏丸必穴深么形感氣變黙得幽憩心遇冬潛厚地應暑登髙林仙術爾何知動静役陽隂地僻小園静羣木隂交浮蟬聲忽入耳物意颯驚秋嘒嘒促徂暑西風動蕭颼滿林青青葉漸有揺落愁題載記河魚出龍門雲雷走平地飛騰不上天臨流夜生子生子子有神怒風翻海水長爪探陽烏中原苦腥氣鉗奴不耕作揚鞭斷其尾黄犢養成斑奔登鄴城址豹來抱虎兒新棘多鈎刺洛陽金鳳凰飛入漳河底東南寒日短滿地邊塵起種松移松自南山昔種十三株連嵗苦久旱十一已彫枯兩株偶得生踰年未自如近覺稍得地翠柯漸扶疎乗春抽芳心嵗長二尺餘漸有干雲勢軒昻出楸梧對立聳竒姿秀發動吾廬紛紛視衆木雀鷇望鳳雛清風為我來飄爽洒我裾足為送老資日待偃蓋舒予今亦已老顧步良躊躇想當千載後黛色凌天衢
