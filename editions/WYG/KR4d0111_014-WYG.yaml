body:
  text: 潏水集巻十四宋李復撰七言律詩垂拱殿賜對䝉恩入省黼座親瞻咫尺威恭承天語慰衰遲錦書殿陛初傳賜白髪郎潜且漫為九日重分畨直夜刑部先郎官八人予到為九人重分寓直六參便赴早朝時自知麋鹿難馴習深媿鵷鸞接羽儀雪中早朝正衙冠劒拱星齊清曉天花舞御墀玉殿影深分扇早金爐煙濕散香遲雲低含潤侵珠絡風亂飛花拂羽旗班退便疑凡骨變自驚身得到瑶池㑹聖宫朝謁七葉丹成不可攀蘂珠宫殿翠微間千年空怨龍髯斷億世曽聞寳筴還宫女祠歸朝路静嶽神綦退曉風閒五雲高宴蟠桃罷鶴馭時應㑹此山省中寓直次劉巨濟職方韻兼示祠部張臺卿銀鐺司鑰禁門重寓直高秋此夜同樓外歸雲迎霽月宫中傳漏帯䟽風衰迂豈合參新論俊少何堪接野翁華省分曹占列宿經時飽食愧無功再任提㸃雲臺觀天光垂碧抱瓊臺蘂殿珠宫對嶽開峽口巴猿初别去海東遼鶴又飛來三生難轉靈源静六歳空驚迅景催欲挹蓮花峯頂水普將甘冽淨浮埃守鄭易陳方及境改信都過大名書呈吕太尉淮陽閉閤欲偷閒新捧除書墨未乾五日御風方假翼兩河試郡别移官生縁有定隨流易世事無端用力難今日得陪門下客一枝容息便心安京西初歸作少年輕喜欲慿虛誤落塵中二紀餘生事蕭條寒葉散故人寥落曉星踈殘骸已脫風波晚清枕方囬醉夢初却覔漁蓑尋舊釣一溪煙雨伴春鋤乞罷未報承延晉秦慶皆惠書東西南北閱光隂邊意蕭條老境侵四府飛書慚過譽數疇廢壌媿初心傾懷敢望時情合論事須思後計深髀肉久消筋力倦但能操筆謝知音九月十三日夜偶書林葉紛紛已半凋隂雲不放眼周遭稍知風逐青娥動更覺天騰北海高萬里無心思假翼百年多事喜持螯山前沙井通幽圃待得春深弄桔橰熈州再乞罷末途潦倒媿知音幕府重來歳月侵狂見請纓憎徃策禮容著帽感虛襟白頭久厭戎衣窄黧面空嗟寒色深東望故山今有約清秋應得訪雲林乙夘七月十六日忽報罷任掩闗忽報被刑書自笑無堪渉世踈白晝曽聞驚市虎殘灰今見禍池魚莫嗟静影逢沙矢猶恐餘猜及鼠蔬逆境自觀還自喜片心無礙一舟虛上延帥沈内翰名括字存中昔年圖史守巗幽毎仰高文動斗牛千里來登徐孺榻一時如上李膺舟激昻囊穎思先出慰藉泥塗欲晚收曽咲王筠無事業但題草木作風流榮路囬翔簡帝衷坐煩談笑静西戎金鑾學士承新詔烏壘將軍有古風闗塞星烽葱嶺逺塵沙毳幕賀蘭空平時未便知頗牧今日親逢出禁中答䕫州舊僚被召見寄聖恩優厚得西還又向雲臺作地仙顧我全生如苦李喜君頻酌似甘泉一篙已占南溪水二頃初無負郭田他日題詩如欲寄為尋茅屋白雲邉搗藥岩世傳昔人煉丹得道今隠於此山下土中時得丹粒服之愈疾超世猶存救世心深山相遇不知名巖前時得丹砂粒雲裏嘗聞玉杵聲汩汩流光愁易促𠖇𠖇濁刼苦難清如何為我開靈鼎徧使蒼生病骨輕登北原望京城有作五季兵銷帝業新霏煙雙闕照夷門地盤王氣千齡㑹勢據中天萬國尊劒佩輝光新日月風雷鼓舞變寒温開先神發隨人意轤軸於今轉海垠登美原縣樓三月春光入眼稀試尋高處㸔芳菲影行平野孤雲過㸃破青山白鳥飛秦甸氣回驚緑滿渭川勢穏競東歸慿虛便欲乗凌去清吹飄飄已拂衣登䕫州城樓䕫州城高樓崔嵬浮空繞檻雲徘徊百川東㑹大江出羣山中斷三峽開闗塞最與荆楚近舟㠶逺自吳越來雄心乗險争割據功業俯仰歸塵埃䕫州制勝樓野蜑荒獠南北羣西接庸蜀東荆門高城獨控江山險勝筭争先日月昏散火燒畬連近㟁歸雲帯雨過孤村二儀開闢雖重阻須引流波及後昆自京之椘州隋栁橋邉一問津便將行止付舟人土風入眼鄉閭異客路闗心童僕親淮水煙開漁市曉龜山雲動佛香春共傳米價年來賤取次東逰不畏貧過黄牛峽轉首黄牛百里西便風不斷滿歸旗青山随客豈辭逺白浪催船常恐遲多米漸聞荆渚近故宫欲問楚人知今朝共話平安喜更得長魚伴晚炊大江西南水㑹大江出萬里奔激瞿塘開神宫龍府雲霧暗渦轉峽盤天地囬岷山發源四瀆長廬峰白浪九道來刳舟濟渉萬世賴積金覆舟吁可哀荆門軍䝉泉逺山分脉發巗陬六月虛堂客意秋無限寒雲噴不去有多鳴玉碎無休清涵錦石斑斑麗秀吐金蓮熠熠幽美潤散分周下澤餘波還入楚江流過葉縣南對黄山百里峰雙溪夾路碧溶溶難追舊事飛仙舄但有餘風喜畫龍栁際秋晴分䆉稏亭隂晚色見芙蓉襄城已逺方城近圖誌分疆入楚封移官慶陽過定平縣春郊二月浴蠶時傍㟁溪流可染衣谷轉城深驚栁暗地寒春早見花稀三年厭應西烽急千里重隨北鳥飛若問前籌慚潦倒欲辭虎帳訪漁磯過天門闗龍鍾雙袖馬駸駸來徃榆闗日向深多病出門愁逺道早寒平野苦層隂泉流危棧新氷滑風入長林暮葉吟觸目凄然何所補高枝巢穏感歸禽峽山阻風黄牛白馬渡驚灘兩目盲飈更險艱天地容身惟一榻江湖駭浪動千山豪商競利能争㨗隂鬼多私故作慳歎息隣家田舍穏柴門深掩日高閒定昆池風煙當日競豪華故里猶傳貴主家何處可尋楼下水平南不見面前花隂機鬼伏天沉海危禍波翻骨委沙遊客乘秋興永嘆高林不覺見棲鴉分按洛西諸邑登山出永寜西望晚宿韶山寺雙旌明滅轉委蛇行徧秋山意若何暗谷路窮平野濶囬巒石斷亂泉多崤陵東盡開周邑熊耳中分放洛河欲舉因縁尋隻履夜深随雨到巖阿胡義修推官再招彦桓與予同遊龍泉寺江曲花開惱醉翁經旬出飲獨床空芳羮間筯溪毛碧異果堆盤海藥紅盡晚莫辭千日酒餘春已怨幾畨風主人清韻家聲在伯始源流到眼中彦桓奉檄將行同飯素於龍泉寺西江吸水試龎翁再訪祇園問色空古殿香寒消宿篆晴林葉暗退殘紅衰年再乞千家飯逸馭初乗五日風曉去清明邉檄急前旌髙下亂山中過香積寺迂轍來尋昔歳題恍然前世意猶迷荒庭老樹半空腹壊塔野禽争暮棲晚學盡驚新使節殘僧時認舊沙彌松房自出成何事二十餘年東復西遊山寺山後山前紺宇開閒携藜杖結青鞋霜欺泉澀羣流淺風勁林彫萬壑哀到處每逢清衆出有時偶伴野人來裴公㸔盡因縁在百塔龕前首重回寒泉亭孤亭結架開巖扄山深氣偏冬常侵驚浪一溪噴飛雪隂簷五月垂堅氷長風不斷響空峽崩石欲落纒巨藤三伏火雲愁病暍投鞭知有幾人登題大圓庵星郎歩履在清禪雅結新庵賦大圓譬喻河沙終未盡含𢎞法界外無邉渾成獨轉離諸相不立中間絶兩偏聞説毗耶在方丈衆人欲問却茫然焚香置榻拂氍毹困倚蒲團坐結趺丈室曽瞻一居士臺山豈有兩文殊信心自得超三界明眼何嘗滯四隅伯雪相逢能目擊電機已笑渉泥塗題武侯廟梁甫高吟一幅巾聨翩衆盗肯同羣久蟠丘壑雖龍卧黙計江山已鼎分庸蜀欲開來日月隆中先見㑹風雲雜耕初動明星落千古英雄泣渭濵天厭炎靈暗不開欲吹餘燼發寒灰强因徐庶南陽起能枉周瑜赤壁來常見英風吹草木尚存精魄動雲雷西南遺愛無時歇不逐長江去不回女几山女仙廟絳節高翔不可攀尚留遺几在空山月明曽有芳簫過松老時㸔舊鶴還巖下春歸花寂寂壁間雲暗蘚斑斑開元已逺霓裳絶野草青青輦路閒和林次中秘閣題五龍廟頭角蟠潛歳月沉腥風不散古祠深曽聞驚電開巗壁常見屯雲宿殿隂蒼蜴吐氷藏暗穴彩虹收雨出長林荒碑磨滅無遺事猶冠龜跗壓翠岑屈原廟古廟荒山暗水雲歳時歌舞感鄉民幾傷讒口方離國欲悟君心豈愛身慘慘飛魂號帝闕𠖇冥齎志託江神千年自有遺文在光焰長如日月新題觧梁驛舍三年去國苦飄零滿面風沙漫度春白日驅車無住客青山當路亦為塵東經鹵澤初迎雪西出蒲關欲問津何日投鞭尋舊隠雲間深訪牧牛人過沔池驛崤陵臯墓幾摧輪秋暮重過白髪新小雨廉纎能滑徑亂山逥互欲迷人客心苦厭孤程晚驛舍頻來舊吏親明日問途知更逺又須呼僕待初晨過襄陽表裏山川舊楚畿築關乘險事皆非槎頭魚盡無新語峴首人亡失隠扉雲外煮茶僧室静江邉酤酒客帆歸我來駐節無言久為愛春流可染衣初至鄭州二年青海困征鞍歸望天威咫尺間雨露忽頒西輔印鴛鸞阻綴紫宸班往來擾擾無虛日應接紛紛祗强顔吏責無窮人事拙夢魂時到舊家山過臨晉縣適調發半夜驚呼府有符河堧荒邑應軍須氷生垂血辭鄉淚風漲飛塵出塞車千里饋糧人未返百丁團甲户無餘天邉旁午流星使更見河橋急羽書韓退之舊業城南舊業訪韓符門掩荒榛老木踈隂洞尚寒難駐客短茅初葺未成居崩崖亂竹從欹倒糝逕飛花不掃除舊集逺年今散逸蒼碑但刻馬鳴書八月十六日後池上竹户深扄滿逕苔芙蓉落盡曉池開數畨雨勢随風去一片秋光入座來已老林蝉餘韻斷將歸簷燕强飛回沙鷗時下知人意近岸相親眼不猜种說山居隠君奕葉為清門誅茅卜築歳已深池影青蒼山堕地松枝夭矯龍出林六月取冰自鑿谷百壺進酒不論金阮生熟醉無臧否今愛遺風杜曲隂客來稚子出譍門㓗灑虛庭屢汲深西澤千塍連别岸南山一帯是家林泉清野果浮蒼玉燈散靈峰見紫金晚日已收凉氣動客歸相送歩松隂是日南峰聖燈現抱甕軒擾擾誰知巧喪生惟君智巧不關心為能懸觧如莊叟㑹識真風在漢隂閒笑重輕爭俯仰静忘身世任浮沉堪嗟混沌亡來久今獨憐君踵息深郊居閒原渺渺散䟽襟風舞淵潛自樂生春到雲山惟杖履日長天地獨柴荆百年雖健猶親藥一飯無多嬾問耕常羡子喬仙馭逺笑悲滄海世人情三月二十八日園中作決決清溪漱遶堂興來隨意轉藜床畏人野鳥疑花動收蜜山蜂誤酒香杏子帯鬚紅半抱藥苖退甲緑新長風光須是閒時見身世今欣已兩忘和夏日園中即事雨過深園暑氣清拂雲松竹映重閽預期節物移承露自驗方書採合昏片影有縁聊暫寄寸心無事得閒論風光未信随流轉猶見飛花落酒尊園中獨坐高樹風輕葉影齊新荷破巻緑猶低日長松下少人到坐久竹間聞鳥啼萬里驚波逢寳筏百年病膜快金箆雖知赤水遺珠在問路襄城舉世迷李氏園城近斜臨南郭路地寛分得奉誠園垂竿引水穿囘徑種竹成隂補壊垣曉露不收荷已敗新霜將落柿初繁天晴野曠秋風厲借榻虛堂負午暄過李氏園伊川北首始知春問路停驂僕候門垂栁萬顰梅一笑蒼松四出石雙蹲髙人舊隠家風逺祥兆開先國邑尊地名大宋川昔歳徃來曽駐蹕從臣遺刻在雲根陸渾王秀才園兩歳伊川擁傳行往來屢喜訪雲扄四時溪水喧巖石六月山隂滿户庭每到似開雙眼翳久居應滌百骸醒露香浮座供賔餉凉葉生風野草青和題屈氏園宻樹煙深緑映門入門清絶隔囂塵須知澤畔行吟客便是林間散髪人山色滿楼何處盡花香過酒逐畨新東風時引閒雲到留作輕隂欲駐春杜城陳文惠公園有桂林亭杜曲西遊訪物華門前潏水渌涵沙南城天近無雙譽北斗魁前第一家當日不知龍臥久今朝空羡桂交花高文遺墨皆漫滅林下祠堂春日斜和范君武出郊九月天高客喜晴籃輿因興度溪行身逢樂歳留漳浦心逐秋風入渭京日暖登塲多稼熟桑隂具餉野盤盈豐年社後多餘酒處處神林簫鼔聲和人遊千金公主園池溪流古堞帯林高林下行通小水橋但有春風催載酒更無仙鳯伴吹簫花間鳥散驚藜杖沼際波囘轉桂舠塵迹尋餘思一弔楚魂飛盡不能招後園小池鑿地開方斷石根潤通草樹亦欣欣築基偏傍孤亭濶引水初從曲徑分風約落花囘近㟁露垂欹竹滴圓紋春晴山鳥常來浴淺處喧喧故作羣城陬荒僻自開鋤野性難忘水竹居㟁側星機榰錦石波心仙仗立紅蕖閒中有客唯來鶴静去無竿不釣魚八卦神靈今可問𤣥夫時出御輜車和韓丞相玉汝登見山閣丹青岌嶪冠鼇丘地闢天開洗百憂萬竅倚空號一噫八川盤野㑹千流浮雲晚日悲餘翠廢苑荒陵怨暮秋自昔登臨思善賦高吟豈向世間求遊柏谷寺寄范君武絶塞初歸喜澣休東城送客偶成逰山前欲訪青蘭若林下初聞黄鷅鶹雙屨髙窮溪水出一身輕共野雲浮寄聲德操還能否炊黍吾過為少留
