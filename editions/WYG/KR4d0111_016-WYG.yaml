body:
  text: 潏水集巻十六宋李復撰七言律詩送人從辟秋風蕭索塞雲黄白髪青衫應辟章曾説穰侯常畏客今觀毛遂欲投嚢鴈門舊障雲松盡離石新城壠榖荒想有髙談開玉帳尊前妍論灑珠光李無玷自左正言出守永州召爲吏曹外郎尚阻叙舊先貽此詩初伏青蒲拜皂囊忽驅五馬下瀟湘入承上閤尚書牒分掌中銓吏部郎焚藁舊垣猶寂寞拱樞列宿頓輝光聞歸未便能傾倒五日朝班得綴行用周作韻送范忱夫舉歸白日髙懸照九垓天門欲上却飛囬雖聞西蜀題橋去未放東都走馬來豐劒有神須會合荆珉藴璞且徘徊明年八翮乘風起一振鵬程九萬開贈張萬户征閩凱還瘴雨蠻烟逺蔽空只將談笑蕩羣凶旌旗夜捲妖星殞鼓角秋髙殺氣雄已喜張良還㶚上更須龔遂守閩中凱歌聲動天顔喜金虎三珠擬報功寄吏部王侍郎國門一别四經秋新命恭承自冕旒碧落神仙來禁闥青天雲霧隔皇州孔鸞筆下鶱光翠涇渭胷中有品流聞説絲綸推世譽佩聲好聴上鰲頭荅董天隱推官日月沄沄不可追神竒腐臭略無遺一丘一壑能誰過相喣相濡莫我知强聒睢盱何所補雄誇凌厲亦奚爲秋來春去尋常事安得乾坤獨爾私答潞城令谷大同蕭條寒邑古風深應嘆光隂恨陸沉莫厭荒山輕廩粟須思美政慰民心門連露草常封印吏散秋堂靜試琴欲約仙鳬終未得東城何日聽車音酧張法掾翼求侍養歸少輕紈綺襲箕裘力學從容與我謀擇友卜商能勝賜舞風曾㸃自殊由去乘汴水春舟疾行過龜山楚客留千里有聲如寄我須尋臨潏舊林丘謁冷朝奉路逢王才元舍人同徃曉路髯翁已我先清時有味獨君偏栁深門掩徑未掃花落鳥啼人尚眠顛倒著衣驚應客咄嗟解榻遽張筵雲開日影斜閶闔悵望歸程急馬鞭答李成季賀授直秘閣絶域經秋自乞還粉闈春得綴星班詔趨龍幄登文陛恩捧芝函入道山曲學豈知新説美蒼顔難伴後生閒聞君此地淹徊久悵望當年未及攀酬李公寅留别歸風何急動征車幾夕相逢意有餘緑暗河橋氷泮後雲藏山徑雪晴初登門曽上千重峻㳺刃將驚萬􅑆虛他日再來寜可約北鴻時付一行書别䕫州衆官半年漁浦巴城守兩任雲臺太華宫豈欲背時聊免俗但能省事略成風玉泉古刹須留客峽水安流好向東祖帳聯翩催棹急臨溪洒涙落丹楓衛奕其兄被劾得雪惠書及詩去歲書傳歎鶺鴒新詩甚喜字縱横龜雖有智猶罹網鴈爲能鳴得免烹須信箧中多謗語莫矜堂上有竒兵滔滔天下常如此無慕功名取次行寄朱約之子墨文章不自珍連編大軸棄如塵久收幽履安巗谷但見髙名出搢紳欲寄逺書尋素舸今逢佳士得朱輪放談可講平生學新傳行觀盡獲麟寄舊同遊去鄉甲子四十二歸路山川九百三長河無鯉來東北逺夢隨月轉西南簷花雨落春獨酌牕竹燈寒夜對談石上精魂能閲世欲尋前事興方酣吕司空夀飄飄仙馭出蓬萊時節新陽動琯灰慶閥拱魁三象近祥源引𣲖九天囬磻溪龍虎家璜在申國風雲舊嶽開聞説清臺占異事弧南星步入中台贈吳德秀隱士用來韻不計無成與有成但能償足百年心喜營美醸多栽秫廣蓄竒書盡散金三代遺文鐘鼎古五湖秋意畫圖深超然真趣誰能識目送孤鴻撫素琴答人見贈形影何嘗問主賓真風滿户養頽齡不從田父迷迴駕但有漁人笑獨醒閑攝髙雲遊沆瀣静收浮氣借光靈出門無事誰相喜只對秋山滿眼青答范軻綏城古語刻兠鞬何事求犀近水燃鄉里後生輕宿學朝廷新詔急遺賢風囬夜月開重暈驪睡神珠出九淵今日秋臯聞鶴唳茂先方議斸龍泉答李成季山川錯莫不逢春京洛空多滿馬塵李渤請歸聊見志魯褒著論久知神懷沙曽愧垂綸客擊磬興嗟荷蕢人向老愈憐筋力弱空傷涸轍泣窮鱗答李公藴臘前曽約走新春春到無端絶塞行戍卒催完燈下甲急烽連入雪中城萬夫擾擾争分餉一飯匆匆豈暇羮自嘆東西求斗禄兵戈已過十年生答彭同年勸應賢科早歳逢予嘆陸沉東風還更枉華音五蹄一角必殊相八跪二螯多躁心衆惜伏轅傷駿骨自慚躍冶匪祥金搏風敢效垂天翼但樂孤巢寄舊林答李晝宣德示詩巻志學長年患小成五言今喜繼家聲因君筆墨多新語滿路雲山得美名才業未堪髙卧顯篇章自欲以文鳴歸時正是春風好擁轡應教取次行哀秦金部少年書巻是生涯白屋清朝自起家數上封章思有補一生悃愊靜無華初瞻玉節星軺下俄見銘旌粉篆斜天理㝠㝠誰可度但傷零落掩淮沙王夫人輓詞家聲昔冠秦中望婦學今傳潁上風百歳流光方過半新春逝水忽馳東丹山鳯泣歸巢冷寒月烏啼反哺空他日拂絃悲舊曲應將哀恨寄孤桐欝欝佳城潁水涯素旌今見出重扉不逢玉鼎仙丹轉忍見春風畫翣歸馬鬛起封占鶴表錦書賜邑得烏衣須知千古芳魂在漠漠孤雲嶺上飛弔朱給事筮仕西州佐邑時髙才不厭簿書卑清修與衆初難合真節當朝晩始知諫苑塵埃多舊藁佛宫粉繪有生祠與君家世重重契祖奠靈車涕滿頥棣華齋真長世譽賢兄弟棠棣名齋爲學詩華厦何妨因舊址春風不老是仙枝攀條漸見傳芳逺和氣先從近本知顧我彫零長弔影感今徒益鬢如絲託人求田緑遶隨城潏水流百年那免問菟裘泉甘易汲能蠲疾土沃飜耕每報秋欲託髙人論地劵共期他日老漁舟歸身未到心先到得此餘無一事求殘編殘編斷簡事寥寥購輯成書匪一朝韋述投山蔵舊史肩吾去國失宫謡須知孔壁遺文在豈逐秦燔烈焰銷博學多聞予所仰喜君擕笈過衡茅青布道人逸意閒雲野鶴孤藥苖山葉綴衣裾新蒸石卵將留飯戱酌銅盤便得魚療疾但分庵畔草吐言不出世間書五年宻宻求真訣始露三元御氣車道士李得柔行太乙法曽傳御容處世能求出世心石壇深夜禮星辰徧遊五岳求真訣獨向三清有主人妙筆曽開天日曉懸壺常鎖洞山春不知何事飛符動又見荒林聚鬼神予昔爲河東漕屬吏部郎中呂得和出總漕計與予情均兄弟後開府荆渚惠書有人生難得相知之語予後官守鎮京兆聞吕之訃因發篋得舊詩感而作此三年發箧墨猶新蹤跡雖踈意更親雲霧渚宫迷逺夢兵戈青海困飛塵時方收青唐飄零劍外㕘謀客杜甫爲劍外叅謀送韋班詩云飄零爲客久衰老羡君還愴惻山陽感舊人向秀思舊賦濟黄河以泛舟兮經山陽之舊居顔延年作向常侍詩流連河東遊愴惻山陽賦今古交情如覆水爲君涕淚灑新春李毅師載出塞歸熟食日邀客湖上有詩求和遂用其韻新知劍外朱兼阮舊侣江邊白與張去國杜翁爲客久傳詩韓老遇春忙一年喜競清明日千里歸從戰伐塲山寺雪消雲已暖湖亭氷盡水生光半生幾見逄三雅此舉無辭畧百觴莫負髙名興苦歎静中閲盡喜難忘五言絶句宿興德寺東峰霽月出林叢寒露明夜久風漸息深院無人聲七言絶句登後峽寨北山薄落山前菊未開鬱孤水畔獨登臺明朝匹馬衝霜去直到鳴沙北始回予徃來秦熈汧隴間不啻十數年時聞下里之歌逺近相繼和髙下掩抑所謂其聲嗚嗚也皆含思宛轉而有餘意其辭甚陋因其調寫道路所聞見猶昔人竹枝紇羅之曲以補秦之樂府云柔桑葉菀暗東岡山下亂石如羣羊舊沙漸髙行路斷馬蹄踏散飛星光繰絲宛轉聽車聲車聲忽斷心暗驚舊機虛張未滿幅新絲更短織不成東來健兒身手長不隨伍籍習弓鎗何須官廪請租税白晝衣食出道傍短衫窄袖上馬輕空手常喜烟塵行論功何須問弓劒自有主將知姓名牛車欲住更催行官要刻日到新城軍有嚴期各努力秋田無種何須畊蕃兵入市争賣田漢人要田蕃無錢有田賣盡走蕃去却引生羌來冦邊白羌紛紛急攻城羌酋却走殺漢民漢民當前死不惜甌脫更有殺來人隴山連峯入無際天畫封疆限華裔如何谽谺忽中裂西通風来動邊氣鳴鳯山西五里坂未渡汧河山漸淺東來行人漸長嘆已覺秦川不在眼垂白東西幾田父林間偶坐忘巾履共説乾餱付逺人六月長丁猶築戍予㓜侍先人作邑夏陽元豐五年來攝是邑過瀵泉題其亭壁井邑依然舊物華行穿溪樹踏溪沙路傍故老遥驚認十七年前縣令家再授雲臺觀過華隂題此脫身西去度函關踏雪重過阿對泉又作蓮花峯上客祥飈髙御紫虛天過方山驛驚塵拂面三千里走馬東西不識春忽見長堤新栁色一時聊慰倦行人飛泉銀河一道下天來蒼壁衝雲萬仞開白浪駕風千石轉四時不斷響驚雷卧龍院杲日珠光照舊都試從雞足躡蓮趺横身何用論明暗果是能揮寳劍無留題北禪院偶到叢林訪可休南山依舊滿晴樓垂鈎漫有深潭興徧滿乾坤是即收隴州神泉鋪後池山腰緑映女郎祠祠下泉通竹下池時有游鯈自來去祗應曽見理鈎絲題甘茂祠奮身孤旅相秦王欲去憂䜛論樂羊不有私金助公賞可能明日㧞宜陽王導鄒人羞比管夷吾可復中原盡羯胡郊壘連雲困衣食縱髙練布得充無曹參廟百戰皆收第一功幾回旁嘆泣良弓白頭始識人間事歸向東州問蓋公王翦少李輕兵去不回荆人勝氣鼔如雷將軍料敵元非怯能使君王促駕來孟嘉不將得失供談笑此語宜爲盛德人千里同風皆黙契禇裒故識坐中身陶淵明接輿歌鳯溺沮耕獨徃何堪與世親投紱歸來眠北牖髙風自是葛天民二月五日柳溪遇風狂風擺撼未肯休直須枯枿生新柔老松倚雲不關意開落曽閲幾春秋秋庭夜閒歩髙秋夜氣聲驚竹寒月徘徊影趂人此境靜觀如啖蔗後來細嚼味尤真答安陽叔兩絶集唐人句春風吹園雜花開漸老逢春能幾回不嫌野外無供給一杯一杯復一杯兩人對酌山花開青天露坐始此囬嗟我與君皆老矣且盡尊前有限杯謁詩僧慧益不遇晝公昔在雲門寺曽笑陳丘久不歸草坐麻衣今不見獨來林下釣寒磯唐僧靈徹寄陳丘二侍郎詩云身老心閑無外事麻衣草坐亦容身相逢盡道休官去林下何曽見一人和崔珙望子嶺觀梅髙枝踈淡小花頭開向殘春破客愁㸃墨空山慰寒晩却如何遜在揚州崔珙推官話王園再如昔年爲梅下之㑹并示絶句和來韻王家梅樹春常早露坐曽侵月影來聞道去年還得意新花還似舊時開閻先復朝議園牡丹一夲四月始開予與李成季同徃觀閻求詩遂書絶句於其壁淺蘂凡葩不自持紛紛競鬭早春時髙情獨負無人識落盡羣花晚始知戱書德公軒後桃花百葉仙桃倚故臺劉郎去後幾時栽紅塵拂面人來看只有靈雲放眼開花發雙林七寳臺出門是草不須栽東風一夜都收去爲問仙桃甚處開和張總管菊雲裏霓裳閑儼雅霜前黄鵠獨軒昻不從春意裝褫巧却被秋風漏泄香開落紛紛不自知春秋莫較後先期清霜滿地凋零急正是黄花得意時和呂吏部觀延慶院李唐畫山水道人曽去禮清凉幻出臺山翠壁光聞説幻師能幻幻烟雲草樹攝他方遊戱仙人出道塲寳山珠樹發神光坐間舉手分天界移入毗耶一室方深蒨雲嵐逺意蒼寳伽猶帶海波光須知應感神通力舉步相隨徧十方題畫馬圗龍種天駒産渥洼五雲毛色散成花瑶池一去無消息只許丹青紙上誇題嚴賢良東山集謝公髙志渺浮雲對奕從容静世紛坐客偶然談小草無言徒媿郝叅軍項城主簿趙岍求書惹雲亭爲系二絶東西飄忽本無心留礙危簷便不禁向晩前山風力薄等閒相引作輕隂白雲曽與閒人約爲怪貪忙久不來飛過孤亭訪消息也還遮莫未能回和人觀木戱百尺髙竿巧捷身竿頭立定鬬尖新更呈失脚翻身様平地旁觀亦損神
