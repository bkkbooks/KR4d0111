body:
  text: 潏水集巻十三宋李復撰五言律詩過萬泉縣邑屋連山麓蕭條去路斜鹵田無美井旱港足飛沙逃室多欹棟殘林有斷槎荒墟人不見墻角自開花自夀安之長水夜宿錦屏下曉行伊水長露寒荷葉紫秋晚稻花香女几仙風斷連昌輦路荒二年渾作客山驛過重陽白沙驛在歸州東江南岸轉側下層巔江流出斷壖寒雲生古戍野店引山泉雨暗疎茅濕堂危倒石懸去程無限險心落渭城邊再過方山驛春過方山驛依然柳色新昔遊嘗弭節舊記已埋塵往嵗讎書客新恩守土臣南來心不競時羨北歸人自吳嶽歸鳴鳳岡邊路秋風動夕嵐閒雲依絶壁獨鳥下空潭疇昔經行慣重來委曲諳試尋遺墨在投䇿訪僧龕聖容寺僧伽舊居柳公權書碑應感雖無地棲真自有縁寶坊開泗水香露散秦川草亂遺庵廢珠明舊相圓豐碑傳異事細字刻誠懸遊寶雨寺信步出江􅧼庭松立兩龍晨僧自汲水髙閣忽鳴鐘淨飯多山蜜新羮供野葑傳聞初祖錫猶掛最西峯重遊寶雨寺題墨暗頽垣崢嶸嵗序遷舊僧霜髮滿老柏瘦根穿客少庭多草村饑供乏錢重來猶晚暑清盥挹寒泉興慈寺觀君俞舊題松院前年到同君共五人今来觀舊蹟君已是前身遽掩千秋夜空傷兩嵗春向風無可語淚灑壁間塵峽州渡江入寺雪暗離秦地春歸入楚邦平生憐匹馬將老渡長江解纜辭亭樹中流見寺窗舟人喜風色畧得寸心降江上招提古蕭疎對郡城延賔竹榻靜過雨石堂清齋接荆州供題多蜀士名老僧飛錫倦歸坐聽江聲興徳寺逢張居士掃葉開新徑携缾汲曉泉偶逢巖下客來問室中禪鳥去空還寂薪窮火自傳四方行已徧歸老舊林邊登青龍寺疎爽巖邊寺秋登更晚晴連岡横野斷逺水隔林明廢井餘荒甃殘碑有舊名幾經兵火刼禾黍徧新耕遊觀音院唐趙州諗禪師舊遊秋林晴簇簇野竹靜姢姢臺殿横髙絶山河滿大千莫論金屑貴且契布毛縁試問庭前柏干戈動幾年慜禪師湘南衡岳水分得一支來宴坐秋峯靜澄心夜月開清風生虎錫驚電䕶龍杯昨夜飛香動山神禮寶臺新羅寺唐有新羅僧呪草愈疾卵塔今在閒來因題斷石傳遺事唐年刻永徽庭荒靈草盡塔壊禮僧稀古殿含涼氣空堂照夕暉獨來人不問行聽暮鐘歸甘羅廟縱横爭擅勢之子獨尊秦弱齒能専國竒謀不借人拳峰凌九仞勺粒動千鈞過客瞻遺構臨溪野草春九日過介之推廟荒祠久零落秋日故山阿椒菊持新奠龍蛇憶舊歌論功嗟晉粟流怨動汾波千嵗遺靈在鄉民禁火多清明日北園亭作錦亂筠遺籜青浮水結衣乳鳩呼却逐鬬雀墮還飛客過殘樽在年侵冷食稀去年今日意渡峽雨霏霏春日北園早起雨斷雲猶在風回氣已明林花含宿潤露沼散餘清喜靜心常澹居閒意寡營流光隨轉盼所向達吾生秋晩北園野興乘俄頃扶行錦竹長碎蔬殘宿圃亂葉散寒塘地僻柴門靜人稀草逕荒曉霜今㡬見猶有菊花黄晨起東軒影暗纔分竹煙低正滿簷雨斜侵藥裹風過亂書籖篆滅香猶在塵昏硯未添靜中時有興著論不為潛曉至西郊墟落隋城外西郊路可尋帶霜殘黍短過雨舊溪深近港來迎犬荒籬散宿禽隣翁邀具餉煙火動疎林江晦叔邀遊吳氏園為約月餘始能一往吳生某求留題遂書石上竹屋横虚舫松屏展翠帆柳條晴後弱花態曉來嚴樂意難逢暇清游久嘆淹主人求客語乘醉寫雲巖出村風露已淒淒郊原百草腓負樵山木下轉粟戍人歸野曠羊牛逺場荒鳥雀稀南山經月雨猶有亂雲飛西溪酬孫倚李珪二同年依韻水部張員外中書白舍人曾聞三絶句同賞曲江春且逐追隨舊休悲老大身花今千樹發有底不來因病起病起秋將晩髙林葉半黄梳驚殘髮少瘦覺舊衣長尚怯扶藜杖猶勤檢藥囊喜抛烏帽去曝背卧朝陽雲巖徑轉隨髙下欹危亂石中寒巖朝起霧空谷夜生風疎竹連殘屋驚麏逐斷蓬求棲問茅舍非淺愛田翁夜意山霧連城白虚庭待月生雨餘秋葉潤露重葛衣輕隂壁鳴蟲澀風枝宿鳥驚淹留禾黍興悵望故園情和楚倅懐歸雨斷他鄉夢風沉故國音山城黄葉落蘭畹白雲深寄食衣裘敝慿鞍嵗月侵流塵昏斗劍萬里愧初心留客秋堂留曉客宻雨擁柴門石鼎燃松葉山樽捧竹根買魚催網急嘗栗破㱀繁村黑歸泥滑移床醉夜軒送客至黎城二年三送客空復往來情野色浩無主秋風暮獨行山連長狄國水過鄴王城試問式微詠猶歌怨衛聲答徐耘朝散昔年汾水上曾遇海南翁欲問三山路先知一溉功萬紛銷寂黙一氣抱冲融更約丹砂訣他時訪葛洪催發諸邑民兵至朝邑縣官未至遂宿其驛羸馬趨程晩衝風雪滿衣城荒更鼓暗市冷吏民稀烏壘兵初起河橋客未歸北行殊未已捧檄寸心違月玉露漳川月相看幾上弦氣横秋浦白輪帶女城偏半魄蟾猶隠分枝桂未圓雲衢誰可到柅轍駐流年竹園竹三年種今春緑始稠未知能却暑但愛不悲秋影補頽垣缺枝多暮翼留近因開小徑時有客相投蝦蟇碚水泉出蝦蟇碚名髙陸羽經細分寒乳白散落曉巗青歸客停松檝臨江貯蘚缾神仙雲母液烹飲飬頹齡江公著舉棊無偶忽敗于予有詩戲用其韻忘暑憐楸局含風愛竹窗料兵聞舊怯築壘納新降舟渡焚秦水兵分泣楚江君知猿臂將國譽世無雙觀山郊閱武疊錦聯貂帽飛光散羽旗虎文雙箙重金粟小鞦垂望鶻翻雲沒呼鷹駐馬遲更聞傳令去先促羽林兒榆落山連壘川平水帶城張兵圖野曠吹角怨秋清移帳髙雲動開鐔碧海驚歸風回勝氣西北埽欃槍晩客狎至應接不一或有疑者作此詩示謝敞教授岸幘扶藜杖移床傍晩林形骸猶是累語黙更何心望外浮雲薄涼生古汲深自憐多懶僻塵色悶孤琴荅分守魏大夫坐憶金臺别于今十四年新恩乘五馬北首渡三川縣急均鹺户邊停助餉錢晉民衣食薄移柱聽調絃舟行出峽先寄峽州太守榮子邕同年幾日方離峽舟浮任所之江開平岸闊天逺去雲遲心折襟分後身存痛定時晩亭登至喜歸信半年期峽州江岸客亭名至喜予前過此與子邕約半年同歸今得如願依韻酬趙令之相逢三十載少恥事驍雄封植思嘉樹交遊嘆谷風雲山輪迹少葵藿嵗時充冉冉秋還暮霜寒泣候蟲呂子固置㑹有詩張芸叟邀予席上依韻和故國歸來晩相逢共老年聊從浮白飲莫擬畔牢篇花近紅侵坐槐新緑媚天還丹消息斷無惜放杯傳還王天倪詩巻素尚躋遐曠平生厭淺浮錦囊刀尺古江渚蕙荃幽翹首孤雲逺踈林暮葉秋十年人不問寂黙老荒丘酬喬世材推官地僻人來少公庭吏散時亂蟬號晩日涼葉下髙枝仰羨知歸鳥先書寄逺詩只應今夜月偏解照相思答推官李珪吾族柯條茂人稱孝子賢新游思我共舊學欲誰傳毎愛鸞鴻志徒嗟犬馬年青雲如得路驤首看揚鞭和張裁推官遊湖閒弄香蘭楫斜開紫綺襟囬風收雨脚靜月到湖心髙柳留疎翠前山動夕隂興來行處愜樂罷感還深寄延帥趙龍圖卨瘴嶺有毒霧鳴沙無美田乾坤滋孕毓山海限腥羶干舞旄星落弓櫜譯舌傳但能思上䇿何必勒燕然戲答山人趙頴憶山居緑髮年來改相看憶去頻青山不厭客黄屨自迷塵耳冷泉聲淡松殘藥竈貧白雲他日見應問世間春新蟬病耳不堪聽仍愁露下時纔能升木杪便解入雲吹漫有真仙契猶多風樹悲美隂如可託後患亦須知太學試駕幸後苑觀穀禁籞開清曉宸心喜豫遊鳴鸞迎霽日嘉穀茂髙秋秀穎晴光爛雕輿睿鑒留晨光照金粟喜色動珠旒緑野勤農力青編藹帝猷周人豳頌在王業起耕疇依韻酬沈仍長官恵葡萄異果乘秋熟分來道路長緘封湘篋重題詠剡藤光氣蓄西河潤山圍大谷涼龍鬚初引水馬乳晩經霜衣薄輕鈆粉包圓小紫囊膏腴凝紺液甘酢溢雲漿蔗浥含餘潤醅浮帶舊香藥經難髣髴畫筆漫形相涇洛宜秦土汾嵐利晉鄊鱗差分萬葉珠寔綴千房楚瑞慚萍實江奴笑橘黄破酲生靜爽滌熱􅇺新嘗契闊初心在提携逺意將茂陵遺客老痟病證仙方
