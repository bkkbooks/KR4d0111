body:
  text: 潏水集卷十二宋李復撰七言古詩溫泉行驪山鴻濛凝白煙山根隂火煮玉泉隂靈炎炎燃礜石石焰不滅何千年珠閣縹眇飛鳳來素衣仙人坐髙臺臺前香引流水出白玉蓮花九葉開泓渟分去浮輕碧中有純陽無限力四時獨不放春歸散向人間消百疾瓊樹他年日月新霓裳舞動蜀山塵寒雲怨鎖遺宫冷林葉巖花秋復春靈泉有靈天降福山神嚴呵不可觸祖龍心穢慢神天毛髮流腥身被毒孤鶩孤鶩何時失舊羣空郊迥立如長人疾風拂地忽驚顧欲起不起低昂頻遼東八月霜氣早萬里旅飛來南賓雲間翩翩羽相接沙上雍雍情更親空江誤駭虛絃響飄亂哀驚爭愛身倉皇離散意奔翥形迹漂零心苦辛拳曲悲鳴求遺穗稻粱收盡原野貧暮天蕭條侣影過側頭仰望空傷神想能髙鶱投别伴思故未忍重求新會向北歸却相見當看刷翮向前春襄州大悲像寶伽如來出海山隱身自畫如來像三日開門孤鶴飛滿壁晬容現殊相一首千臂眼在手一一手執各異狀日月山嶽星宿明鐘鼓磬鐸琴築響矛戟戈劍利兵鋒瓶鉢螺巾寶錫杖左右上下滿大千應機妙用不可量金光宛轉遍沙界億萬人天盡回向昔聞如來發洪誓慧目無邉破諸妄我今祝願果初心銷滅含生多劫障論交市井茍喜毫釐親莭義動以肝膽許餘耳兆亂在交初管鮑論財偶多與情偽安能盡一言是非必欲期千古尼父已逺不得復夢寐恍惚與神遇元日元日擁户如盤蝸門前轣轆多行車擁門喧呼客投刺驚風舞雪翻飛沙幽室置火引就坐持杯暖腹客氣華三杯油然衆客去庭樹瑟縮蹲山鴉上已成季召會于西溪會上賦詩須多韻仍用故事或舊詩十事已上未終席而成違者浮以三大白罰者四人豫與成季免焉華林園中千金堤銅龍吐水天泉池出鄴中記八公山下劉安臺城郭周圍雜花開宋劉裕上已逰劉安臺流金寶劍為秦出綵鷁羽觴浮洛來著處祓除務是日西關千人萬人出修修美竹帶林高激湍逺照崇山碧主人濟南舊詞伯藝閣鉛丹事書册載酒展席俯長流一飯未嘗留俗客拂地低回舞袖翻簫管哀吟動魂魄天晴初暖雲自嬌風柔徐動花無力氣酣傾倒不自惜屢顧空尊有愁色豈學飛蚊一餉樂論文清心聽鳴鏑詩壇誓衆軍令嚴立表下漏不容刻神意慘淡喧謔寂疊簡搖毫辭舉白欲徴故事入新語摯虞追歎慚束晢山隂衣冠交履舄千載風流傳不息繭紙墨妙龍鳳飛逺近家雞皆斂翼明年此會恐難得俯仰之間已陳迹來者興歎感斯文後之視今今視昔夏旱浮雲蔽空旱日熾日酷燒雲雲散裂雲怒漏穿未肯去日光迸射千道血蔽天頑狠鬭不歇天工默默無與決乘時爭勝更苦熱魚龍戢戢愁海竭七夕和韻東方牽牛西織女飲犢弄機隔河渚西風忽起怨夜長相望盈盈不得語走投上帝貸金錢五雲飛來結香軿曳裾拂露天榆冷照影回身桂葉偏銀潢七月秋浪髙黃昏欲渡未成橋却向人間借烏鵲銜石欲半河已落碧霧為帳霞為裳絳節欲盡兩旗張燦然一星中耀芒前瞻漢曲喜色長飈輪儼雅靈龍翔相迎交贈雙明璫臨席舉袖開雕扇故人有似新相見共持深願祝天工海底烏沉參不轉世間共傳牛女喜綺樓百尺排空起垂綏插竹動雲隂玉豆珠盤羅餈餌壺開緑酒淨於空秋滿虛庭氣如水兒童不眠看星會白光奕奕搖飛旆整衣低首祝深心未祝焚香先再拜曈曨曉動斗車移小雨班班怨别離天上還應分鳳軫人間又喜見蛛絲空堂野老頭如雪不解祈巧但祈拙重陽日獨居洨水君俞出逰杜曲惠詩酬以來韻衆人有錢競沽酒嗟我獨醒坐搔首荒徑蓬蒿深映門茅舍三間傍疏栁南山奔騰呼欲來雲散山容一笑開何似齊山江上客菊花須插滿頭回和李教授攄逰溪阻風去年春盡送春歸溪邉曽與春風期共期今嵗春風到却話去年相别時二月天回斗杓轉沙際春風猶未知咄咄向空但書怪常有孤愁來兩眉南巷佳人佩蘭客去年把葉同題詩能傳芳信慰枯稿問我溪邉來何遲明發招邀出城去欲傍垂楊舉酒巵盲飈東來忽作惡掀簸地軸搖天維坐客隔手不相見縮頸盡如藏殼龜昏沙欲定日更黑浩浩崩奔隂雲垂蒼茫催人雨勢急促轡競路爭先馳歸途邂逅過蕭寺投鞭思奕雲房棋道人呼童拂廣榻笑我塵土兩目眵漫展紋楸苐袖手瞑依團蒲神意疲朝來共尋一餉樂齟齬似為神物欺况乎人生百年間世事萬里多嶮巇紛紛智巧日夜鬭一身浪苦寧非癡試向道人問實相指我自求無言師和朱公掞禱雨五龍廟太師占嵗驗律管氣來姑洗聲猶短野人告病三月餘公堂嚴齋五日滿相招禱雨陟南山出城鞭馬追飛繖林鳩怒鳴競逐婦穴蟻移居自銜卵迎路商羊舞若飛隨車少女風不斷隂升陽交兆已見神意感通知憫旱焚香瀝酒灑枯地草根清流忽盈碗兹事舊傳或未信誠禱靈答知非誕祠亭豐碑髙突兀嵗紀神麚魏所纂道武開國始南征矯首據鞍思勝算雲間仰見黑龍來翔戲下山五為伴考卜推為受命符將拜帝休先沐浣前瞻雷電塞空山築宫岧嶤敢辭懶鬼神填委煥丹青草木森嚴無冗散登山層級繞巖巒趣門一徑極平坦簫鼓于今幾百年暘雨無愆雩禜罕今朝霡霂千里蘇太守憂民罄誠欵四郊宿麥逺青青土膏脈潤天已暖明朝牲幣躬修報豈憚陟降步巘窽魯無禾麥書春秋須知民事不可緩依韻酬朱公掞給事滄溟酌蠡天窺管龜兆何長筮何短什百倍蓰情不齊斛籥釡鍾難槩滿東西地缺如斷玦西北天傾猶倚繖山䍽何由蔚豹班荆雞豈解伏鵠卵雖許駑駘可纍馳所貴鏌鋣能立斷東陵瓜地久已荒南山豆苗嵗常旱日隨羣影塵滿衣愧竊太倉米盈碗默嗟世事意難期却怪古書語多誕往來迅景急川流悵惘無聞歸鬼纂今年短髮颯驚秋餘日駸駸豈容算逸驥空勤足未舒寒燈靜弔影為伴數朝忽喜挹高風煩心執熱逢清浣仰觀眉睫意可見已許交臂心無懶飄零鎩翮感鸞悲繩墨呈材愧樗散須思汲古得修綆却步歸愚識夷坦惟君早嵗嘆淹回白雪調髙和宜罕諫垣密疏藁常焚瑣闥舊風筆不欵雲間遽與鴛鷺分邑里新歌襦袴暖與我晤語若合契鋤去陵谷無隙窽因君相見慰蹉跎再激平生嗟已緩酬邢先生疊前韻道人海南遊五管野服褷褵鶴羽短飛符分藥濟炎州隂功早約三千滿細葺柔蔓作重茵密綴圓荷為翠繖丹回七返已成珠寶養三田如抱卵一身天畔若雲浮萬事世間皆刃斷行山書篆虎逃穴臨水呼風龍救旱弄琴得趣或忘絃遇酒無辭任傾碗試持舊説叩真詮深笑浮言多詭誕須知至道甚無煩豈若俗書務集纂向走天下四十年利口妄談何可算引枝逐葉盡無根神與形離不相伴超然自得方自知天下一新如澡浣生平聞風已默契今者相從敢縱懶事來酬酢外須應心不將迎意自散喜豫雙眼爛熒熒知豫靈臺常坦坦寶身好事求雖多誠言出口識還罕赤水遺珠若為求五雲瑤闕何時欵凌空未便御風行跨馬先覺雙鐙暖輪扁運斤棄繩墨庖丁解牛逰綮窽太清吾祖遺真風欲逐青牛愧駑緩按視沙苑南瀕清渭北洛水寒沙東西橫百里中條太華塞秦關衆川無歸皆瀦此地維忽斷兩山高帝罰罔功五丁死波飛浪激走東溟積雪回汀擁都鄙坡陀起伏接城門薦草甘泉國馬屯雲昏霧暗天駟下星宫夜失房宿尊驊騮騏驥種各有一一六印官字存開元籍馬七十萬監苑舊政宜討論過都歷塊汗流血朝刷幽并暮楚越天邉不從鑾輅行嵗久空老狐狟窟去年駒生風雨腥戴角肉鬛自有鱗廏人見怪棄於野騰入渭水方知神與任鯤同按沙苑寒空暗淡風滿衣縈回林薄相追隨野花班班隱亂草暮葉翩翩辭高枝渭水無煙但聞哭延州築城猶出師四顧乾坤莽回互濺濺洛水東南馳送人赴雅州任去年送君走邉州今年送君入蜀道上官南北不自知風卷孤雲離海嶠場屋爭飛二十年垂翼空歸嘆潦倒緑衣晚出外家來一命初欣慰枯稿憶昨當途數論薦謂君逸足須騰趠故為羈縶尚淹蟠區區課額量登耗辭尊有義不辭卑屈身斗祿貧親老蒙峯正在岷山西新月殘時行始到連江地暖春無雪天際春來氣常早君今此去春已盡江山緑滿花枝少人生離别難為情莫戀異鄉風景好杜鵑忽傍耳邉啼回首秦川淚斑草晉州會上送衛伯紹休官南歸叔寶風流喜髙簡非意相干以理遣勝日一言能造微衆許沖情去人逺班班氣韻見諸孫秋水神清驚俗眼追風逸驥自龍來照夜靈珠須海産結髮讀書棄人事南上衡廬宿雲巘窮源欲探崑崙深導河猶恨積石淺十年業白出石壁錯落青錢宜萬選長衢驤首向雲嘶千里霜蹄思一展辛勤久未脫羈銜蹀足蟻封嗟踠踠去冬懷綬到并州投鞭三月春風滿溪邉行聽踏踏歌草露忽驚人世短地下枯骨不沽名便棄華簮獨恨晚尋山髙頂白綸巾寄食但乞青精飯醮壇龍虎夜星寒海嶠雲霞春洞暖憶昔相逢洛水橋偶來促坐襄陵宴半生契濶一日逢互嘆參差不相見新鬢早驚蒲栁衰舊事重論風雨散我今漸歎暮駸駸長卿多病嵇康懶肯強塵沙立暝途逆流理楫厭牽挽待君植杖武夷山南去尋君任雙趼趙㠓惠二詩酬以來韻廣漢諸孫用心苦亹亹姸談殊可數江南春意滿芳洲長襲幽香佩蘭杜世緣嚼蠟久無情喜聞叔起有新聲著書半百懸罄久躡屩一日雙璧明顧豫畫脂已心朽看君著鞭方力生他時負雲縱六翮上摶扶搖逰太清戲酬楊次公法雲説法元非法六月洪爐舞飛雪寶香一瓣下天來須彌座上金光發三界風雨動雷音八部人天歸象設昔年關西舊夫子今日淮南大檀越揚眉師利傾千偈隱几維摩無一説試開門户立家風頓超初地無生滅百川萬折必朝宗東南到海無分别紫陌紅塵拂面來鐡壁不容通水泄衆形畢現明鏡靜浮雲飛蓋秋空徹眼見億萬歸彈指境落毫釐差永劫野犴不是師子兒磨了觜頭三尺鐵全湖巨浸一浮漚結果開花今幾葉昔人卷簾仰天笑得道固應由慧業一言可盡千語迷不如靜看水中月答郎渙蕭生陸沉自信篤白首抱關羞碌碌爾期速售恥干時行為徒涉慚濡足鴻飛冥冥凌髙秋南來亦有稻粱謀無言盡戀江湖樂未肯相隨腐鼠求依韻戲答胡沙汲去年聞君到漳浦庭樹鵲鳴簾燕舞今年聞君入戰場眉間黃氣如蒸霧風霜往回太行道空解寄聲託飛鳥南城百里不著鞭輕逐歸雲髙縹眇知君苦吟尚如舊他日相逢更驚瘦明年射策對明光曽聽人歌扊扅否依韻答胡直孺東蒙野老工何拙刻楮三年不成葉迂途獨往自名愚舉足常嫌投險捷忽然開口向時人機士笑驚多脫頰半生長餓首慵回厭見糟醨能腐脅惟與孤雲靜往還胎仙戲舞琴三疊江南墨客貌雖癯戰勝當前輕勇俠潤身不貯世間珍别有驪珠光滿篋北遊一見潛魄動雙目爛爛巖光曄新詩幾幅起秋風使我靜觀但嚅囁相逢便欲苦死留恐跨飛鯨動歸鬛答李師載早嵗賢關初闖首五色長虹出君手孤坐傲兀若老羆滿場輸伏井居後巨榜清曉揭宫墻名姓喧傳天下口天子未見已先知雲路風生看馳驟一官才得墜驚波顛頓衝風嗟莫救冥冥隂禍鬼發機羅網恢恢疏不漏幽囚束縳落空山蟬腹龜腸餓荒藪黃雛乳鷇飛刺天病翼傷垂自看醜男兒性命絶可憐萬事填臆難出口天髙地逺無消息日月回環嵗閏九情之所鍾正在我幾度寄音藏客袖辟書抆拭召從軍寒出綈袍憐范叟孤童匹馬渡盟津白髮青衫亦何有相逢握手話契濶懷昔感今嗟嘆久巨幹堅姿老不衰霜雪蒼松性依舊騏驥不合駕鼓車鏌鎁鬱鬱猶衝斗惟君與我同襟期為君掃榻開東牖相對惆悵懷抱惡聊且撥置共尊酒天地氤氲何事無白雲須臾變蒼狗冥心委順觀我生任有垂楊生左肘依來韻答謝教授敞還鄙藁語老便收氣自暖腹厭見先漿動人目乘間縈思似秋蟲終日牽絲不成幅廣文嗜好背時利妙律開雲發孤竹已驚垂蚓得鯨歸更愧並貂持狗續可嗟按劍夜投珠何異剖巖朝泣玉昨宵月暗風淒淒燈隂神物來聽讀調李教授君不見屈平放逐南辭楚憔悴行吟並江浦一聞鼓枻笑獨醒搔首低回愧漁父又不見淵明彭澤投簮纓退隱衡門依五栁凝塵滿匣不鳴絃頭上接㒿親漉酒爾後寥寥幾百年醉鄉途路隔雲煙空看青鑑悲毛髮不向芳尊問聖賢天邉酒星歎寂寞太白相逢發嘲謔悲風苦霧動星愁欲惱寒蟾對杯酌舞袖低回雙鶂退曽憶婆娑拂仙桂雲間月下兩茫然牢落江山無勝氣星星今古夢中身巧力爭求身後名衛鶴莫矜軒冕貴魯鶋曽見鼓鐘驚園林昨夜春風滿待得花開春已半流鶯才怨曉紅飛布穀已催秋種晚藻間養子碧魚肥石上拳牙紫蕨齊栁下驚逢金騕裊花深聞唱白銅鞮須知向眼光隂好忍困飢腸守枯稿明年雖見舊花開却恐花枝笑人老終南紫翠倚天髙渭水東流入海潮水去不回山不改茫茫曽歷幾昏朝君看曠達是劉伶寵辱冥心過一生枕麴潄醪方自得任從耳畔發雷霆戲謝漕食豆粥石泉清甘出山麓瓦釡貯泉烹豆粥太行苦霧朝塞門相與持杯暖寒腹集仙學士著繡衣瑞節前驅光照玉入境風生三十州髙廩臨邉溢紅粟公臺深靜兵衛嚴部吏趨承冠履肅剪毛胡羊小耳肥列甕釀香浮蟻緑盡嫌豪侈徹豐俎坐刻黳煤溫凍足擁爐招客學僧禪爭聽敲魚醒睡目太師論詩歌蟋蟀千載遺音流晉曲何曽方丈裂餅多武子琉璃蒸乳熟只知齒頰快芳羶豈料年齡愁嗜欲但能舉鉢厭飢腸便覺古風親土俗君不見錦帳匝地石季倫又不見氷澌渡河劉文叔竈間燎濕困滹沱席上爭先出金谷豈惟暫飽濟艱難猶貴速成勝珠玉昔人不願五侯鯖今我何知九鼎肉杜陵春晚把鋤歸常喜朝盤堆苜蓿莫嗟粗糲百年飱且免禍盈鬼瞰屋題謝子高易義東風吹園未曽出隱几潛心讀大易低頭不知客入門但見開編時點筆天開地闢日月明四時變化萬物成伏羲畫卦混沌死紛紛智巧雕元精梁山梁山蒼蒼寒日低武皇昔年留羽旗層宫突兀天上出舉手欲引仙人衣仙人不來怨空老索莫時從東海歸銅盤千里渡漳水茂陵草荒秋螢飛野蠺野蠶緣桑自成繭羣兒採繭殘桑枝明年家蠺黑蟻出田中桑死蠺忍飢野繭更採不滿筥家蟻嵗生無盡時翁乎驅兒無殘桑葉長蠺成長有絲酬愍長老退院作掣電機鋒不容擬已逐驚飈落千里人生萬事孰為大世上百年能有幾餘蔬殘肉豈能飽包束乾坤歸一指今朝齋鉢挂空墻山前山後松風起山寺禪者敗屋數間叢萬笴虎豹到庭門下鎖自種石田一飯足與語略能言璨可天昏霏霏小雪墮拾薪吹爐勸親火葉藏巨栗大如拳撥灰炮栗來饋我
